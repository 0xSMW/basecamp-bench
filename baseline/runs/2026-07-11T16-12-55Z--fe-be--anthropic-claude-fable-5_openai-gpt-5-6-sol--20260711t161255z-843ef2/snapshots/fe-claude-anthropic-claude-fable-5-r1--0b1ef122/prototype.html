<!doctype html>
<html lang="en" data-color-scheme="none">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SMW.AI Basecamp</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="%231d2d35"/><path d="M6 22c2-6 5.5-11 10-11s8 5 10 11c-3 2-6.5 3-10 3s-7-1-10-3z" fill="%2372bb5c"/><path d="M13.5 14.5 16 11l2.5 3.5-2.5 1.6z" fill="%23fff"/></svg>'>
<style>
/* ============================================================
   Basecamp 5 clone — single-file SPA prototype
   Tokens transcribed verbatim from DESIGN.md (production values).
   Light is the default; dark ships as two identical override
   blocks (user-forced + OS-preferred), both wrapped in
   @media not print — exactly like production.
   ============================================================ */

:root{
  color-scheme: light;

  /* --- primitives --- */
  --hsl-black: 0, 0%, 0%;
  --hsl-white: 0, 0%, 100%;

  /* ink */
  --color-ink-10: hsl(240, 7.7%, 97.5%);
  --color-ink-20: hsl(200, 11.1%, 94.7%);
  --color-ink-30: hsl(180, 3.7%, 89.4%);
  --color-ink-40: hsl(195, 3.6%, 78%);
  --color-ink-50: hsl(202.5, 4.1%, 62%);
  --color-ink-60: hsl(201.4, 6%, 45.5%);
  --color-ink-70: hsl(202.1, 18.8%, 19.8%);

  /* sand */
  --color-sand-10: hsl(33.3, 60%, 97.1%);
  --color-sand-20: hsl(34.3, 46.7%, 94.1%);
  --color-sand-30: hsl(31.4, 36.8%, 88.8%);
  --color-sand-40: hsl(31.6, 31.7%, 76.5%);
  --color-sand-50: hsl(32.9, 29.5%, 58.8%);
  --color-sand-60: hsl(33.8, 29.1%, 43.1%);
  --color-sand-70: hsl(34.1, 29.8%, 33.5%);

  /* slate — alias of ink in light, real ramp in dark */
  --color-slate-10: var(--color-ink-10);
  --color-slate-20: var(--color-ink-20);
  --color-slate-30: var(--color-ink-30);
  --color-slate-40: var(--color-ink-40);
  --color-slate-50: var(--color-ink-50);
  --color-slate-60: var(--color-ink-60);
  --color-slate-70: var(--color-ink-70);

  /* red */
  --color-red-10: hsl(10.9, 100%, 97.8%);
  --color-red-20: hsl(10.9, 100%, 95.7%);
  --color-red-30: hsl(12, 100%, 91.2%);
  --color-red-40: hsl(12.7, 100%, 80.6%);
  --color-red-50: hsl(13, 97.9%, 62.9%);
  --color-red-60: hsl(7.8, 63.6%, 49.6%);
  --color-red-70: hsl(6.7, 69.1%, 38%);

  /* orange */
  --color-orange-10: hsl(40, 100%, 95.9%);
  --color-orange-20: hsl(38.3, 100%, 90.8%);
  --color-orange-30: hsl(36.5, 100%, 84.5%);
  --color-orange-40: hsl(32.9, 93.5%, 69.8%);
  --color-orange-50: hsl(34.6, 98.4%, 48.4%);
  --color-orange-60: hsl(29.4, 98.9%, 36.9%);
  --color-orange-70: hsl(26.4, 98.7%, 29.4%);

  /* yellow */
  --color-yellow-10: hsl(51.4, 77.8%, 94.7%);
  --color-yellow-20: hsl(48.4, 93.4%, 88%);
  --color-yellow-30: hsl(48.1, 100%, 77.3%);
  --color-yellow-40: hsl(45.7, 92.8%, 67.3%);
  --color-yellow-50: hsl(46, 87.9%, 48.6%);
  --color-yellow-60: hsl(42.2, 96.2%, 31%);
  --color-yellow-70: hsl(39.1, 82.4%, 26.7%);

  /* lime */
  --color-lime-10: hsl(65.5, 73.3%, 94.1%);
  --color-lime-20: hsl(62.7, 71.4%, 87.6%);
  --color-lime-30: hsl(62.3, 66.4%, 76.7%);
  --color-lime-40: hsl(61.7, 52.7%, 60.2%);
  --color-lime-50: hsl(60.4, 62.2%, 42.5%);
  --color-lime-60: hsl(60.5, 100%, 23.9%);
  --color-lime-70: hsl(60.7, 78.2%, 21.6%);

  /* green */
  --color-green-10: hsl(102, 55.6%, 96.5%);
  --color-green-20: hsl(105, 55.6%, 92.9%);
  --color-green-30: hsl(110.5, 54.3%, 86.3%);
  --color-green-40: hsl(123, 44.1%, 73.3%);
  --color-green-50: hsl(135.6, 39.7%, 52.5%);
  --color-green-60: hsl(148.4, 68.8%, 31.4%);
  --color-green-70: hsl(149.3, 68.2%, 25.9%);

  /* aqua */
  --color-aqua-10: hsl(174, 55.6%, 96.5%);
  --color-aqua-20: hsl(177.3, 57.9%, 92.5%);
  --color-aqua-30: hsl(178.8, 62%, 84.5%);
  --color-aqua-40: hsl(183.5, 55.1%, 69.4%);
  --color-aqua-50: hsl(184.7, 87.4%, 40.4%);
  --color-aqua-60: hsl(186.7, 98.6%, 28.4%);
  --color-aqua-70: hsl(188.5, 79.1%, 26.3%);

  /* blue */
  --color-blue-10: hsl(201.4, 100%, 97.3%);
  --color-blue-20: hsl(205, 92.3%, 94.9%);
  --color-blue-30: hsl(205.9, 100%, 90%);
  --color-blue-40: hsl(208.4, 88.6%, 79.4%);
  --color-blue-50: hsl(209.2, 100%, 62.9%);
  --color-blue-60: hsl(211.2, 71.4%, 48%);
  --color-blue-70: hsl(213.3, 67.2%, 39.4%);

  /* violet */
  --color-violet-10: hsl(210, 100%, 97.6%);
  --color-violet-20: hsl(220, 90%, 96.1%);
  --color-violet-30: hsl(222.6, 100%, 92.5%);
  --color-violet-40: hsl(226.5, 92.2%, 84.9%);
  --color-violet-50: hsl(238.4, 100%, 77.6%);
  --color-violet-60: hsl(242.9, 82.7%, 66.1%);
  --color-violet-70: hsl(246.8, 49.4%, 51.2%);

  /* purple */
  --color-purple-10: hsl(255, 100%, 98.4%);
  --color-purple-20: hsl(252, 88.2%, 96.7%);
  --color-purple-30: hsl(253.1, 100%, 93.7%);
  --color-purple-40: hsl(255.2, 88.7%, 86.1%);
  --color-purple-50: hsl(261.7, 100%, 75.1%);
  --color-purple-60: hsl(267.9, 84.2%, 60.4%);
  --color-purple-70: hsl(267.3, 43.7%, 45.3%);

  /* pink */
  --color-pink-10: hsl(308.6, 63.6%, 97.8%);
  --color-pink-20: hsl(315, 72.7%, 95.7%);
  --color-pink-30: hsl(319.4, 81%, 91.8%);
  --color-pink-40: hsl(322.9, 73.9%, 82%);
  --color-pink-50: hsl(323.6, 81.4%, 66.3%);
  --color-pink-60: hsl(326.9, 54.9%, 52.2%);
  --color-pink-70: hsl(328.1, 55.8%, 39%);

  /* --- surfaces & page tints --- */
  --color-body: var(--color-page-tint);
  --color-canvas: hsl(var(--hsl-white));
  --color-canvas-light: var(--color-canvas);
  --color-inverted: white;
  --color-page-tint: var(--color-page-tint-1);
  --color-page-tint-1: hsl(135, 29%, 97%);
  --color-page-tint-2: hsl(277, 100%, 98.5%);
  --color-page-tint-3: hsl(26, 94%, 98%);
  --color-page-tint-4: hsl(214, 100%, 98%);
  --color-page-tint-5: hsl(0, 82%, 97.5%);
  --color-page-tint-6: hsl(0, 0%, 96.5%);

  /* --- semantic aliases --- */
  --color-ink: var(--color-ink-70);
  --color-slate: var(--color-slate-60);
  --color-sand: var(--color-sand-60);
  --color-red: var(--color-red-60);
  --color-orange: var(--color-orange-60);
  --color-yellow: var(--color-yellow-60);
  --color-green: var(--color-green-60);
  --color-blue: var(--color-blue-60);
  --color-purple: var(--color-purple-60);

  --color-text: var(--color-ink);
  --color-text-subtle: var(--color-ink-60);
  --color-text-placeholder: var(--color-ink-50);

  --color-warning: var(--color-warning-60);
  --color-warning-10: var(--color-red-10);
  --color-warning-20: var(--color-red-20);
  --color-warning-30: var(--color-red-30);
  --color-warning-40: var(--color-red-40);
  --color-warning-50: var(--color-red-50);
  --color-warning-60: var(--color-red-60);

  --focus-ring-color: var(--color-blue);
  --client-visibility-color: var(--color-yellow-40);
  --client-hidden-color: var(--color-blue-30);

  --color-uncolor: var(--color-uncolor-60);
  --color-uncolor-10: var(--color-sand-10);
  --color-uncolor-20: var(--color-sand-20);
  --color-uncolor-30: var(--color-sand-30);
  --color-uncolor-40: var(--color-sand-40);
  --color-uncolor-50: var(--color-sand-50);
  --color-uncolor-60: var(--color-sand-60);

  /* --- alpha tints --- */
  --tint-black-2: hsla(var(--hsl-black), 0.02);
  --tint-black-5: hsla(var(--hsl-black), 0.05);
  --tint-black-10: hsla(var(--hsl-black), 0.10);
  --tint-black-15: hsla(var(--hsl-black), 0.15);
  --tint-black-20: hsla(var(--hsl-black), 0.20);
  --tint-black-25: hsla(var(--hsl-black), 0.25);
  --tint-black-50: hsla(var(--hsl-black), 0.50);
  --tint-black-75: hsla(var(--hsl-black), 0.75);

  --tint-ink-2: color-mix(in hsl, transparent, var(--color-ink) 2%);
  --tint-ink-3: color-mix(in hsl, transparent, var(--color-ink) 3%);
  --tint-ink-5: color-mix(in hsl, transparent, var(--color-ink) 5%);
  --tint-ink-10: color-mix(in hsl, transparent, var(--color-ink) 10%);
  --tint-ink-15: color-mix(in hsl, transparent, var(--color-ink) 15%);
  --tint-ink-20: color-mix(in hsl, transparent, var(--color-ink) 20%);
  --tint-ink-25: color-mix(in hsl, transparent, var(--color-ink) 25%);
  --tint-ink-35: color-mix(in hsl, transparent, var(--color-ink) 35%);
  --tint-ink-50: color-mix(in hsl, transparent, var(--color-ink) 50%);
  --tint-ink-75: color-mix(in hsl, transparent, var(--color-ink) 75%);

  --tint-inverted-2: color-mix(in hsl, transparent, var(--color-inverted) 2%);
  --tint-inverted-5: color-mix(in hsl, transparent, var(--color-inverted) 5%);
  --tint-inverted-10: color-mix(in hsl, transparent, var(--color-inverted) 10%);
  --tint-inverted-15: color-mix(in hsl, transparent, var(--color-inverted) 15%);
  --tint-inverted-25: color-mix(in hsl, transparent, var(--color-inverted) 25%);
  --tint-inverted-50: color-mix(in hsl, transparent, var(--color-inverted) 50%);
  --tint-inverted-75: color-mix(in hsl, transparent, var(--color-inverted) 75%);

  /* --- recording colors --- */
  --recording-color-aqua: var(--color-aqua-50);
  --recording-color-blue: var(--color-blue-50);
  --recording-color-green: var(--color-green-50);
  --recording-color-orange: var(--color-orange-50);
  --recording-color-pink: var(--color-pink-50);
  --recording-color-purple: var(--color-purple-50);
  --recording-color-red: var(--color-red-50);
  --recording-color-sand: var(--color-sand-50);
  --recording-color-yellow: var(--color-yellow-50);
  --recording-color-gray: var(--color-ink-50);
  --recording-color-primary: var(--color-ink-50);
  --recording-color-canvas: var(--color-canvas);

  /* --- rich-text highlights --- */
  --highlight-1: var(--color-yellow-60);  --highlight-bg-1: var(--color-yellow-30);
  --highlight-2: var(--color-orange-60);  --highlight-bg-2: var(--color-orange-30);
  --highlight-3: var(--color-red-60);     --highlight-bg-3: var(--color-red-30);
  --highlight-4: var(--color-pink-60);    --highlight-bg-4: var(--color-pink-30);
  --highlight-5: var(--color-purple-60);  --highlight-bg-5: var(--color-purple-30);
  --highlight-6: var(--color-blue-60);    --highlight-bg-6: var(--color-blue-30);
  --highlight-7: var(--color-green-60);   --highlight-bg-7: var(--color-green-30);
  --highlight-8: var(--color-sand-60);    --highlight-bg-8: var(--color-sand-30);
  --highlight-9: var(--color-ink-60);     --highlight-bg-9: var(--color-ink-30);

  /* --- typography --- */
  --font-base: -apple-system, system-ui, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  --text-root: 10px;
  --text-10: var(--10px);
  --text-12: var(--12px);
  --text-14: var(--14px);
  --text-16: var(--16px);
  --text-18: var(--18px);
  --text-20: var(--20px);
  --text-24: var(--24px);
  --text-28: var(--28px);
  --text-32: var(--32px);
  --text-xs: var(--12px);
  --text-sm: var(--14px);
  --text-base: var(--16px);
  --text-md: var(--18px);
  --text-body: var(--20px);
  --line-height-base: 1.5;
  --line-height-snug: 1.35;
  --line-height-headings: 1.15;

  /* --- spacing --- */
  --1px: 0.1rem; --2px: 0.2rem; --4px: 0.4rem; --6px: 0.6rem; --8px: 0.8rem;
  --10px: 1rem; --12px: 1.2rem; --14px: 1.4rem; --16px: 1.6rem; --18px: 1.8rem;
  --20px: 2rem; --24px: 2.4rem; --28px: 2.8rem; --32px: 3.2rem; --36px: 3.6rem;
  --40px: 4rem; --44px: 4.4rem; --48px: 4.8rem; --56px: 5.6rem; --64px: 6.4rem;
  --72px: 7.2rem; --80px: 8rem; --88px: 8.8rem; --96px: 9.6rem;

  /* --- borders & radii --- */
  --border: 1px solid var(--color-ink-30);
  --border-uncolor: 1px solid var(--color-uncolor-30);
  --radius-xs: var(--2px);
  --radius-sm: var(--4px);
  --radius-md: var(--6px);
  --radius-lg: var(--8px);
  --radius-xl: var(--12px);

  /* --- shadows --- */
  --shadow-base: 0 -1px 1px hsla(var(--hsl-black), 0.025), 0 1px 2px -0.5px hsla(var(--hsl-black), 0.05);
  --shadow-sm: var(--shadow-base), 0 2px 4px -1px hsla(var(--hsl-black), 0.1);
  --shadow-md: var(--shadow-sm), 0 4px 8px -2px hsla(var(--hsl-black), 0.1);
  --shadow-lg: var(--shadow-md), 0 16px 32px -8px hsla(var(--hsl-black), 0.1);
  --shadow-xl: 0 0 3rem hsla(var(--hsl-black), 0.08);
  --shadow-modal: 0 0 0 1px hsla(var(--hsl-black), 0.1), 0 16px 24px -8px hsla(var(--hsl-black), 0.25), 0 24px 32px -16px hsla(var(--hsl-black), 0.25);
  --shadow-card: 0 0 0 1px hsla(var(--hsl-black), 0.05), 0 0.2em 0.2em hsla(var(--hsl-black), 0.05), 0 0.4em 0.4em hsla(var(--hsl-black), 0.05), 0 0.8em 0.8em hsla(var(--hsl-black), 0.05);

  /* --- motion --- */
  --duration-fast: 75ms;
  --duration-medium: 150ms;
  --duration-slow: 300ms;
  --ease-out-overshoot: cubic-bezier(0.25, 1.25, 0.5, 1);
  --ease-out-overshoot-lg: cubic-bezier(0.25, 1.35, 0.5, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

  /* --- layout & component metrics --- */
  --avatar-size-2xs: var(--16px);
  --avatar-size-xs: var(--24px);
  --avatar-size-sm: var(--32px);
  --avatar-size: var(--40px);
  --component-xs: var(--24px);
  --component-sm: var(--32px);
  --component-base: var(--40px);
  --component-lg: var(--48px);
  --component-xl: var(--64px);
  --nav-height: calc(var(--toolbar-size) + var(--16px) * 2);
  --nav-trigger-width: 15.8rem;
  --sidebar-width: clamp(40rem, 25vw, 56rem);
  --sidebar-space: var(--sidebar-width);
  --toolbar-size: var(--component-base);
  --toolbar-btn-size: var(--component-sm);
  --toolbar-badge-size: var(--24px);
  --tray-button-size: var(--component-sm);
  --tray-block-size: calc(var(--tray-button-size) + 1.6rem);
  --field-row-column-size: 12rem;
  --page-scroll-padding-start: 5.6rem;
  --page-scroll-padding-end: 3.2rem;
  --video-min-width: 22rem;
  --video-min-height: 12rem;
  --custom-safe-inset-top: var(--injected-safe-inset-top, env(safe-area-inset-top, 0px));
  --custom-safe-inset-right: var(--injected-safe-inset-right, env(safe-area-inset-right, 0px));
  --custom-safe-inset-bottom: var(--injected-safe-inset-bottom, env(safe-area-inset-bottom, 0px));
  --custom-safe-inset-left: var(--injected-safe-inset-left, env(safe-area-inset-left, 0px));

  /* --- z-index --- */
  --z-lexxy-toolbar: 2;
  --z-lexxy-internals: 3;
  --z-lexxy-toolbar-open: 4;
  --z-action-sheet: 20;
  --z-banner: 30;
  --z-toolbar: 40;
  --z-popup: 50;
  --z-flash: 60;
  --z-footer-trays: 70;
  --z-sidebar: 100;
  --z-pings: 101;
  --z-nav: 200;
  --z-modal: 300;

  /* --- feature tokens --- */
  --checkbox-size: var(--20px);
  --checkbox-gap: var(--8px);
  --todo-padding-block: var(--2px);
  --star-gradient: linear-gradient(135deg, var(--color-yellow-30), var(--color-yellow-40) 50%, var(--color-orange-40) 54%, var(--color-orange-50));
  --ledger-bg-color: var(--color-green-10);
  --ledger-toggle-color: var(--color-green-20);
  --ledger-border-color: var(--color-green-30);
  --ledger-border-color-alt: var(--color-orange-30);
  --ledger-label-color: var(--color-green-60);
  --kanbanColumnWidth: 25.5rem;
  --kanbanCardsMinWidth: 22rem;
  --kanbanSlimColumnWidth: 5.4rem;
  --kanbanGridGap: 1rem;
  --kanbanHighlightSize: var(--4px);
  --kanbanAnimationSpeed: 0.15s ease;

  /* --- rich-text editor (Trix + Lexxy) --- */
  --trix-contained-radius: 0.8rem;
  --trix-toolbar-padding: 0.3rem;
  --trix-toolbar-button-size: 3.6rem;
  --trix-toolbar-button-radius: calc(var(--trix-toolbar-padding) * 2);
  --trix-toolbar-button-gap: 0.2rem;
  --lexxy-color-ink: var(--color-ink);
  --lexxy-color-ink-medium: var(--tint-ink-50);
  --lexxy-color-ink-light: var(--tint-ink-20);
  --lexxy-color-ink-lighter: var(--tint-ink-10);
  --lexxy-color-ink-lightest: var(--tint-ink-5);
  --lexxy-color-ink-inverted: var(--color-canvas);
  --lexxy-color-accent-dark: var(--color-blue-70);
  --lexxy-color-accent-medium: var(--color-blue-40);
  --lexxy-color-accent-light: var(--color-blue-30);
  --lexxy-color-accent-lightest: var(--color-blue-20);
  --lexxy-color-red: var(--color-red-60);
  --lexxy-color-green: var(--color-green-60);
  --lexxy-color-blue: var(--color-blue-60);
  --lexxy-color-purple: var(--color-purple-60);
  --lexxy-color-selected: var(--lexxy-color-accent-light);
  --lexxy-color-selected-hover: var(--lexxy-color-accent-medium);
  --lexxy-color-selected-dark: var(--lexxy-color-accent-dark);
  --lexxy-text-small: 0.85em;
  --lexxy-content-margin: 0;

  /* --- code syntax (LCH) --- */
  --keyword: lch(50.16 68.78 25.97);
  --entity: lch(39.03 73.26 304.21);
  --constant: lch(39.68 63.13 279.47);
  --string: lch(19.22 34.92 275.47);
  --variable: lch(57.9 81.69 53.33);
  --comment: lch(47.93 7 254.8);
  --entity-tag: lch(49.14 52.75 142.85);
  --markup-heading: lch(39.68 63.13 279.47);
  --markup-list: lch(40.44 43.36 84.69);
  --markup-inserted: lch(49.14 52.75 142.85);
  --markup-deleted: lch(39.64 68.17 31.45);

  /* --- Duet date picker (light-only in production) --- */
  --duet-color-primary: #005fcc;
  --duet-color-surface: #fff;
  --duet-color-text: #333;
  --duet-color-overlay: rgba(0, 0, 0, 0.8);
  --duet-color-text-active: #fff;
  --duet-color-border: #333;
  --duet-color-placeholder: #666;
  --duet-color-button: #f5f5f5;
  --duet-radius: 4px;
  --duet-z-index: 600;
  --duet-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --duet-font-normal: 400;
  --duet-font-bold: 600;

  /* clone-only constants (component-scoped in production) */
  --options-panel-bg: hsl(211.2, 71.4%, 44%);
  --footer-pill-bg: hsl(33.3, 60%, 95%);
  --footer-pill-ink: hsl(202.1, 18.8%, 19.8%);
  --tool-title-color: hsl(13, 60%, 71%);
}

/* ============ dark block 1 — explicit user choice ============ */
@media not print {
:root[data-color-scheme="dark"]{
  color-scheme: dark;

  --color-canvas: var(--color-canvas-light);

/* --- mobile root overrides --- */
@media (width < 768px){
  :root{
    --text-md: var(--16px);
    --text-body: var(--16px);
    --sidebar-space: 0px;
    --z-sidebar: 201;
    --z-pings: 202;
  }
}

/* ============================ base ============================ */
*,*::before,*::after{ box-sizing:border-box; }
html{ font-size: var(--text-root); height:100%; }
body{
  margin:0; min-height:100%;
  background: var(--color-body);
  color: var(--color-text);
  font-family: var(--font-base);
  font-size: var(--text-base);
  line-height: var(--line-height-base);
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--tray-block-size) + var(--custom-safe-inset-bottom));
}
h1,h2,h3,h4,p{ margin:0; }
a{ color: var(--color-blue-60); text-decoration:none; }
a:hover{ text-decoration:underline; }
button{ font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer; }
input,textarea,select{ font:inherit; color:inherit; }
img,svg{ vertical-align:middle; max-width:100%; }
hr{ border:0; border-top:1px solid var(--tint-ink-15); margin:var(--24px) 0; }
::placeholder{ color: var(--color-text-placeholder); opacity:1; }
:focus-visible{ outline:2px solid var(--focus-ring-color); outline-offset:2px; border-radius:var(--radius-sm); }
.visually-hidden{ position:absolute!important; width:1px;height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }
.skip-link{ position:fixed; left:1rem; top:-6rem; z-index:calc(var(--z-nav) + 10); background:var(--color-canvas); color:var(--color-text); padding:1rem 1.6rem; border-radius:var(--radius-lg); box-shadow:var(--shadow-modal); transition: top var(--duration-medium) var(--ease-out-expo); }
.skip-link:focus{ top:1rem; }
.muted{ color: var(--color-text-subtle); }
.small{ font-size: var(--text-sm); }
.nowrap{ white-space:nowrap; }
mark{ background: var(--highlight-bg-1); color:inherit; border-radius:var(--radius-xs); padding:0 .2em; }
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; }
}
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-thumb{ background:var(--tint-ink-15); border-radius:5px; border:2px solid transparent; background-clip:content-box; }
::-webkit-scrollbar-track{ background:transparent; }

/* ============================ top nav ============================ */
.main-nav{
  position:relative; z-index:var(--z-nav);
  display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
  height:var(--nav-height); padding:0 var(--16px);
}
.nav-home{
  justify-self:start; display:inline-flex; align-items:center; gap:.8rem;
  font-weight:600; color:var(--color-text); padding:.6rem 1rem; border-radius:var(--radius-lg);
}
.nav-home:hover{ background:var(--tint-ink-5); text-decoration:none; }
.account-switcher{
  justify-self:center; display:inline-flex; align-items:center; gap:1rem;
  font-size:var(--text-20); font-weight:800; padding:.6rem 1.4rem; border-radius:var(--radius-lg);
}
.account-switcher:hover{ background:var(--tint-ink-5); }
.account-switcher .caret{ opacity:.7; }
.nav-right{ justify-self:end; }
.support-float{
  position:fixed; left:var(--16px); bottom:calc(var(--tray-block-size) + 1.6rem);
  z-index:var(--z-footer-trays); display:inline-flex; align-items:center; gap:.6rem;
  color:var(--color-text-subtle); font-size:var(--text-sm); padding:.6rem 1rem; border-radius:var(--radius-lg);
}
.support-float:hover{ background:var(--tint-ink-5); color:var(--color-text); }
@media (width < 900px){ .support-float{ display:none; } }

/* ============================ sheet ============================ */
.sheet{
  background: var(--color-canvas-light);
  max-width: 118rem; margin: 0 auto var(--32px);
  border-radius: var(--radius-xs);
  box-shadow: var(--shadow-card);
  min-height: calc(100vh - var(--nav-height) - 12rem);
  position:relative;
}
.sheet--wide{ max-width: min(178rem, calc(100vw - 3.2rem)); }
.sheet--flush .sheet-content{ max-width:none; padding-left:var(--24px); padding-right:var(--24px); }
.sheet-bar{
  position:sticky; top:0; z-index:var(--z-toolbar);
  display:flex; align-items:center; gap:var(--12px);
  padding: 0 var(--20px); min-height:var(--component-lg);
  background: color-mix(in hsl, var(--color-canvas-light), hsl(var(--hsl-black)) 22%);
  border-radius: var(--radius-xs) var(--radius-xs) 0 0;
}
:root[data-color-scheme="light"] .sheet-bar{ background: color-mix(in hsl, var(--color-canvas-light), hsl(var(--hsl-black)) 4%); }
@media (prefers-color-scheme: light){ :root:not([data-color-scheme="dark"]) .sheet-bar{ background: color-mix(in hsl, var(--color-canvas-light), hsl(var(--hsl-black)) 4%); } }
.crumbs{ display:flex; align-items:center; gap:.8rem; min-width:0; flex:1; font-size:var(--text-base); }
.crumbs a{ color:var(--color-text); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.crumbs a:not(:first-child){ font-weight:400; }
.crumbs .crumb-sep{ color:var(--color-text-subtle); font-size:var(--text-sm); }
.crumbs .crumb-here{ color:var(--color-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sheet-bar-actions{ display:flex; align-items:center; gap:.4rem; }
.bar-btn{
  display:inline-flex; align-items:center; gap:.6rem; padding:.6rem 1rem;
  border-radius:var(--radius-lg); color:var(--color-text); font-size:var(--text-sm); white-space:nowrap;
}
.bar-btn:hover{ background:var(--tint-ink-10); text-decoration:none; }
.bar-btn.is-on .icon{ color:var(--color-yellow-50); }
.sheet-content{
  max-width: 101rem; margin:0 auto;
  padding: var(--40px) var(--48px) var(--80px);
}
.sheet-ribbon{
  position:absolute; top:var(--12px); right:-2.6rem; width:2.6rem;
  writing-mode:vertical-rl; text-align:center;
  background:var(--color-canvas-light); color:var(--color-text-subtle);
  font-size:var(--text-xs); font-weight:700; letter-spacing:.05em;
  padding:1.2rem .2rem; border-radius:0 var(--radius-md) var(--radius-md) 0;
  box-shadow:var(--shadow-sm);
}
.sheet-ribbon--client{ background: var(--client-hidden-color); color:var(--color-blue-70); cursor:pointer; }
@media (width < 1300px){ .sheet-ribbon{ display:none; } }

/* page display heading */
.page-head{ margin-bottom: var(--20px); }
.display{
  font-size: clamp(3.2rem, 4.2vw, 4.6rem);
  font-weight: 800; line-height: var(--line-height-headings);
  letter-spacing: -0.015em; overflow-wrap:anywhere;
}
.page-sub{ color:var(--color-text-subtle); margin-top:var(--6px); font-size:var(--text-md); }

/* toolbar row under a tool title */
.toolbar{ display:flex; align-items:center; gap:var(--10px); flex-wrap:wrap; margin:var(--16px) 0 var(--28px); }
.toolbar .spacer{ flex:1; }

/* ============================ buttons ============================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:.7rem;
  padding:.8rem 1.6rem; border-radius:var(--radius-lg);
  font-weight:600; font-size:var(--text-base); line-height:1.3;
  border:1px solid transparent; white-space:nowrap;
  transition: background var(--duration-fast), border-color var(--duration-fast), transform var(--duration-fast);
}
.btn:hover{ text-decoration:none; }
.btn:active{ transform:scale(.985); }
.btn--primary{ background:var(--color-blue-50); color:hsl(0,0%,100%); }
:root[data-color-scheme="dark"] .btn--primary{ color:hsl(202.5,42.1%,7.5%); font-weight:700; }
@media (prefers-color-scheme: dark){ :root:not([data-color-scheme="light"]) .btn--primary{ color:hsl(202.5,42.1%,7.5%); font-weight:700; } }
.btn--primary:hover{ background: color-mix(in hsl, var(--color-blue-50), var(--color-blue-60) 35%); }
.btn--ghost{ border-color: var(--tint-ink-25); color:var(--color-text); background:transparent; }
.btn--ghost:hover{ background: var(--tint-ink-5); }
.btn--danger{ border-color: var(--color-warning-40); color: var(--color-warning-60); background:transparent; }
.btn--danger:hover{ background: color-mix(in hsl, transparent, var(--color-warning-50) 12%); }
.btn--sm{ padding:.5rem 1.1rem; font-size:var(--text-sm); }
.btn--quiet{ color:var(--color-text-subtle); }
.btn--quiet:hover{ background:var(--tint-ink-5); color:var(--color-text); }
.btn[disabled]{ opacity:.5; cursor:not-allowed; }
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:var(--toolbar-btn-size); height:var(--toolbar-btn-size); border-radius:50%;
  color:var(--color-text-subtle);
}
.icon-btn:hover{ background:var(--tint-ink-10); color:var(--color-text); }
.link-btn{ color:var(--color-blue-60); font-weight:500; }
.link-btn:hover{ text-decoration:underline; }

/* select-style pill with caret */
.pill-select{
  display:inline-flex; align-items:center; gap:.7rem; padding:.8rem 1.4rem;
  border:1px solid var(--tint-ink-25); border-radius:var(--radius-lg);
  font-size:var(--text-base); color:var(--color-text); background:transparent;
}
.pill-select:hover{ background:var(--tint-ink-5); }
.pill-select .caret{ opacity:.65; }

/* segmented control */
.seg{ display:inline-flex; border:1px solid var(--tint-ink-25); border-radius:var(--radius-lg); overflow:hidden; }
.seg > button{ padding:.8rem 1.4rem; font-size:var(--text-base); color:var(--color-text); display:inline-flex; align-items:center; gap:.6rem; }
.seg > button + button{ border-left:1px solid var(--tint-ink-15); }
.seg > button:hover{ background:var(--tint-ink-5); }
.seg > button[aria-pressed="true"]{ background:var(--tint-ink-15); font-weight:700; }

/* filter input */
.filter-input{
  padding:.8rem 1.4rem; min-width:14rem; width:18rem;
  border:1px solid var(--tint-ink-25); border-radius:var(--radius-lg);
  background:transparent; color:var(--color-text);
}
.filter-input:focus{ outline:2px solid var(--focus-ring-color); outline-offset:1px; }

/* text inputs */
.input, textarea.input{
  width:100%; padding:1rem 1.2rem; background:var(--tint-ink-3);
  border:1px solid var(--color-ink-30); border-radius:var(--radius-md); color:var(--color-text);
}
.field{ margin-bottom:var(--16px); }
.field > label{ display:block; font-weight:700; margin-bottom:.6rem; }
.field .hint{ font-weight:400; color:var(--color-text-subtle); font-size:var(--text-sm); margin-left:.6rem; }

/* on/off switch with labeled knob track */
.switch{ display:inline-flex; align-items:center; gap:1rem; cursor:pointer; user-select:none; }
.switch input{ position:absolute; opacity:0; pointer-events:none; }
.switch .track{
  position:relative; width:5.6rem; height:2.6rem; border-radius:1.3rem;
  background:var(--color-ink-40); transition:background var(--duration-medium);
  flex:none;
}
.switch .track::before{
  content:"Off"; position:absolute; right:.7rem; top:50%; transform:translateY(-50%);
  font-size:var(--text-10); font-weight:800; color:hsl(0,0%,100%); letter-spacing:.02em;
}
.switch .track::after{
  content:""; position:absolute; top:.3rem; left:.3rem; width:2rem; height:2rem; border-radius:50%;
  background:hsl(0,0%,100%); box-shadow:var(--shadow-sm);
  transition:left var(--duration-medium) var(--ease-out-expo);
}
.switch input:checked + .track{ background:var(--color-green-50); }
.switch input:checked + .track::before{ content:"On"; right:auto; left:.8rem; }
.switch input:checked + .track::after{ left:3.3rem; }
.switch input:focus-visible + .track{ outline:2px solid var(--focus-ring-color); outline-offset:2px; }
.switch .switch-label{ font-size:var(--text-base); }

/* ============================ avatars & people ============================ */
.avatar{
  display:inline-flex; align-items:center; justify-content:center; flex:none;
  width:var(--avatar-size-sm); height:var(--avatar-size-sm); border-radius:50%;
  color:hsl(0,0%,100%); font-weight:700; text-transform:uppercase; user-select:none;
  font-size: calc(var(--avatar-size-sm) * .42); letter-spacing:.02em;
}
.avatar--2xs{ width:var(--avatar-size-2xs); height:var(--avatar-size-2xs); font-size:1rem; }
.avatar--xs{ width:var(--avatar-size-xs); height:var(--avatar-size-xs); font-size:1.1rem; }
.avatar--lg{ width:var(--avatar-size); height:var(--avatar-size); font-size:1.7rem; }
.avatar--xl{ width:var(--component-xl); height:var(--component-xl); font-size:2.6rem; }
.facepile{ display:inline-flex; align-items:center; }
.facepile .avatar{ box-shadow:0 0 0 2px var(--color-canvas-light); }
.facepile .avatar + .avatar{ margin-left:-0.9rem; }
.facepile .overflow{ margin-left:.6rem; color:var(--color-text-subtle); font-size:var(--text-sm); }
.person-chip{
  display:inline-flex; align-items:center; gap:.6rem; padding:.2rem .9rem .2rem .3rem;
  background:var(--tint-ink-10); border-radius:2rem; font-size:var(--text-sm); font-weight:600;
  color:var(--color-text); white-space:nowrap;
}
a.person-chip:hover{ text-decoration:none; background:var(--tint-ink-15); }
.mention{
  display:inline-flex; align-items:center; gap:.4rem; padding:0 .7rem 0 .2rem;
  background:var(--tint-ink-10); border-radius:2rem; font-weight:600; font-size:.9em;
  white-space:nowrap; vertical-align:baseline;
}
.mention .avatar{ width:1.8rem; height:1.8rem; font-size:.9rem; }

/* ============================ badges & chips ============================ */
.count-badge{
  display:inline-flex; align-items:center; justify-content:center; flex:none;
  min-width:var(--toolbar-badge-size); height:var(--toolbar-badge-size); padding:0 .6rem;
  border-radius:1.2rem; background:var(--color-blue-30); color:var(--color-blue-70);
  font-size:var(--text-xs); font-weight:800;
}
.meta-badge{
  display:inline-flex; align-items:center; gap:.4rem; color:var(--color-text-subtle);
  font-size:var(--text-sm); font-weight:600;
}
.client-badge{
  display:inline-flex; align-items:center; gap:.5rem; padding:.2rem 1rem;
  background:var(--client-visibility-color); color:hsl(39.1,82.4%,16%);
  border-radius:2rem; font-size:var(--text-xs); font-weight:700;
}
.unread-dot{ width:.9rem; height:.9rem; border-radius:50%; background:var(--color-red-50); flex:none; }
.tag-pill{
  display:inline-flex; align-items:center; padding:.1rem 1rem; border-radius:2rem;
  border:1px solid var(--tint-ink-25); color:var(--color-text-subtle); font-size:var(--text-xs); font-weight:700;
}

/* boosts */
.boost-bar{ display:flex; align-items:center; flex-wrap:wrap; gap:.6rem; margin-top:var(--12px); }
.boost-chip{
  display:inline-flex; align-items:center; gap:.5rem; padding:.25rem 1rem .25rem .3rem;
  background:var(--tint-ink-10); border-radius:2rem; font-size:var(--text-base);
}
.boost-chip .avatar{ width:2.2rem; height:2.2rem; font-size:1rem; }
.boost-chip.mine{ box-shadow:inset 0 0 0 1px var(--tint-ink-25); cursor:pointer; }
.boost-chip.mine:hover{ background:var(--color-warning-30); }
.boost-add{
  display:inline-flex; align-items:center; justify-content:center; width:3rem; height:3rem;
  border-radius:50%; color:var(--color-text-subtle); opacity:.75;
}
.boost-add:hover{ background:var(--tint-ink-10); opacity:1; }
.boost-quickbar{ display:flex; align-items:center; gap:.2rem; padding:.4rem; }
.boost-quickbar button{ font-size:2rem; padding:.5rem .7rem; border-radius:var(--radius-md); }
.boost-quickbar button:hover{ background:var(--tint-ink-10); transform:scale(1.15); }
.boost-grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:.2rem; padding:.6rem; max-height:24rem; overflow:auto; }
.boost-grid button{ font-size:2rem; padding:.4rem; border-radius:var(--radius-md); }
.boost-grid button:hover{ background:var(--tint-ink-10); }
.boost-text-row{ display:flex; gap:.6rem; padding:.6rem; border-top:1px solid var(--tint-ink-10); }
.boost-text-row input{ flex:1; padding:.6rem 1rem; border:1px solid var(--tint-ink-25); border-radius:var(--radius-md); background:transparent; }

/* kbd */
kbd{
  font-family:var(--font-mono); font-size:var(--text-10); font-weight:700;
  padding:.2rem .6rem; border-radius:var(--radius-sm);
  background:var(--tint-ink-10); border:1px solid var(--tint-ink-20);
  border-bottom-width:2px; color:var(--color-text-subtle); text-transform:uppercase;
}
.kbd-hint{
  position:absolute; top:-0.8rem; right:-0.8rem; z-index:5; display:none;
}
body.show-kbd .kbd-hint{ display:inline-flex; }
body.show-kbd [data-kbd]{ position:relative; }

/* ============================ menus / popovers / modals ============================ */
.popover{
  position:fixed; z-index:calc(var(--z-modal) + 10);
  background:var(--color-canvas-light); border-radius:var(--radius-xl);
  box-shadow:var(--shadow-modal); min-width:22rem; max-width:min(38rem, calc(100vw - 2rem));
  animation:pop-in var(--duration-medium) var(--ease-out-overshoot);
}
@keyframes pop-in{ from{ opacity:0; transform:translateY(-4px) scale(.97); } }
.menu{ padding:.6rem; max-height:min(60vh, 48rem); overflow:auto; }
.menu-item{
  display:flex; align-items:center; gap:1rem; width:100%; text-align:left;
  padding:.8rem 1.2rem; border-radius:var(--radius-lg); color:var(--color-text); font-size:var(--text-base);
}
.menu-item:hover{ background:var(--tint-ink-10); text-decoration:none; }
.menu-item .icon{ flex:none; opacity:.8; }
.menu-item .right{ margin-left:auto; color:var(--color-text-subtle); font-size:var(--text-sm); }
.menu-item.danger{ color:var(--color-warning-60); }
.menu-caption{ padding:1rem 1.2rem .3rem; font-size:var(--text-xs); font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--color-text-subtle); }
.menu-sep{ border:0; border-top:1px solid var(--tint-ink-10); margin:.5rem .4rem; }

/* options popover — the vivid blue panel */
.popover.options{ background:var(--options-panel-bg); color:hsl(0,0%,100%); min-width:28rem; }
.popover.options .menu-item{ color:hsl(0,0%,100%); font-weight:600; }
.popover.options .menu-item:hover{ background:hsla(0,0%,100%,.14); }
.popover.options .menu-item .right{ color:hsla(0,0%,100%,.65); }
.popover.options .menu-caption{ color:hsla(0,0%,100%,.6); }
.popover.options .menu-sep{ border-top-color:hsla(0,0%,100%,.18); }
.popover.options .menu-item.danger{ color:hsl(14.4,93.6%,80%); }
.options-close{ position:absolute; top:.6rem; right:.6rem; color:hsla(0,0%,100%,.8); width:2.8rem; height:2.8rem; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; }
.options-close:hover{ background:hsla(0,0%,100%,.15); }

/* swatches */
.swatch-row{ display:flex; gap:.5rem; padding:.6rem 1.2rem 1rem; flex-wrap:wrap; }
.swatch{ width:2.6rem; height:2.6rem; border-radius:50%; border:2px solid transparent; }
.swatch:hover{ transform:scale(1.12); }
.swatch.on{ border-color:hsl(0,0%,100%); box-shadow:0 0 0 2px var(--tint-black-25); }

/* modal */
.overlay{
  position:fixed; inset:0; z-index:var(--z-modal); background:var(--tint-black-50);
  display:flex; align-items:flex-start; justify-content:center; overflow:auto;
  padding: 7vh var(--16px) var(--40px);
  animation:fade-in var(--duration-medium) ease;
}
@keyframes fade-in{ from{ opacity:0; } }
.modal{
  background:var(--color-canvas-light); border-radius:var(--radius-xl); box-shadow:var(--shadow-modal);
  width:min(56rem, 100%); padding:var(--28px) var(--32px); position:relative;
  animation:modal-in var(--duration-slow) var(--ease-out-overshoot);
}
@keyframes modal-in{ from{ opacity:0; transform:translateY(14px) scale(.98); } }
.modal--lg{ width:min(76rem,100%); }
.modal-title{ font-size:var(--text-24); font-weight:800; margin-bottom:var(--16px); padding-right:var(--32px); }
.modal-close{ position:absolute; top:1.2rem; right:1.2rem; }
.modal-actions{ display:flex; gap:1rem; margin-top:var(--24px); align-items:center; }

/* toast */
.toast-zone{ position:fixed; bottom:calc(var(--tray-block-size) + 1.6rem); left:50%; transform:translateX(-50%); z-index:var(--z-flash); display:flex; flex-direction:column; gap:.8rem; align-items:center; pointer-events:none; }
.toast{
  background:var(--color-ink-70); color:var(--color-canvas-light);
  padding:1rem 2rem; border-radius:3rem; box-shadow:var(--shadow-lg); font-weight:600;
  animation:toast-in var(--duration-slow) var(--ease-out-overshoot); pointer-events:auto; max-width:60rem;
}
@keyframes toast-in{ from{ opacity:0; transform:translateY(12px); } }
.toast.out{ opacity:0; transition:opacity var(--duration-slow); }

/* empty state */
.empty-state{
  border:2px dashed var(--tint-ink-20); border-radius:var(--radius-xl);
  padding:var(--48px) var(--32px); text-align:center; color:var(--color-text-subtle);
  margin:var(--24px) 0;
}
.empty-state .doodle{ margin-bottom:var(--16px); opacity:.7; }
.empty-state h3{ color:var(--color-text); font-size:var(--text-20); font-weight:800; margin-bottom:.6rem; }
.empty-state p{ max-width:46rem; margin:0 auto var(--16px); }
.stub-note{
  display:flex; gap:1rem; align-items:flex-start; margin:var(--16px) 0;
  background:var(--tint-ink-5); border:1px dashed var(--tint-ink-20); border-radius:var(--radius-lg);
  padding:var(--12px) var(--16px); color:var(--color-text-subtle); font-size:var(--text-sm);
}

/* hairline section heading: "What? ————" */
.rule-head{ display:flex; align-items:center; gap:1.4rem; margin:var(--32px) 0 var(--16px); }
.rule-head h2{ font-size:var(--text-24); font-weight:800; white-space:nowrap; }
.rule-head::after{ content:""; flex:1; border-top:1px solid var(--tint-ink-15); }

/* ============================ home ============================ */
.home{
  display:grid; grid-template-columns: 1fr 60rem 1fr; gap:var(--32px);
  align-items:start; padding: var(--24px) var(--24px) var(--64px);
  max-width:170rem; margin:0 auto;
}
.home-rail-left{ text-align:right; padding-top:var(--72px); }
.home-greeting{ font-size:var(--text-24); font-weight:800; margin-bottom:var(--20px); }
.home-actions{ display:flex; flex-direction:column; align-items:flex-end; gap:1rem; }
.home-card{
  background:var(--color-canvas-light); border-radius:var(--radius-xl); box-shadow:var(--shadow-card);
  padding: var(--28px) var(--24px) var(--32px); position:relative;
}
.home-account-name{ text-align:center; font-size:var(--text-24); font-weight:800; }
.home-jump-hint{ text-align:center; color:var(--color-text-subtle); margin:.6rem 0 var(--24px); font-size:var(--text-base); }
.home-projects{ display:flex; flex-direction:column; gap:var(--16px); }
.project-card{
  display:block; position:relative; border:1px solid var(--tint-ink-15); border-radius:var(--radius-lg);
  background:var(--tint-black-15); padding:var(--20px) var(--20px) var(--16px);
  color:var(--color-text); min-height:16rem;
  transition: border-color var(--duration-fast), transform var(--duration-medium) var(--ease-out-expo);
}
:root[data-color-scheme="light"] .project-card{ background:var(--color-canvas); }
@media (prefers-color-scheme: light){ :root:not([data-color-scheme="dark"]) .project-card{ background:var(--color-canvas); } }
.project-card:hover{ text-decoration:none; border-color:var(--tint-ink-35); transform:translateY(-1px); }
.project-card h3{ font-size:var(--text-20); font-weight:800; padding-right:3rem; }
.project-card .desc{
  color:var(--color-text-subtle); margin-top:.4rem;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.project-card .card-foot{ display:flex; align-items:center; gap:1rem; margin-top:var(--16px); min-height:3.2rem; }
.project-card .badges{ margin-left:auto; display:flex; gap:.6rem; }
.star-btn{
  position:absolute; top:1rem; right:1rem; width:3.2rem; height:3.2rem; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center; color:var(--color-text-subtle);
  opacity:0; transition:opacity var(--duration-fast);
}
.project-card:hover .star-btn, .star-btn.on{ opacity:1; }
.star-btn:hover{ background:var(--tint-ink-10); }
.star-btn.on svg{ fill:url(#starGrad); stroke:none; }
.folder-card{ border:1px solid var(--tint-ink-15); border-radius:var(--radius-lg); padding:var(--16px) var(--20px); }
.folder-card h4{ font-size:var(--text-base); font-weight:800; color:var(--color-text-subtle); text-transform:uppercase; letter-spacing:.06em; margin-bottom:1rem; display:flex; gap:.8rem; align-items:center; }
.home-rail-right{ padding-top:var(--72px); max-width:38rem; }
.home-rail-right h2{ font-size:var(--text-20); font-weight:800; margin-bottom:var(--16px); }
.mini-feed{ position:relative; padding-left:1.2rem; }
.mini-feed::before{ content:""; position:absolute; left:.35rem; top:.8rem; bottom:.8rem; width:2px; background:var(--tint-ink-15); }
.mini-feed-item{ position:relative; margin-bottom:var(--16px); font-size:var(--text-sm); }
.mini-feed-item .t{ color:var(--color-text-subtle); font-size:var(--text-xs); display:block; }
.mini-feed-item::before{ content:""; position:absolute; left:-1.25rem; top:.55rem; width:.9rem; height:.9rem; border-radius:50%; background:var(--color-ink-40); box-shadow:0 0 0 3px var(--color-body); }
.home-active-row{ margin-top:var(--24px); text-align:center; color:var(--color-text-subtle); font-size:var(--text-sm); }
.home-active-row .facepile{ margin-top:.8rem; }
.home-expand{ position:absolute; top:1.4rem; right:1.4rem; }
@media (width < 1200px){
  .home{ grid-template-columns:1fr; max-width:64rem; }
  .home-rail-left{ text-align:left; padding-top:var(--16px); }
  .home-actions{ align-items:flex-start; flex-direction:row; flex-wrap:wrap; }
  .home-rail-right{ padding-top:0; max-width:none; }
}

/* ============================ jump menu ============================ */
.jump-overlay{
  position:fixed; inset:0; z-index:var(--z-modal); background:var(--tint-black-50);
  display:flex; justify-content:center; align-items:flex-start; padding:calc(var(--nav-height) + .4rem) var(--16px) var(--32px);
  animation:fade-in var(--duration-fast) ease;
}
.jump{
  width:min(56rem, 100%); background:var(--color-canvas-light); border-radius:var(--radius-xl);
  box-shadow:var(--shadow-modal); padding:var(--16px); max-height:calc(100vh - var(--nav-height) - 4rem);
  overflow:auto; animation:jump-in var(--duration-slow) var(--ease-out-expo);
}
@keyframes jump-in{ from{ opacity:0; transform:translateY(-12px); } }
.jump-tiles{ display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:var(--16px); }
.jump-tile{
  display:flex; flex-direction:column; align-items:center; gap:.8rem; padding:1.6rem .6rem 1.2rem;
  background:var(--tint-ink-5); border-radius:var(--radius-lg); color:var(--color-text); font-weight:600; font-size:var(--text-sm);
  position:relative;
}
.jump-tile:hover{ background:var(--tint-ink-10); text-decoration:none; }
.jump-search{ width:100%; padding:1.1rem 1.4rem; font-size:var(--text-md); background:transparent; color:var(--color-text);
  border:2px solid var(--focus-ring-color); border-radius:var(--radius-lg); margin-bottom:var(--12px); }
.jump-search:focus{ outline:none; }
.jump-section{ padding:.6rem .4rem .2rem; font-weight:800; color:var(--color-text); display:flex; align-items:center; gap:1rem; }
.jump-section .see-all{ font-weight:500; font-size:var(--text-sm); }
.jump-row{
  display:flex; align-items:center; gap:1.2rem; width:100%; text-align:left;
  padding:.7rem 1rem; border-radius:var(--radius-lg); color:var(--color-text); font-size:var(--text-md);
}
.jump-row:hover, .jump-row.sel{ background:var(--tint-ink-10); text-decoration:none; }
.jump-row .jr-icon{
  width:2.8rem; height:2.8rem; border-radius:50%; flex:none; display:inline-flex; align-items:center; justify-content:center;
  background:var(--tint-ink-10); font-size:1.4rem;
}
.jump-row .right{ margin-left:auto; }
.jump-foot{
  display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
  border-top:1px solid var(--tint-ink-10); margin-top:var(--12px); padding:1rem .6rem 0;
  color:var(--color-text-subtle); font-size:var(--text-sm);
}
.jump-foot .links{ display:flex; gap:1.4rem; }
.jump-archived{ display:flex; align-items:center; gap:.6rem; padding:.6rem; color:var(--color-text-subtle); font-size:var(--text-sm); }

/* ============================ sidebar ============================ */
.sidebar-overlay{ position:fixed; inset:0; z-index:var(--z-sidebar); background:var(--tint-black-25); animation:fade-in var(--duration-fast) ease; }
.sidebar{

}
@keyframes slide-in{ from{ transform:translateX(30px); opacity:0; } }
.sidebar-scroll{ flex:1; overflow:auto; padding:var(--16px) var(--20px) var(--16px); }
.sidebar-head{ display:flex; align-items:center; gap:1rem; margin-bottom:var(--8px); }
.sidebar-head h2{ font-size:var(--text-20); font-weight:800; }
.sidebar-head .mark-read{ margin-left:auto; }
.sidebar h3.sb-sec{
  display:flex; align-items:center; gap:1rem; font-size:var(--text-md); font-weight:800; margin:var(--20px) 0 var(--8px);
}

.sidebar h3.sb-sec .right{ margin-left:auto; font-size:var(--text-sm); font-weight:500; }
.ping-new{
  width:3.2rem; height:3.2rem; border-radius:50%; border:2px dashed var(--tint-ink-25);
  display:inline-flex; align-items:center; justify-content:center; color:var(--color-text-subtle);
}
.ping-new:hover{ border-color:var(--color-blue-50); color:var(--color-blue-60); }
.sb-row{
  display:flex; gap:1.2rem; width:100%; text-align:left; padding:1rem; border-radius:var(--radius-lg);
  color:var(--color-text); align-items:flex-start; position:relative;
}
.sb-row:hover{ background:var(--tint-ink-5); text-decoration:none; }
.sb-row .sb-body{ min-width:0; flex:1; }
.sb-row .sb-title{ font-weight:700; }
.sb-row .sb-ex{ color:var(--color-text-subtle); font-size:var(--text-sm); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.sb-row .sb-meta{ color:var(--color-text-subtle); font-size:var(--text-xs); margin-top:.2rem; }
.sb-row .unread-dot{ margin-top:.8rem; }
.sb-row .sb-bubble{ position:absolute; right:.6rem; bottom:.6rem; opacity:0; }
.sb-row:hover .sb-bubble{ opacity:1; }
.sb-empty{ color:var(--color-text-subtle); font-size:var(--text-sm); padding:.6rem 1rem var(--8px); }
.sidebar-foot{
  border-top:1px solid var(--tint-ink-10); padding:var(--12px) var(--20px);
  display:flex; gap:1rem; align-items:center;
}
.sidebar-foot .filter-input{ flex:1; width:auto; }
.shhh-btn{ display:inline-flex; align-items:center; gap:.6rem; color:var(--color-text-subtle); font-size:var(--text-sm); padding:.6rem 1rem; border-radius:var(--radius-lg); white-space:nowrap; }
.shhh-btn:hover{ background:var(--tint-ink-5); }
.shhh-btn.on{ color:var(--color-orange-50); font-weight:700; }

/* ============================ my bar ============================ */
.my-bar{
  position:fixed; left:0; right:0; bottom:0; z-index:var(--z-footer-trays);
  height:calc(var(--tray-block-size) + var(--custom-safe-inset-bottom));
  padding:0 var(--16px) var(--custom-safe-inset-bottom);
  background:var(--color-inverted); border-top:1px solid var(--tint-ink-10);
  display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
}
.my-bar .bar-left{ display:flex; align-items:center; gap:1rem; }
.my-bar .bar-center{ display:flex; align-items:center; gap:.4rem; justify-content:center; }
.my-bar .bar-right{ display:flex; justify-content:flex-end; }
.tray-btn{
  display:inline-flex; align-items:center; gap:.7rem; height:var(--tray-button-size);
  padding:0 1.3rem; border-radius:var(--radius-lg); color:var(--color-text); font-weight:600; font-size:var(--text-base);
  position:relative;
}
.tray-btn:hover, .tray-btn.open{ background:var(--tint-ink-10); }
.avatar-btn{ border-radius:50%; }
.avatar-btn:hover{ box-shadow:0 0 0 3px var(--tint-ink-15); }
.pings-pill{
  display:inline-flex; align-items:center; gap:.8rem; padding:.7rem 1.6rem;
  background:var(--footer-pill-bg); color:var(--footer-pill-ink); border-radius:3rem;

}

.pings-pill .dot{ width:1.1rem; height:1.1rem; border-radius:50%; background:var(--color-ink-40); }
.pings-pill .dot.hot{ background:hsl(28.9, 88%, 55%); }
.pings-pill .plus{ opacity:.6; font-weight:800; padding:0 .1rem; }
.pings-pill .plus:hover{ opacity:1; }
@media (width < 760px){
  .tray-btn span.lbl{ display:none; }
  .tray-btn{ padding:0 1rem; }
  .pings-pill span.lbl{ display:none; }
}

/* tray popovers */
.tray{
  position:fixed; z-index:var(--z-footer-trays); bottom:calc(var(--tray-block-size) + 1rem);
  left:50%; transform:translateX(-50%);
  width:min(44rem, calc(100vw - 2rem)); max-height:min(60vh, 52rem);
  background:var(--color-canvas-light); border-radius:var(--radius-xl); box-shadow:var(--shadow-modal);
  display:flex; flex-direction:column; overflow:hidden;
  animation:tray-in var(--duration-slow) var(--ease-out-overshoot);
}
@keyframes tray-in{ from{ opacity:0; transform:translate(-50%, 10px); } }
.tray-head{ padding:var(--16px) var(--20px) var(--8px); display:flex; align-items:center; gap:1rem; }
.tray-head h3{ font-size:var(--text-md); font-weight:800; }
.tray-head .right{ margin-left:auto; }
.tray-body{ padding:0 var(--12px) var(--16px); overflow:auto; }
.tray-row{
  display:flex; align-items:center; gap:1rem; padding:.8rem 1rem; border-radius:var(--radius-lg);
  color:var(--color-text); width:100%; text-align:left;
}
.tray-row:hover{ background:var(--tint-ink-5); text-decoration:none; }
.tray-row .sub{ color:var(--color-text-subtle); font-size:var(--text-sm); }
.tray-group{ padding:1rem 1rem .2rem; font-size:var(--text-xs); font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--color-text-subtle); }

/* ============================ project dock ============================ */
.project-header{ text-align:left; padding-top:var(--8px); }
.project-header .display{ display:inline; margin-right:1rem; }
.project-desc{ font-size:var(--text-body); margin-top:var(--8px); max-width:92rem; }
.project-meta-row{ display:flex; align-items:center; gap:1.2rem; margin-top:var(--16px); flex-wrap:wrap; }
.date-pill{ display:inline-flex; align-items:center; gap:.7rem; border:1px solid var(--tint-ink-25); border-radius:2rem; padding:.4rem 1.4rem; font-size:var(--text-sm); color:var(--color-text-subtle); }
.dock{ display:grid; grid-template-columns:repeat(3, 1fr); gap:var(--24px); margin-top:var(--40px); }
.dock-item h2{
  color:var(--tool-title-color); font-size:var(--text-20); font-weight:700; margin:0 0 var(--8px) var(--4px);
  display:flex; align-items:center; gap:.8rem;
}
.dock-item h2 a{ color:inherit; }
.dock-item .quick-add{ opacity:0; margin-left:auto; }
.dock-item:hover .quick-add{ opacity:1; }
.dock-card{
  display:block; background:var(--tint-black-15); border:1px solid var(--tint-ink-10); border-radius:var(--radius-xl);
  height:37rem; overflow:hidden; color:var(--color-text); position:relative; padding:var(--16px);
  transition:border-color var(--duration-fast);
}
:root[data-color-scheme="light"] .dock-card{ background:var(--color-canvas); box-shadow:var(--shadow-base); }
@media (prefers-color-scheme: light){ :root:not([data-color-scheme="dark"]) .dock-card{ background:var(--color-canvas); box-shadow:var(--shadow-base); } }
.dock-card:hover{ text-decoration:none; border-color:var(--tint-ink-25); }
.dock-card::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:6rem; background:linear-gradient(transparent, var(--tint-black-10)); pointer-events:none; }
.dock-add{
  border:2px dashed var(--tint-ink-20); border-radius:var(--radius-xl); height:37rem; margin-top:var(--36px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; color:var(--color-text-subtle); width:100%;
}
.dock-add:hover{ border-color:var(--color-blue-50); color:var(--color-blue-60); background:var(--tint-ink-2); }
.dock-add .big-plus{ font-size:5rem; font-weight:300; line-height:1; }
@media (width < 1100px){ .dock{ grid-template-columns:1fr 1fr; } }
@media (width < 720px){ .dock{ grid-template-columns:1fr; } .dock-card{ height:auto; min-height:20rem; } }

/* dock previews */
.dp-msg{ display:flex; gap:1rem; padding:.7rem 0; align-items:flex-start; }
.dp-msg .t{ font-weight:700; line-height:1.3; }
.dp-msg .x{ color:var(--color-text-subtle); font-size:var(--text-sm); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.dp-first{ border-bottom:1px solid var(--tint-ink-10); padding-bottom:1rem; margin-bottom:.4rem; }
.dp-first .who{ display:flex; gap:1rem; align-items:center; margin-bottom:.8rem; }
.dp-first .who .nm{ font-weight:700; line-height:1.2; }
.dp-first .who .dt{ color:var(--color-text-subtle); font-size:var(--text-sm); }
.dp-todo-list{ margin-bottom:1.2rem; }
.dp-todo-list .lh{ display:flex; align-items:center; gap:.8rem; font-weight:800; margin-bottom:.4rem; }
.dp-todo{ display:flex; align-items:center; gap:.8rem; padding:.25rem 0 .25rem 2.4rem; font-size:var(--text-base); }
.dp-kanban{ display:flex; gap:.6rem; height:29rem; margin-top:.6rem; }
.dp-kanban .dpk-col{ flex:1; border-radius:var(--radius-md); position:relative; background:var(--tint-ink-5); overflow:hidden; }
.dp-kanban .dpk-col .cnt{ display:block; text-align:center; padding-top:.6rem; font-size:var(--text-xs); color:var(--color-text-subtle); font-weight:700; }
.dp-kanban .dpk-col .nm{
  position:absolute; top:3.4rem; left:50%; transform:translateX(-50%);
  writing-mode:vertical-rl; font-size:var(--text-10); font-weight:800; letter-spacing:.12em; text-transform:uppercase;
  color:var(--color-text-subtle); white-space:nowrap; max-height:24rem; overflow:hidden;
}
.dp-triage{ font-size:var(--text-xs); font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-subtle); }
.dp-file{ display:flex; gap:1rem; padding:.7rem 0; align-items:center; }
.dp-file .fi{ flex:none; }
.dp-chat-line{ display:flex; gap:.8rem; padding:.5rem 0; align-items:flex-start; font-size:var(--text-sm); }
.dp-chat-line .b{ background:var(--tint-ink-5); border-radius:var(--radius-lg); padding:.6rem 1rem; min-width:0; }
.dp-chat-line .b .nm{ font-weight:700; margin-right:.6rem; }
.dp-chat-line .b .tm{ color:var(--color-text-subtle); font-size:var(--text-xs); }
.dp-chat-line .b .tx{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.dp-cal{ font-size:var(--text-sm); }
.dp-cal .dpc-head{ text-align:center; font-weight:800; margin:.4rem 0 .8rem; }
.dp-cal table{ width:100%; border-collapse:collapse; text-align:center; }
.dp-cal th{ font-size:var(--text-10); color:var(--color-text-subtle); font-weight:700; padding:.2rem; }
.dp-cal td{ padding:.35rem 0; position:relative; color:var(--color-text-subtle); }
.dp-cal td.cur{ color:var(--color-text); font-weight:600; }
.dp-cal td.today span{ background:var(--color-blue-50); color:white; border-radius:50%; display:inline-flex; width:2.2rem; height:2.2rem; align-items:center; justify-content:center; }
.dp-cal td.has::after{ content:""; position:absolute; left:50%; transform:translateX(-50%); bottom:-.1rem; width:.5rem; height:.5rem; border-radius:50%; background:var(--recording-color-green); }
.dp-upcoming{ margin-top:1rem; border-top:1px solid var(--tint-ink-10); padding-top:.8rem; }
.dp-upcoming .u{ display:flex; gap:.8rem; padding:.3rem 0; font-size:var(--text-sm); }
.dp-upcoming .u .d{ color:var(--color-text-subtle); flex:none; width:7rem; }

/* people row on dock breadcrumb */
.people-bar{ display:flex; align-items:center; gap:.8rem; }
.add-person-btn{
  width:3.2rem; height:3.2rem; border-radius:50%; border:1px dashed var(--tint-ink-25);
  display:inline-flex; align-items:center; justify-content:center; color:var(--color-text-subtle); flex:none;
}
.add-person-btn:hover{ border-color:var(--color-blue-50); color:var(--color-blue-60); }

/* ============================ message board ============================ */
.pin-sec-label{ display:flex; align-items:center; gap:.8rem; color:var(--color-text-subtle); font-weight:700; margin:var(--8px) 0; }
.board-row{
  display:flex; gap:var(--16px); padding:var(--16px) 0; border-top:1px solid var(--tint-ink-10);
  color:var(--color-text); align-items:flex-start; position:relative;
}
.board-row:hover{ text-decoration:none; background:var(--tint-ink-2); }
.board-row .avatar{ margin-top:.3rem; }
.board-row .b-main{ flex:1; min-width:0; }
.board-row h3{ font-size:var(--text-20); font-weight:800; line-height:1.25; }
.board-row .b-line{
  margin-top:.2rem; color:var(--color-text); font-size:var(--text-md);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.board-row .b-line .cat{ color:var(--color-blue-60); font-weight:500; }
.board-row .b-line .dt{ color:var(--color-blue-60); }
.board-row .b-line .sep{ color:var(--color-text-subtle); padding:0 .35rem; }
.board-row .b-line .ex{ color:var(--color-text-subtle); }
.pin-divider{ display:flex; justify-content:center; padding:var(--12px) 0; }
.pin-divider span{ width:9rem; height:.5rem; border-radius:.3rem; background:var(--tint-ink-15); }

/* recording page */
.rec-head .display{ margin-bottom:var(--8px); }
.rec-byline{ display:flex; align-items:center; gap:.8rem; color:var(--color-text-subtle); font-size:var(--text-md); flex-wrap:wrap; }
.rec-byline .avatar{ margin:0 .2rem; }
.rec-byline b{ color:var(--color-text); }
.rich{ font-size:var(--text-body); line-height:1.6; margin-top:var(--24px); overflow-wrap:anywhere; }
.rich h2{ font-size:var(--text-24); font-weight:800; margin:1.2em 0 .4em; }
.rich h3{ font-size:var(--text-20); font-weight:800; margin:1em 0 .3em; }
.rich p{ margin:.7em 0; }
.rich ul,.rich ol{ margin:.7em 0; padding-left:2.6rem; }
.rich blockquote{ margin:1em 0; padding:.2em 0 .2em 1.6rem; border-left:3px solid var(--tint-ink-25); color:var(--color-text-subtle); }
.rich pre{ background:var(--tint-ink-5); border-radius:var(--radius-lg); padding:1.2rem 1.6rem; font-family:var(--font-mono); font-size:var(--text-sm); overflow:auto; }
.rich code{ font-family:var(--font-mono); font-size:.85em; background:var(--tint-ink-10); border-radius:var(--radius-xs); padding:.1em .4em; }
.rich pre code{ background:none; padding:0; }
.rich img, .rich svg{ max-width:100%; border-radius:var(--radius-lg); }

.rich a{ text-decoration:underline; text-underline-offset:2px; }
.comments-sec{ border-top:1px solid var(--tint-ink-15); margin-top:var(--40px); padding-top:var(--28px); }
.comment{ display:flex; gap:var(--16px); padding:var(--16px) 0; position:relative; }
.comment .c-main{ flex:1; min-width:0; }
.comment .c-head{ display:flex; align-items:baseline; gap:.8rem; flex-wrap:wrap; }
.comment .c-head b{ font-size:var(--text-md); }
.comment .c-head .t{ color:var(--color-text-subtle); font-size:var(--text-sm); }
.comment .c-body{ font-size:var(--text-body); margin-top:.3rem; }
.comment .c-opts{ position:absolute; right:0; top:1.2rem; opacity:0; }
.comment:hover .c-opts{ opacity:1; }
.comment.evt{ align-items:center; color:var(--color-text-subtle); font-size:var(--text-sm); gap:1rem; padding:.6rem 0; }
.comment.evt .evt-ic{ width:3.2rem; display:flex; justify-content:center; flex:none; }
.sub-footer{
  border-top:1px solid var(--tint-ink-15); margin-top:var(--32px); padding-top:var(--20px);
  color:var(--color-text-subtle); font-size:var(--text-sm);
}
.sub-footer .sf-row{ display:flex; align-items:center; gap:1.2rem; margin-top:1rem; flex-wrap:wrap; }
.composer{ display:flex; gap:var(--16px); margin-top:var(--16px); }
.composer .c-main{ flex:1; min-width:0; }

/* ============================ to-dos ============================ */
.todo-checkbox{
  width:var(--checkbox-size); height:var(--checkbox-size); flex:none;
  border:2px solid var(--color-ink-40); border-radius:var(--radius-sm); background:transparent;

  cursor:pointer; padding:0;
}
.todo-checkbox:hover{ border-color:var(--color-green-50); }
.todo-checkbox.done{ background:var(--color-green-50); border-color:var(--color-green-50); color:hsl(0,0%,100%); }

.todolist-block{ margin:var(--36px) 0; }
.todolist-head{ display:flex; align-items:flex-start; gap:var(--10px); }
.todolist-head .pie{ flex:none; margin-top:.5rem; }
.todolist-head h2{ font-size:var(--text-24); font-weight:800; }
.todolist-head h2 a{ color:var(--color-text); }
.todolist-head .tl-opts{ opacity:0; margin-left:.4rem; }
.todolist-block:hover .tl-opts{ opacity:1; }
.todolist-desc{ color:var(--color-text-subtle); margin:.2rem 0 .6rem calc(var(--20px) + var(--10px)); font-size:var(--text-md); }
.todo-rows{ margin-left:calc(var(--20px) + var(--10px)); }
.todo-row{
  display:flex; align-items:center; gap:var(--checkbox-gap); padding:calc(var(--todo-padding-block) + .35rem) 0;
  font-size:var(--text-md); flex-wrap:wrap; position:relative;
}
.todo-row .tt{ color:var(--color-text); font-weight:500; }
.todo-row .tt:hover{ text-decoration:underline; }
.todo-row.done .tt{ color:var(--color-text-subtle); text-decoration:line-through; }

.todo-row.fading{ opacity:.35; transition:opacity .4s; }
.due-chip{ display:inline-flex; align-items:center; gap:.5rem; border:1px solid var(--tint-ink-25); border-radius:2rem; padding:.1rem 1rem; font-size:var(--text-sm); color:var(--color-text-subtle); white-space:nowrap; }
.due-chip.overdue{ color:var(--color-warning-60); border-color:var(--color-warning-40); }
.add-todo-row{ display:flex; align-items:center; gap:var(--checkbox-gap); padding:.6rem 0; }
.add-todo-row > a, .add-todo-row > button.link-like{ color:var(--color-blue-60); text-decoration:underline; text-underline-offset:3px; font-size:var(--text-md); }
.n-completed{ display:flex; align-items:center; gap:var(--checkbox-gap); padding:.6rem 0; color:var(--color-text-subtle); font-size:var(--text-md); }
.n-completed .todo-checkbox{ pointer-events:none; background:transparent; border-color:var(--color-green-50); color:var(--color-green-50); }
.quick-add{ }
.quick-add-form{ margin:.6rem 0; padding:var(--12px); border:1px solid var(--tint-ink-20); border-radius:var(--radius-lg); background:var(--tint-ink-2); max-width:56rem; }
.quick-add-form input[type="text"]{ width:100%; background:transparent; border:0; font-size:var(--text-md); color:var(--color-text); padding:.4rem 0; }
.quick-add-form input[type="text"]:focus{ outline:none; }
.quick-add-form .qa-row{ display:flex; gap:.8rem; margin-top:.8rem; align-items:center; flex-wrap:wrap; }

/* field rows (to-do & card pages) */
.field-rows{ margin-top:var(--32px); display:flex; flex-direction:column; gap:var(--16px); }
.field-row{ display:grid; grid-template-columns:var(--field-row-column-size) 1fr; gap:var(--20px); align-items:baseline; }

  font-weight:600; flex-wrap:wrap;
}

/* ------------------------- tiny DOM utils ------------------------- */
const $  = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => Array.from(el.querySelectorAll(s));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const MIN = 60e3, HOUR = 36e5, DAY = 864e5, WEEK = 7*DAY;

/* ------------------------- date helpers ------------------------- */
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON3 = MONTHS.map(m => m.slice(0,3));
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY3 = DAYS.map(d => d.slice(0,3));

function at(ts, h, m=0){ const d = new Date(ts); d.setHours(h, m, 0, 0); return d.getTime(); }
function startOfDay(ts){ const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function sameDay(a,b){ return startOfDay(a) === startOfDay(b); }
function fmtTime(ts){
  const d = new Date(ts); let h = d.getHours(); const m = d.getMinutes(); const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12; return h + ':' + String(m).padStart(2,'0') + ap;
}
function fmtDay(ts){
  const d = new Date(ts), now = new Date();
  return MON3[d.getMonth()] + ' ' + d.getDate() + (d.getFullYear() !== now.getFullYear() ? ', ' + d.getFullYear() : '');
}
function fmtDayLong(ts){ const d = new Date(ts); return DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate(); }
function fmtDayFull(ts){ const d = new Date(ts); return MONTHS[d.getMonth()] + ' ' + d.getDate(); }
function fmtWhen(ts){
  const now = Date.now();
  if (sameDay(ts, now)) return fmtTime(ts);
  if (sameDay(ts, now - DAY)) return 'yesterday at ' + fmtTime(ts);
  if (now - ts < 6*DAY && ts < now) return DAY3[new Date(ts).getDay()] + ' at ' + fmtTime(ts);
  return fmtDay(ts);
}
function fmtDue(ts){
  const today = startOfDay(Date.now()), d = startOfDay(ts);
  if (d === today) return 'Today';
  if (d === today + DAY) return 'Tomorrow';
  if (d === today - DAY) return 'Yesterday';
  if (d > today && d < today + 6*DAY) return DAYS[new Date(ts).getDay()];
  return DAY3[new Date(ts).getDay()] + ', ' + MON3[new Date(ts).getMonth()] + ' ' + new Date(ts).getDate();
}
function dateInputVal(ts){ const d = new Date(ts); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function parseDateInput(v){ if(!v) return null; const [y,m,d] = v.split('-').map(Number); return new Date(y, m-1, d, 12, 0, 0).getTime(); }
function greeting(){ const h = new Date().getHours(); return h < 5 ? 'Good night' : h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'; }

/* ------------------------- store ------------------------- */
const LS_KEY = 'bc5proto.v1';
let db = null;

function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){ console.warn('persist failed', e); } }
function loadDb(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if (raw){ const d = JSON.parse(raw); if (d && d.v === 1) return d; }
  }catch(e){}
  return null;
}
function resetDb(){ localStorage.removeItem(LS_KEY); db = seed(); save(); }

let idSeq = 0;
function nid(){ return ++db.seq; }

/* lookups */
const P = id => db.people.find(p => p.id === id);
const R = id => db.recs.find(r => r.id === id);
const projById = id => db.projects.find(p => p.id === id);
const toolById = id => db.tools.find(t => t.id === id);
const me = () => P(db.meId);
const isMe = id => id === db.meId;
function toolsOf(pid){ return db.tools.filter(t => t.projectId === pid).sort((a,b) => a.position - b.position); }
function toolOf(pid, type){ return db.tools.find(t => t.projectId === pid && t.type === type); }
function activeProjects(){ return db.projects.filter(p => p.status === 'active'); }

function kids(parentId, type, opts={}){
  let list = db.recs.filter(r => r.parentId === parentId && (!type || r.type === type));
  if (!opts.all) list = list.filter(r => r.status === 'active');
  return list.sort((a,b) => (a.position - b.position) || (a.createdAt - b.createdAt) || (a.id - b.id));
}
function commentsOf(recId){ return kids(recId, 'Comment'); }
function boostsOf(recId){ return db.boosts.filter(b => b.recId === recId).sort((a,b) => a.at - b.at); }
function myBoost(recId){ return db.boosts.find(b => b.recId === recId && b.personId === db.meId); }

function addRec(o){
  const r = Object.assign({
    id: nid(), type:'Recording', projectId:null, toolId:null, parentId:null,
    creatorId: db.meId, createdAt: Date.now(), updatedAt: Date.now(),
    status:'active', title:'', content:'', visibleToClients:false, position: 0,
    subscriberIds: []
  }, o);
  if (!o.position){ const sibs = db.recs.filter(x => x.parentId === r.parentId && x.type === r.type); r.position = sibs.length ? Math.max(...sibs.map(s => s.position)) + 1 : 1; }
  db.recs.push(r);
  return r;
}
function touch(r){ r.updatedAt = Date.now(); }

/* events (audit trail / activity) */
function logEvent(rec, action, opts={}){
  db.events.push({
    id: nid(), recId: rec.id, projectId: rec.projectId, action,
    at: opts.at ?? Date.now(), byId: opts.byId ?? db.meId, detail: opts.detail || ''
  });
}
function eventsOf(recId){ return db.events.filter(e => e.recId === recId).sort((a,b) => a.at - b.at); }

/* readings — the viewer's person-scoped read/bubble state */
function reading(recId){ return db.readings.find(x => x.recId === recId); }
function ensureReading(recId){
  let x = reading(recId);
  if (!x){ x = { recId, readAt: null, resurfaceAt: null, notif: false, sawAt: null }; db.readings.push(x); }
  return x;
}
function markRead(recId){ const x = ensureReading(recId); x.readAt = Date.now(); if (x.resurfaceAt && x.resurfaceAt <= Date.now()) x.resurfaceAt = null; }
function isUnreadForMe(rec){ const x = reading(rec.id); return !!(x && x.notif && !x.readAt); }
function unreadCount(){
  const bubbled = db.readings.filter(x => x.resurfaceAt && x.resurfaceAt <= Date.now() && !x.readAt).length;
  const marked = db.readings.filter(x => x.notif && !x.readAt).length;
  return bubbled + marked;
}

/* subscription helpers */
function subscribe(rec, personId){ if (!rec.subscriberIds.includes(personId)) rec.subscriberIds.push(personId); }
function unsubscribe(rec, personId){ rec.subscriberIds = rec.subscriberIds.filter(x => x !== personId); }

/* rec tree helpers */
function bucketOf(rec){ return projById(rec.projectId); }
function rootRecordable(rec){
  // climb comments/steps up to the commentable root
  let r = rec;
  while (r && (r.type === 'Comment' || r.type === 'Step')) r = R(r.parentId);
  return r || rec;
}
function trashRec(rec){
  rec.status = 'trashed'; touch(rec); logEvent(rec, 'trashed');
}
function restoreRec(rec){ rec.status = 'active'; touch(rec); logEvent(rec, 'restored'); }
function archiveRec(rec){ rec.status = 'archived'; touch(rec); logEvent(rec, 'archived'); }

/* URL builders — production HTML shapes on the hash router */
const AID = () => db.accountId;
function urlProject(p){ return `#/${AID()}/projects/${p.id}`; }
function urlTool(t){
  const seg = { message_board:'message_boards', todoset:'todosets', vault:'vaults', chat:'chats',
    schedule:'schedules', card_table:'card_tables', questionnaire:'questionnaires', inbox:'inboxes' }[t.type];
  return seg ? `#/${AID()}/buckets/${t.projectId}/${seg}/${t.id}` : (t.url || '#');
}
function urlRec(r){
  const seg = { Message:'messages', Todolist:'todolists', Todo:'todos', Document:'documents', Upload:'uploads',
    CloudLink:'uploads', Card:'card_tables/cards', CardColumn:'card_tables/columns',
    ScheduleEntry:'schedule_entries', Question:'questions', Vault:'vaults/folder', Comment:null, CampfireLine:null }[r.type];
  if (r.type === 'Comment'){ const root = rootRecordable(r); return urlRec(root) + '?c=' + r.id; }
  if (r.type === 'CampfireLine'){ const t = toolById(r.toolId); return t ? urlTool(t) : '#/'; }
  if (!seg){ const t = r.toolId && toolById(r.toolId); return t ? urlTool(t) : '#/'; }
  return `#/${AID()}/buckets/${r.projectId}/${seg}/${r.id}`;
}

/* people rendering */
function avatarHTML(p, size=''){
  if (!p) return '';
  const cls = size ? `avatar avatar--${size}` : 'avatar';
  return `<span class="${cls}" style="background:${recColor(p.color)}" title="${esc(p.name)}" aria-hidden="true">${esc(p.initials)}</span>`;
}
function facepile(ids, size='xs', max=8){
  const shown = ids.slice(0, max), extra = ids.length - shown.length;
  return `<span class="facepile">${shown.map(id => avatarHTML(P(id), size)).join('')}${extra > 0 ? `<span class="overflow">+${extra}</span>` : ''}</span>`;
}
function firstLast(p){ const parts = p.name.split(' '); return parts.length > 1 ? `${parts[0]} ${parts[parts.length-1][0]}.` : p.name; }
function personChip(p, size='2xs'){
  return `<a class="person-chip" href="#/people/${p.id}">${avatarHTML(p, size)}${esc(firstLast(p))}</a>`;
}
function mentionHTML(p){
  return `<span class="mention" data-person="${p.id}" contenteditable="false">${avatarHTML(p,'2xs')}${esc(p.name)}</span>`;
}

/* ------------------------- toasts ------------------------- */
function toast(msg){
  const z = $('#toastZone'); const el = document.createElement('div');
  el.className = 'toast'; el.innerHTML = msg;
  z.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 350); }, 3200);
}
function stub(what){ toast(`${what} isn’t wired up in this prototype.`); }

/* ------------------------- popovers ------------------------- */
let popEl = null, popAnchor = null;
function openPopover(anchor, html, opts={}){
  closePopover();
  popEl = document.createElement('div');
  popEl.className = 'popover' + (opts.cls ? ' ' + opts.cls : '');
  popEl.innerHTML = html;
  document.body.appendChild(popEl);
  const r = anchor.getBoundingClientRect();
  let x = (opts.align === 'right') ? r.right - popEl.offsetWidth : r.left;
  x = Math.max(8, Math.min(x, innerWidth - popEl.offsetWidth - 8));
  let y = r.bottom + 6;
  if (y + popEl.offsetHeight > innerHeight - 8) y = Math.max(8, r.top - popEl.offsetHeight - 6);
  popEl.style.left = x + 'px'; popEl.style.top = y + 'px';
  popAnchor = anchor;
  const f = popEl.querySelector('[autofocus]'); if (f) f.focus();
  return popEl;
}
function closePopover(){ if (popEl){ popEl.remove(); popEl = null; popAnchor = null; } }

function menuHTML(items, opts={}){
  const rows = items.map(it => {
    if (!it) return '';
    if (it.sep) return '<hr class="menu-sep">';
    if (it.caption) return `<div class="menu-caption">${esc(it.caption)}</div>`;
    if (it.html) return it.html;
    const inner = `${it.icon ? ic(it.icon) : ''}<span>${it.label}</span>${it.right ? `<span class="right">${it.right}</span>` : ''}`;
    const cls = 'menu-item' + (it.danger ? ' danger' : '');
    if (it.href) return `<a class="${cls}" href="${it.href}">${inner}</a>`;
    return `<button class="${cls}" data-action="${it.action}" ${it.args ? `data-args='${esc(JSON.stringify(it.args))}'` : ''}>${inner}</button>`;
  }).join('');
  return `${opts.close ? '<button class="options-close" data-action="close-popover" aria-label="Close">' + ic('x') + '</button>' : ''}<div class="menu" role="menu">${rows}</div>`;
}

/* ------------------------- modal ------------------------- */
function openModal(html, opts={}){
  closeModal();

    <button class="modal-close icon-btn" data-action="close-modal" aria-label="Close">${ic('x')}</button>${html}</div>`;

}

/* ------------------------- router ------------------------- */
function parseHash(){
  const h = (location.hash || '#/').replace(/^#/, '');
  const [path, qs] = h.split('?');
  return { segs: path.split('/').filter(Boolean), q: Object.fromEntries(new URLSearchParams(qs || '')), path };
}
function go(hash){ if (location.hash === hash) render(); else location.hash = hash; }

function noteRecent(label, iconName, color){
  const hash = location.hash || '#/';
  db.recents = db.recents.filter(r => r.hash !== hash);
  db.recents.unshift({ hash, label, icon: iconName, color: color || null, at: Date.now() });
  db.recents = db.recents.slice(0, 12);
  save();
}

/* breadcrumb sheet wrapper */
function sheet(opts, body){
  const { crumbs = [], actions = '', wide = false, flush = false, ribbon = '', barExtra = '' } = opts;

    (i ? `<span class="crumb-sep">‹</span>` : '') +

  ).join('');

function bookmarkBtn(kind, refId){

/* ------------------------- render ------------------------- */
function render(){
  closePopover();
  document.documentElement.setAttribute('data-color-scheme', db.prefs.theme || 'none');
  renderNav(); renderMyBar();
  const { segs, q } = parseHash();
  ui.ctxRecId = null; ui.ctxProjectId = null; ui.ctxNewHref = null; ui.ctxComposeSel = null;
  const main = $('#main');
  let html = '', title = 'Home';

  try {
    if (segs.length === 0){ html = vHome(); title = 'Home'; }
    else if (segs[0] === 'projects' && !segs[1]){ html = vProjectsIndex(q); title = 'All projects'; }
    else if (segs[0] === 'activity'){ html = vActivity(q); title = 'Activity'; noteRecent('Activity','activity'); }
    else if (segs[0] === 'calendar'){ html = vCalendar(q); title = 'Calendar'; noteRecent('Calendar','calendar'); }
    else if (segs[0] === 'reports'){ html = vReports(q); title = 'Reports'; noteRecent('Reports','reports'); }
    else if (segs[0] === 'everything' ){ html = vEverything(segs[1], q); title = 'Everything'; noteRecent('Everything','everything'); }
    else if (segs[0] === 'search'){ html = vSearch(q); title = 'Search'; }
    else if (segs[0] === 'adminland'){ html = vAdminland(); title = 'Adminland'; noteRecent('Adminland','key'); }
    else if (segs[0] === 'trash'){ html = vTrash(); title = 'Trash'; }
    else if (segs[0] === 'people' && segs[1]){ html = vPerson(+segs[1]); title = 'Profile'; }
    else if (segs[0] === 'pings'){ html = vPings(segs[1] ? +segs[1] : null); title = 'Pings'; }
    else if (segs[0] === 'my'){
      const page = segs[1];
      if (page === 'assignments'){ html = vAssignments(); title = 'My Assignments'; }
      else if (page === 'activity'){ html = vMyActivity(); title = 'My Activity'; }
      else if (page === 'drafts'){ html = vDrafts(); title = 'My Drafts'; }
      else if (page === 'boosts'){ html = vBoostsPage(); title = 'My Boosts'; }
      else html = v404();
    }
    else if (segs[0] === String(db.accountId) && segs[1] === 'projects' && segs[2]){
      const p = projById(+segs[2]);
      if (p){ ui.ctxProjectId = p.id; html = vProjectDock(p); title = p.name; noteRecent(p.name, null, p.color); }
      else html = v404();
    }
    else if (segs[0] === String(db.accountId) && segs[1] === 'buckets' && segs[2]){
      const p = projById(+segs[2]);
      if (!p){ html = v404(); }
      else {
        ui.ctxProjectId = p.id;
        const sec = segs[3], id = segs[4];
        const pair = vBucket(p, sec, id, segs, q);   // [html, title]
        html = pair[0]; title = pair[1] || p.name;
        const secIcon = { message_boards:'message', messages:'message', todosets:'todo', todolists:'todo', todos:'todo',
          card_tables:'kanban', vaults:'doc', documents:'doc', uploads:'clip', chats:'chat', schedules:'calendar',
          schedule_entries:'calendar', questionnaires:'question', questions:'question', inboxes:'inbox' }[sec];
        if (pair[1] && id !== 'new') noteRecent(pair[1] + ' — ' + p.name, secIcon, p.color);
      }
    }
    else html = v404();
  } catch(err){
    console.error(err);
    html = `<div class="sheet"><div class="sheet-content"><div class="empty-state">${DOODLE}<h3>Something broke rendering this page</h3><p class="small">${esc(err.message)}</p><a class="btn btn--ghost" href="#/">Back home</a></div></div></div>`;
  }

  main.innerHTML = html;
  document.title = title + ' — ' + db.accountName;
  window.scrollTo(0, 0);
  const chatScroll = $('.chat-scroll'); if (chatScroll) chatScroll.scrollTop = chatScroll.scrollHeight;
  save();
}
