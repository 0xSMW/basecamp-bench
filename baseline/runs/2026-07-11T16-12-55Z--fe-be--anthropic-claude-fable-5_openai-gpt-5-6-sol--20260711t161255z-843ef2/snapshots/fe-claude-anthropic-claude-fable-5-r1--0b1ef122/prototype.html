function jumpModel(query){
  const qq = (query || '').trim().toLowerCase();
  const match = s => !qq || s.toLowerCase().includes(qq);
  const rows = [];
  const recents = db.recents.filter(r => r.hash !== (location.hash || '#/') && match(r.label)).slice(0, qq ? 8 : 5);
  if (recents.length){
    rows.push({ header:'Recently visited' });
    recents.forEach(r => rows.push({ icon: r.icon || 'clock', color: r.color, label: r.label, href: r.hash }));
  }
  let projs = db.projects.filter(p => (ui.jumpArchived ? p.status !== 'trashed' : p.status === 'active') && match(p.name));
  projs = projs.sort((a,b) => (b.starred - a.starred) || a.name.localeCompare(b.name));
  rows.push({ header:'Projects', seeAll:true });
  projs.slice(0, 8).forEach(p => rows.push({ icon:null, color:p.color, label:p.name + (p.status==='archived' ? ' (archived)' : ''), href: urlProject(p), star:p.starred }));
  if (qq){
    const ppl = db.people.filter(p => match(p.name)).slice(0, 4);
    if (ppl.length){ rows.push({ header:'People' }); ppl.forEach(p => rows.push({ person:p, label:p.name, href:'#/people/' + p.id })); }
    const tools = db.tools.filter(t => match(t.title) && projById(t.projectId)?.status === 'active').slice(0, 5);
    if (tools.length){ rows.push({ header:'Tools' }); tools.forEach(t => rows.push({ icon:TOOL_DEFS[t.type].icon, label: t.title + ' — ' + projById(t.projectId).name, href: urlTool(t) })); }
  }
  return rows;
}
function renderJumpList(){
  const qv = $('#jumpSearch')?.value || '';
  const rows = jumpModel(qv);
  const sel = Math.min(ui.jumpSel, Math.max(0, rows.filter(r => r.href).length - 1));
  let linkIdx = -1;
  $('#jumpList').innerHTML = rows.map(r => {
    if (r.header) return `<div class="jump-section">${esc(r.header)}${r.seeAll ? ' – <a class="see-all" href="#/projects" data-action="jump-go">See all</a>' : ''}</div>`;
    linkIdx++;
    const icon = r.person ? avatarHTML(r.person, 'xs')
      : `<span class="jr-icon" style="${r.color ? `background:color-mix(in hsl, ${recColor(r.color)}, transparent 55%)` : ''}">${ic(r.icon || 'folder', 14)}</span>`;
    return `<a class="jump-row ${linkIdx === sel ? 'sel' : ''}" href="${r.href}" data-action="jump-go">${icon}<span>${esc(r.label)}</span>${r.star ? `<span class="right">${ic('star', 14, 'style="fill:url(#starGrad);stroke:none"')}</span>` : ''}</a>`;
  }).join('') + `<label class="jump-archived"><input type="checkbox" data-change="jump-archived" ${ui.jumpArchived ? 'checked' : ''}> Include archived projects</label>`;
}
function jumpKeys(e){
  const links = $$('#jumpList .jump-row');
  if (e.key === 'ArrowDown'){ e.preventDefault(); ui.jumpSel = Math.min(ui.jumpSel + 1, links.length - 1); renderJumpList(); }
  else if (e.key === 'ArrowUp'){ e.preventDefault(); ui.jumpSel = Math.max(ui.jumpSel - 1, 0); renderJumpList(); }
  else if (e.key === 'Enter'){
    e.preventDefault();
    const qv = $('#jumpSearch').value.trim();
    if (e.ctrlKey || e.metaKey){ closeJump(); go('#/search?q=' + encodeURIComponent(qv)); return; }
    if (e.shiftKey){ closeJump(); go('#/search?q=' + encodeURIComponent(qv) + (ui.ctxProjectId ? '&project=' + ui.ctxProjectId : '')); return; }
    const sel = $('#jumpList .jump-row.sel') || links[0];
    if (sel){ closeJump(); go(sel.getAttribute('href')); }
    else if (qv){ closeJump(); go('#/search?q=' + encodeURIComponent(qv)); }
  }
}

      }).join('') : `<p class="sb-empty">Ping anyone on the account — private, direct messages that live outside projects.</p>`}

      ${bubbledDue.length ? `<h3 class="sb-sec">${ic('bubble')} Bubbled up</h3>` + bubbledDue.map(x => row(x, true)).join('') : ''}

function trayContent(name){
  const head = (title, right='') => `<div class="tray-head"><h3>${title}</h3><span class="right">${right}</span></div>`;
  if (name === 'tasks'){
    const mine = db.recs.filter(r => (r.type === 'Todo' || r.type === 'Card') && r.status === 'active'
      && !r.completed && !r.completedAt && (r.assigneeIds || []).includes(db.meId));
    const byProj = {};
    mine.forEach(r => { (byProj[r.projectId] = byProj[r.projectId] || []).push(r); });
    return head('My Tasks', `<a class="link-btn small" href="#/my/assignments" data-action="close-tray-nav">See all assignments</a>`) +
      `<div class="tray-body">` + (mine.length
        ? Object.entries(byProj).map(([pid, rs]) => `<div class="tray-group">${esc(projById(+pid)?.name || '')}</div>` +
            rs.map(r => `<a class="tray-row" href="${urlRec(r)}" data-action="close-tray-nav">${ic(TYPE_ICON[r.type])}<span>${esc(r.title)}</span>${r.dueOn ? `<span class="sub nowrap">${esc(fmtDue(r.dueOn))}</span>` : ''}</a>`).join('')).join('')
        : `<p class="sb-empty">Nothing’s assigned to you right now. Assign yourself a to-do or card (or press <kbd>⇧K</kbd> on one) and it’ll show up here.</p>`) + `</div>`;
  }
  if (name === 'events'){
    const now = startOfDay(Date.now());
    const ups = db.recs.filter(r => r.type === 'ScheduleEntry' && r.status === 'active' && r.startsAt >= now && r.startsAt < now + 30*DAY)
      .concat(db.recs.filter(r => r.type === 'Todo' && r.status === 'active' && !r.completed && r.dueOn && r.dueOn >= now && r.dueOn < now + 30*DAY))
      .sort((a,b) => (a.startsAt || a.dueOn) - (b.startsAt || b.dueOn)).slice(0, 10);
    return head('My Events', `<a class="link-btn small" href="#/calendar" data-action="close-tray-nav">Calendar</a>`) +
      `<div class="tray-body">` + (ups.length ? ups.map(r => {
        const ts = r.startsAt || r.dueOn;
        const when = r.type === 'Todo' ? `due ${fmtDue(ts)}` : (r.allDay ? fmtDue(ts) : `${fmtDue(ts)}, ${fmtTime(ts)}`);
        return `<a class="tray-row" href="${urlRec(r)}" data-action="close-tray-nav">${ic(TYPE_ICON[r.type])}<span>${esc(r.title)}</span><span class="sub nowrap">${esc(when)}</span></a>`;
      }).join('') : `<p class="sb-empty">Nothing on the schedule for the next 30 days.</p>`) + `</div>`;
  }
  if (name === 'dotoday'){
    const items = db.doToday.map(id => R(id)).filter(r => r && r.status === 'active');
    return head('Do Today') + `<div class="tray-body">` + (items.length ? items.map(r =>
      `<div class="tray-row"><button class="todo-checkbox ${r.completed || r.completedAt ? 'done' : ''}" data-action="toggle-complete" data-args='${r.id}' aria-label="Complete">${ic('check', 12)}</button>
       <a href="${urlRec(r)}" data-action="close-tray-nav" style="flex:1;color:inherit">${esc(r.title)}</a>
       <button class="icon-btn" data-action="dotoday-remove" data-args='${r.id}' title="Remove from Do Today">${ic('x', 12)}</button></div>`).join('')
      : `<p class="sb-empty">Flag any to-do or card “Add to Do Today” (in its ••• menu) to build a personal list for today.</p>`) + `</div>`;
  }
  if (name === 'bookmarks'){
    const rows = db.bookmarks.map(b => {
      if (b.kind === 'tool'){ const t = toolById(b.refId); return t ? { href: urlTool(t), label: t.title + ' — ' + (projById(t.projectId)?.name || ''), icon: TOOL_DEFS[t.type].icon } : null; }
      const r = R(b.refId); return r ? { href: urlRec(r), label: r.title || TYPE_LABEL[r.type], icon: TYPE_ICON[r.type] || 'bookmark' } : null;
    }).filter(Boolean);
    return head('My Bookmarks') + `<div class="tray-body">` + (rows.length
      ? rows.map(r => `<a class="tray-row" href="${r.href}" data-action="close-tray-nav">${ic(r.icon)}<span>${esc(r.label)}</span></a>`).join('')
      : `<p class="sb-empty">Bookmark any page with the ${ic('bookmark', 12)} button in its header, and it’ll be pinned here.</p>`) + `</div>`;
  }
  if (name === 'notes'){
    return head('My Notes', '<span class="small muted">saves as you type</span>') +
      `<div class="tray-body"><div id="notesEditor" class="editor-body" contenteditable="true" data-ph="Jot anything — only you can see your notes." style="min-height:16rem">${db.notes[db.meId] || ''}</div></div>`;
  }
  return '';
}

/* ------------------------- global keyboard ------------------------- */
let vimBuf = '';
document.addEventListener('keydown', e => {
  const tag = (e.target.tagName || '').toLowerCase();
  const typing = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;

  if (e.key === 'Escape'){
    if (popEl){ closePopover(); return; }
    if ($('#modalOverlay')){ closeModal(); return; }
    if (ui.jump){ closeJump(); return; }
    if (ui.tray){ closeTray(); return; }
    if (ui.sidebar){ closeSidebar(); return; }
    return;
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'j' || e.key === 'k')){ e.preventDefault(); ui.jump ? closeJump() : openJump(); return; }
  if (typing) return;

  if (e.key === 'Shift' && !e.repeat){ document.body.classList.add('show-kbd'); return; }

  if (!e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey){
    if (e.key === '1') return go('#/activity');
    if (e.key === '2') return go('#/calendar');
    if (e.key === '3') return go('#/reports');
    if (e.key === '4') return go('#/everything');
    vimBuf = (vimBuf + e.key).slice(-3);
    if (vimBuf === ':wq'){
      vimBuf = '';
      openModal(`<h2 class="modal-title">You’ve been logged out</h2><p class="muted">…not really. This is a prototype, and you never left. But we respect a vim exit when we see one. 🫡</p>
      <div class="modal-actions"><button class="btn btn--primary" data-action="close-modal">Log back in</button></div>`);
      return;
    }
  }
  if (!e.shiftKey) return;
  const k = e.key.toUpperCase();
  const nav = h => { e.preventDefault(); go(h); };
  switch (k){
    case 'J': e.preventDefault(); ui.jump ? closeJump() : openJump(); break;
    case 'S': e.preventDefault(); ui.sidebar ? closeSidebar() : openSidebar(); break;
    case 'H': nav('#/'); break;
    case 'T': e.preventDefault(); openTray('tasks'); break;
    case 'E': e.preventDefault(); openTray('events'); break;
    case 'V': e.preventDefault(); openTray('dotoday'); break;
    case 'B': e.preventDefault(); openTray('bookmarks'); break;
    case 'N': e.preventDefault(); openTray('notes'); break;
    case 'A': nav('#/my/assignments'); break;
    case 'Y': nav('#/my/activity'); break;
    case 'W': nav('#/my/drafts'); break;
    case 'O': nav('#/my/boosts'); break;
    case 'U': nav('#/adminland'); break;
    case 'Z': e.preventDefault(); ACTIONS['shhh'](); break;
    case 'P': e.preventDefault(); ACTIONS['new-ping'](); break;
    case 'F': { e.preventDefault(); const f = $('.toolbar .filter-input') || $('.filter-input'); if (f) f.focus(); break; }
    case 'M': if (ui.ctxNewHref){ e.preventDefault(); typeof ui.ctxNewHref === 'string' ? go(ui.ctxNewHref) : ui.ctxNewHref(); } break;
    case 'C': { e.preventDefault(); const c = $(ui.ctxComposeSel || '.chat-input, .editor-body'); if (c) c.focus(); break; }
    case 'G': if (ui.ctxProjectId){ nav(urlProject(projById(ui.ctxProjectId))); } break;
    case 'X': if (ui.ctxRecId){ e.preventDefault(); ACTIONS['toggle-read'](null, ui.ctxRecId); } break;
    case 'K': if (ui.ctxRecId){ e.preventDefault(); ACTIONS['assign-me-ctx'](); } break;
    case 'D': if (ui.ctxRecId){ e.preventDefault(); ACTIONS['complete-ctx'](); } break;
    case '?': e.preventDefault(); ACTIONS['help'](); break;
  }
});
document.addEventListener('keyup', e => { if (e.key === 'Shift') document.body.classList.remove('show-kbd'); });

function pieSVG(frac, size=20, color='var(--recording-color-green)'){
  const r = size/2 - 1.5, c = size/2;
  const full = frac >= 0.999;
  const arc = () => {
    if (frac <= 0.001) return '';
    const a = frac * 2 * Math.PI;
    const x = c + r * Math.cos(a), y = c + r * Math.sin(a);
    return `<path d="M ${c} ${c} L ${c + r} ${c} A ${r} ${r} 0 ${a > Math.PI ? 1 : 0} 1 ${x} ${y} Z" fill="${color}" stroke="none"/>`;
  };
  return `<svg class="pie" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="${color}" stroke-width="1.6" ${full ? `fill="${color}"` : ''}/>${full ? '' : arc()}</svg>`;
}
function fileIconSVG(rec, size=40){
  if (rec.type === 'CloudLink'){
    return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" aria-hidden="true"><rect x="6" y="3" width="28" height="34" rx="4" fill="hsl(140,45%,42%)"/><rect x="11" y="12" width="18" height="17" rx="1.5" fill="#fff"/><path d="M11 17.6h18M11 23.2h18M17 12v17" stroke="hsl(140,45%,42%)" stroke-width="1.6"/></svg>`;
  }
  if (rec.type === 'Upload'){
    if (rec.svg) return `<span style="display:inline-block;width:${size}px;height:${size}px;border-radius:6px;overflow:hidden">${rec.svg.replace('<svg ', `<svg width="${size}" height="${size}" preserveAspectRatio="xMidYMid slice" `)}</span>`;
    return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" aria-hidden="true"><rect x="8" y="3" width="24" height="34" rx="3" fill="var(--color-ink-30)"/><path d="M14 26l5-7 4 5 3-3 5 7z" fill="var(--color-ink-50)"/></svg>`;
  }
  if (rec.type === 'Vault'){
    return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" aria-hidden="true"><path d="M4 10c0-1.7 1.3-3 3-3h9l4 4h16c1.7 0 3 1.3 3 3v16c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3z" transform="scale(.87)" fill="var(--color-blue-40)"/></svg>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" aria-hidden="true"><path d="M9 3h16l7 7v27H9z" fill="#fff" stroke="var(--color-ink-40)"/><path d="M25 3v7h7" fill="none" stroke="var(--color-ink-40)"/><g class="doc-icon-lines">${[14,18,22,26,30].map(y => `<rect x="13" y="${y}" width="${y===30?8:14}" height="1.8" rx=".9"/>`).join('')}</g></svg>`;
}

function bubbleChoices(){
  const now = new Date();
  const later = at(Date.now(), 18, 0) > Date.now() ? at(Date.now(), 18, 0) : Date.now() + 3*HOUR;
  const tomorrow = at(Date.now() + DAY, 9, 0);
  const sat = at(Date.now() + ((6 - now.getDay() + 7) % 7 || 7) * DAY, 9, 0);
  const mon = at(Date.now() + ((8 - now.getDay()) % 7 || 7) * DAY, 9, 0);
  return [
    { label:'Later today', ts: later }, { label:'Tomorrow', ts: tomorrow },
    { label:'This weekend', ts: sat }, { label:'Next week', ts: mon }
  ];
}

function evtSentence(e){
  const p = P(e.byId);
  const rec = e.recId ? R(e.recId) : null;
  const verb = {
    created:'added', commented:'commented on', completed:'completed', reopened:'reopened', moved:'moved',
    trashed:'trashed', restored:'restored', archived:'archived', pinned:'pinned', published:'published',
    project_created:'created this project'
  }[e.action] || e.action;
  if (e.action === 'project_created') return `<b>${esc(p?.name || '')}</b> created this project — ${esc(e.detail)}`;
  if (!rec) return `<b>${esc(p?.name || '')}</b> ${verb}`;
  const root = rootRecordable(rec);
  const label = rec.type === 'Comment' ? (root.title || TYPE_LABEL[root.type]) : (rec.title || TYPE_LABEL[rec.type]);
  const typeLbl = rec.type === 'Comment' ? '' : ` ${TYPE_LABEL[rec.type] || ''}`;
  return `<b>${esc(p?.name || '')}</b> ${verb}${e.action === 'created' ? ' a' + (/^[aeiou]/i.test(typeLbl.trim()) ? 'n' : '') + typeLbl : ''} — <a href="${urlRec(rec)}">${esc(label)}</a>`;
}

function miniMonthHTML(pid){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const first = new Date(y, m, 1);
  const start = startOfDay(first.getTime()) - first.getDay() * DAY;
  const evDays = new Set();
  db.recs.filter(r => r.status === 'active' && ((r.type === 'ScheduleEntry' && r.projectId === pid) || (r.type === 'Todo' && r.projectId === pid && r.dueOn && !r.completed)))
    .forEach(r => { const ts = r.startsAt || r.dueOn; if (ts) evDays.add(startOfDay(ts)); });
  let cells = '';
  for (let w = 0; w < 6; w++){
    cells += '<tr>';
    for (let d = 0; d < 7; d++){
      const ts = start + (w*7 + d) * DAY;
      const dt = new Date(ts);
      const cur = dt.getMonth() === m;
      cells += `<td class="${cur ? 'cur' : ''} ${sameDay(ts, Date.now()) ? 'today' : ''} ${evDays.has(startOfDay(ts)) ? 'has' : ''}"><span>${dt.getDate()}</span></td>`;
    }
    cells += '</tr>';
  }
  return `<div class="dp-cal"><div class="dpc-head">${MONTHS[m]} ${y}</div>
    <table><thead><tr>${DAY3.map(d => `<th>${d.toUpperCase()}</th>`).join('')}</tr></thead><tbody>${cells}</tbody></table></div>`;
}

    const user = cols.filter(c => c.kind === 'column');
    const done = cols.find(c => c.kind === 'done'), nn = cols.find(c => c.kind === 'not_now');
    const cnt = c => kids(c.id, 'Card').length;
    return `<div class="dp-triage">${esc(triage.title)} (${cnt(triage)})</div>
      <div class="dp-kanban">
        ${user.map(c => `<span class="dpk-col" style="background:color-mix(in hsl, ${recColor(c.color)}, transparent 80%)"><span class="cnt">(${cnt(c)})</span><span class="nm">${esc(c.title)}</span></span>`).join('')}
        <span class="dpk-col" style="background:color-mix(in hsl, var(--recording-color-green), transparent 82%)"><span class="cnt">(${cnt(done)})</span><span class="nm">Done</span></span>
      </div>`;
  }
  if (t.type === 'vault'){
    const files = kids(t.id).filter(r => ['Document','Upload','CloudLink','Vault'].includes(r.type)).slice(0, 5);
    if (!files.length) return `<div class="center-note">${DOODLE}<br>Nothing’s been shared yet</div>`;
    return files.map(f => `<div class="dp-file"><span class="fi">${fileIconSVG(f, 34)}</span><div><div class="t" style="font-weight:700">${esc(f.title)}</div><div class="x muted small">${esc(P(f.creatorId).name)} · ${esc(fmtDay(f.createdAt))}</div></div></div>`).join('');
  }
  if (t.type === 'chat'){
    const lines = kids(t.id, 'CampfireLine').slice(-4);
    if (!lines.length) return `<div class="center-note">${DOODLE}<br>Say hello 👋</div>`;
    return lines.map(l => `<div class="dp-chat-line">${avatarHTML(P(l.creatorId), 'xs')}<div class="b"><span class="nm">${esc(P(l.creatorId).name)}</span><span class="tm">${esc(fmtTime(l.createdAt))}</span><div class="tx">${esc(stripTags(l.content).slice(0, 120))}</div></div></div>`).join('');
  }
  if (t.type === 'schedule'){
    const ups = kids(t.id, 'ScheduleEntry').filter(r => r.startsAt >= startOfDay(Date.now())).sort((a,b) => a.startsAt - b.startsAt).slice(0, 2);
    return miniMonthHTML(t.projectId) + (ups.length ? `<div class="dp-upcoming">${ups.map(u => `<div class="u"><span class="d">${esc(fmtDay(u.startsAt))}</span><span>${esc(u.title)}</span></div>`).join('')}</div>` : '');
  }
  if (t.type === 'questionnaire'){
    const qs = kids(t.id, 'Question');
    return qs.length ? qs.map(qq => `<div class="dp-msg">${ic('question')}<div><div class="t">${esc(qq.title)}</div><div class="x muted">${esc(qq.schedule || '')}</div></div></div>`).join('') : `<div class="center-note">${DOODLE}<br>No check-in questions yet</div>`;
  }
  if (t.type === 'inbox') return `<div class="center-note">${DOODLE}<br>Emails forwarded to this project will collect here</div>`;
  if (t.type === 'door') return `<div class="center-note" style="padding-top:8rem">${ic('link', 40)}<br><br>Opens ${esc(t.url || 'an external link')}<br><span class="small muted">in a new tab</span></div>`;
  return '';
}

        </button>`).join('')}
      </div>`, { lg:true });

    }

  'project-archive'(el, pid){ projById(pid).status = 'archived'; closePopover(); save(); render(); toast('Project archived — it’s read-only and out of the jump menu.'); },

  'project-trash'(el, pid){

    db.projects = db.projects.filter(x => x.id !== pid);
    db.tools = db.tools.filter(t => t.projectId !== pid);

function vBucket(p, sec, id, segs, q){
  const numId = +id;
  switch (sec){
    case 'message_boards': { const t = toolById(numId); return t ? [vBoard(p, t, q), t.title] : [v404(), '']; }
    case 'messages':
      if (id === 'new') return [vMessageCompose(p, q.edit ? R(+q.edit) : null), 'New message'];
      { const r = R(numId); return r ? [vMessage(p, r), r.title] : [v404(), '']; }
    case 'todosets': { const t = toolById(numId); return t ? [vTodos(p, t, q), t.title] : [v404(), '']; }
    case 'todolists': { const r = R(numId); return r ? [vTodolistPage(p, r), r.title] : [v404(), '']; }
    case 'todos': { const r = R(numId); return r ? [vTodoPage(p, r), r.title] : [v404(), '']; }
    case 'card_tables':
      if (id === 'cards'){ const r = R(+segs[5]); return r ? [vCardPage(p, r), r.title] : [v404(), '']; }
      { const t = toolById(numId); return t ? [vCardTable(p, t, q), t.title] : [v404(), '']; }
    case 'vaults':
      if (id === 'folder'){ const r = R(+segs[5]); return r ? [vVault(p, toolById(r.toolId), q, r), r.title] : [v404(), '']; }
      { const t = toolById(numId); return t ? [vVault(p, t, q, null), t.title] : [v404(), '']; }
    case 'documents':
      if (id === 'new') return [vDocCompose(p, q.edit ? R(+q.edit) : null, q), 'New document'];
      { const r = R(numId); return r ? [vDocument(p, r), r.title] : [v404(), '']; }
    case 'uploads': { const r = R(numId); return r ? [vUpload(p, r), r.title] : [v404(), '']; }
    case 'chats': { const t = toolById(numId); return t ? [vChat(p, t), t.title] : [v404(), '']; }
    case 'schedules': { const t = toolById(numId); return t ? [vSchedule(p, t, q), t.title] : [v404(), '']; }
    case 'schedule_entries': { const r = R(numId); return r ? [vEntry(p, r), r.title] : [v404(), '']; }
    case 'questionnaires': { const t = toolById(numId); return t ? [vCheckins(p, t), t.title] : [v404(), '']; }
    case 'questions': { const r = R(numId); return r ? [vQuestion(p, r), r.title] : [v404(), '']; }
    case 'inboxes': { const t = toolById(numId); return t ? [vInbox(p, t), t.title] : [v404(), '']; }
  }
  return [v404(), ''];
}

function vBoard(p, t, q){

  let msgs = kids(t.id, 'Message');
  if (q.cat) msgs = msgs.filter(m => m.category === q.cat);
  const sort = q.sort || 'new';
  msgs = msgs.sort((a,b) => sort === 'old' ? a.createdAt - b.createdAt : sort === 'az' ? a.title.localeCompare(b.title) : b.createdAt - a.createdAt);
  const pinned = msgs.filter(m => m.pinned), rest = msgs.filter(m => !m.pinned);
  const base = urlTool(t);
  const body = `
    <header class="page-head"><h1 class="display">${esc(t.title)}</h1></header>
    <div class="toolbar">
      <a class="btn btn--primary" href="${ui.ctxNewHref}" data-kbd="⇧M">${ic('plus')} New message<span class="kbd-hint"><kbd>⇧M</kbd></span></a>
      <span class="seg">
        <button aria-pressed="${!q.cat}" data-action="nav" data-args='${JSON.stringify(base)}'>All messages</button>
        <button aria-pressed="${!!q.cat}" data-action="board-cats" data-args='${JSON.stringify({ base, cur: q.cat || null })}'>${q.cat ? catEmoji(q.cat) + ' ' + esc(q.cat) : 'Categories'} ${ic('caret', 12)}</button>
      </span>
      <button class="pill-select" data-action="board-sort" data-args='${JSON.stringify({ base, cat: q.cat || null, cur: sort })}'>${{ new:'Newest post', old:'Oldest post', az:'A → Z' }[sort]} <span class="caret">${ic('caret', 12)}</span></button>
      <input class="filter-input" type="text" placeholder="Filter…" data-filter=".board-row" aria-label="Filter messages" data-kbd="⇧F">
    </div>
    ${pinned.length ? `<div class="pin-sec-label">${ic('pin')} Pinned</div>${pinned.map(boardRowHTML).join('')}<div class="pin-divider"><span></span></div>` : ''}
    ${rest.map(boardRowHTML).join('') || `<div class="empty-state">${DOODLE}<h3>No messages just yet</h3><p>Post announcements, pitches, updates — anything the whole team should see and discuss, on the record.</p><a class="btn btn--primary" href="${ui.ctxNewHref}">Post the first message</a></div>`}`;
  return sheet({ crumbs: [projectCrumb(p), { label: t.title }], actions: `${bookmarkBtn('tool', t.id)}<button class="icon-btn" data-action="tool-menu" data-args='${t.id}' aria-label="Options">${ic('dots')}</button>` }, body);
}

Object.assign(ACTIONS, {
  'compose-cat'(el, name){
    composeCat = el.getAttribute('aria-pressed') === 'true' ? null : name;
    $$('.cat-chip').forEach(c => c.setAttribute('aria-pressed', String(c.textContent.trim().endsWith(composeCat || '∅'))));
  },

  'msg-draft'(el, a){ saveMessage(a, 'drafted'); }
});
function saveMessage(a, status){
  const title = $('#msgTitle').value.trim();
  const content = $('#msgBody').innerHTML;
  if (!title){ toast('Give it a title first.'); return; }
  let m;
  if (a.edit){
    m = R(a.edit);
    m.title = title; m.content = content; touch(m);
    if (composeCat !== null) m.category = composeCat;
    if (m.status === 'drafted' && status === 'active'){ m.status = 'active'; m.createdAt = Date.now(); logEvent(m, 'published'); }
  } else {
    m = addRec({ type:'Message', projectId: a.p, toolId: a.t, parentId: a.t, title, content, category: composeCat, pinned:false, status });
    if (status === 'active') logEvent(m, 'created');
    subscribe(m, db.meId);
    mentionedIds(content).forEach(pid => subscribe(m, pid));
  }
  composeCat = null;
  save();
  if (status === 'drafted'){ go('#/my/drafts'); toast('Draft saved — only you can see it.'); }
  else go(urlRec(m));
}

function dueChip(ts, completed){
  if (!ts) return '';
  const overdue = !completed && startOfDay(ts) < startOfDay(Date.now());

}

function cardTileHTML(c){
  const steps = kids(c.id, 'Step');
  const done = steps.filter(s => s.completed).length;
  const cmts = commentsOf(c.id).length;
  return `<a class="kcard ${c.onHold ? 'onhold' : ''}" href="#/${AID()}/buckets/${c.projectId}/card_tables/cards/${c.id}" data-ft="${esc(c.title)}">
    <span class="kc-title">${esc(c.title)}</span>
    <span class="kc-by">By ${esc(firstLast(P(c.creatorId)))} ${c.completedAt ? '· done ' + esc(fmtWhen(c.completedAt)) : 'on ' + esc(fmtDay(c.createdAt))}</span>
    ${steps.length || cmts ? `<span class="kc-badges">${steps.length ? `<span>${ic('check', 12)} ${done}/${steps.length}</span>` : ''}${cmts ? `<span>${ic('chat', 12)} ${cmts}</span>` : ''}</span>` : ''}
    ${c.assigneeIds.length ? `<span class="kc-people">${facepile(c.assigneeIds, 'xs', 3)}</span>` : ''}
  </a>`;
}
function tableCols(t){

    triage: cols.find(c => c.kind === 'triage'),
    user: cols.filter(c => c.kind === 'column'),
    notNow: cols.find(c => c.kind === 'not_now'),
    done: cols.find(c => c.kind === 'done')
  };
}

Object.assign(ACTIONS, {
  'card-add'(el, colId){

    save(); render();
  },
  'col-menu'(el, colId){
    const c = R(colId);
    const watching = c.watcherIds.includes(db.meId);
    openPopover(el, menuHTML([
      { icon:'edit', label:'Rename this column', action:'col-rename', args:colId },
      { html:`<div class="menu-caption">Color</div><div class="swatch-row">${REC_COLORS.map(cc => `<button class="swatch ${c.color === cc ? 'on' : ''}" style="background:${recColor(cc)}" data-action="col-color" data-args='${JSON.stringify({ id: colId, c: cc })}' aria-label="${cc}"></button>`).join('')}</div>` },
      { icon:'watch', label: watching ? 'Stop watching' : 'Watch this column', action:'col-watch', args:colId },
      c.kind === 'column' ? { icon:'steps', label: c.onHoldEnabled ? 'Disable the On Hold section' : 'Enable an On Hold section', action:'col-onhold', args:colId } : null,
      c.kind === 'column' ? { sep:true } : null,
      c.kind === 'column' ? { icon:'trash', label:'Delete column (cards go to triage)', action:'col-trash', args:colId, danger:true } : null
    ], { close:true }), { cls:'options', align:'right' });
  },
  'col-rename'(el, colId){
    closePopover();
    const c = R(colId);
    const name = prompt('Rename column:', c.title);
    if (name && name.trim()){ c.title = name.trim(); save(); render(); }
  },
  'col-color'(el, a){ R(a.id).color = a.c; save(); render(); },
  'col-watch'(el, colId){
    const c = R(colId);
    const i = c.watcherIds.indexOf(db.meId);
    i >= 0 ? c.watcherIds.splice(i, 1) : c.watcherIds.push(db.meId);
    closePopover(); save(); render();
    toast(i >= 0 ? 'You’ll stop hearing about this column.' : 'Watching — you’d be notified about new cards here.');
  },
  'col-onhold'(el, colId){ const c = R(colId); c.onHoldEnabled = !c.onHoldEnabled; closePopover(); save(); render(); },
  'col-trash'(el, colId){
    closePopover();
    const c = R(colId);
    const triage = kids(c.toolId, 'CardColumn').find(x => x.kind === 'triage');
    kids(c.id, 'Card').forEach(card => { card.parentId = triage.id; card.onHold = false; });
    c.status = 'trashed';
    save(); render();
  },
  'card-toggle-done'(el, id){
    const c = R(id);
    const { done, triage } = tableCols(toolById(c.toolId));
    if (c.completedAt){ c.completedAt = null; c.completedById = null; c.parentId = triage.id; logEvent(c, 'moved', { detail:'Done → ' + triage.title }); }
    else { c.parentId = done.id; c.onHold = false; c.completedAt = Date.now(); c.completedById = db.meId; logEvent(c, 'completed'); }
    touch(c); save(); render();
  },
  'card-move-menu'(el, id){
    const c = R(id);
    const { triage, user, notNow, done } = tableCols(toolById(c.toolId));
    const dest = [];
    [triage, ...user].forEach(col => {
      dest.push({ label: col.title, col: col.id, hold: false });
      if (col.onHoldEnabled) dest.push({ label: col.title + ': On hold', col: col.id, hold: true });
    });
    dest.push({ label:'Done ✓', col: done.id, hold: false }, { label:'Not now', col: notNow.id, hold: false });
    openPopover(el, menuHTML([{ caption:'Move along to…' }, ...dest.map(d => ({
      label: d.label + (c.parentId === d.col && c.onHold === d.hold ? ' ·' : ''),
      icon: 'caretR', action:'card-move', args:{ id, col: d.col, hold: d.hold }
    }))], { close:true }), { cls:'options' });
  },
  'card-move'(el, a){
    const c = R(a.id);
    const from = R(c.parentId);
    const to = R(a.col);
    c.parentId = to.id; c.onHold = a.hold;
    c.completedAt = to.kind === 'done' ? Date.now() : null;
    c.completedById = to.kind === 'done' ? db.meId : null;
    logEvent(c, 'moved', { detail: `${from.title}${c.onHold ? '' : ''} → ${to.title}${a.hold ? ': On hold' : ''}` });
    touch(c); closePopover(); save(); render();
  }
});

function linkify(html){
  return html.replace(/(https?:\/\/[^\s<"]+)/g, url => {
    let domain = ''; try{ domain = new URL(url).hostname.replace('www.', ''); }catch(e){}
    return `<a href="${url}" target="_blank" rel="noopener">${url}</a><br><span class="unfurl">${ic('globe', 14)} <b>${esc(domain)}</b> ${esc(url.split('/').filter(Boolean).slice(2).join(' / ').slice(0, 48))}</span>`;
  });
}
function vChat(p, t){

  lines.forEach(l => {

    if (d !== lastDay){

    out += `<div class="chat-line" data-ft="${esc(stripTags(l.content) + ' ' + P(l.creatorId).name)}">

            <button class="icon-btn" data-action="chat-send" data-args='${t.id}' title="Send (Enter)" aria-label="Send">${ic('reply')}</button>
          </div>
        </div>
        <p class="small muted" style="margin-top:.5rem"><kbd>↵</kbd> sends · <kbd>⇧↵</kbd> for a new line</p>
      </div>
    </div>`;
  const notify = db.prefs.notifyProjects['chat' + t.id];

/* =====================================================================

   ===================================================================== */
function monthGridHTML(y, m, sources){
  const first = new Date(y, m, 1);
  const start = startOfDay(first.getTime()) - first.getDay() * DAY;
  const events = db.recs.filter(r => r.status === 'active' && r.type === 'ScheduleEntry' && sources.includes(r.projectId));
  const dues = db.recs.filter(r => r.status === 'active' && (r.type === 'Todo' || r.type === 'Card') && !r.completed && !r.completedAt && r.dueOn && sources.includes(r.projectId));
  let rows = '';
  for (let w = 0; w < 6; w++){
    let cells = '';
    for (let d = 0; d < 7; d++){
      const ts = start + (w*7 + d) * DAY;
      const dt = new Date(ts);
      const dayEv = events.filter(e => startOfDay(e.startsAt) <= ts && startOfDay(e.endsAt || e.startsAt) >= ts)
        .map(e => `<a class="cal-pill" style="--pc:${recColor(db.prefs.calColors[e.projectId] || projById(e.projectId)?.color)}" href="${urlRec(e)}" title="${esc(e.title)}">${e.allDay ? '' : `<b>${esc(fmtTime(e.startsAt))}</b> `}${esc(e.title)}</a>`);
      const dayDue = dues.filter(td => sameDay(td.dueOn, ts))
        .map(td => `<span class="cal-pill" style="--pc:${recColor(db.prefs.calColors[td.projectId] || projById(td.projectId)?.color)}"><button class="todo-checkbox" data-action="toggle-complete" data-args='${td.id}' aria-label="Complete ${esc(td.title)}">${ic('check', 9)}</button><a href="${urlRec(td)}" style="color:inherit">${esc(td.title)}</a></span>`);
      cells += `<td class="${dt.getMonth() !== m ? 'other' : ''} ${sameDay(ts, Date.now()) ? 'today' : ''}"><span class="dnum">${dt.getDate()}</span>${dayEv.join('')}${dayDue.join('')}</td>`;
    }
    rows += `<tr>${cells}</tr>`;
  }
  return `<table class="cal-grid"><thead><tr>${DAYS.map(d => `<th>${d.slice(0,3)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
}
function calNavHTML(base, y, m){
  const prev = m === 0 ? `${y-1}-12` : `${y}-${String(m).padStart(2,'0')}`;
  const next = m === 11 ? `${y+1}-01` : `${y}-${String(m+2).padStart(2,'0')}`;
  return `<div class="cal-nav">
    <button class="icon-btn" data-action="nav" data-args='${JSON.stringify(base + '?m=' + prev)}' aria-label="Previous month">${ic('back')}</button>
    <h2>${MONTHS[m]} ${y}</h2>
    <button class="icon-btn" data-action="nav" data-args='${JSON.stringify(base + '?m=' + next)}' aria-label="Next month" style="transform:scaleX(-1)">${ic('back')}</button>
    <button class="btn btn--sm btn--ghost" data-action="nav" data-args='${JSON.stringify(base)}'>Today</button>
  </div>`;
}
function parseMonth(q){
  if (q.m && /^\d{4}-\d{2}$/.test(q.m)){ const [y, m] = q.m.split('-').map(Number); return [y, m - 1]; }
  const now = new Date(); return [now.getFullYear(), now.getMonth()];
}

function feedRowsHTML(events){
  const byDay = {};
  events.forEach(e => { const d = startOfDay(e.at); (byDay[d] = byDay[d] || []).push(e); });
  return Object.keys(byDay).sort((a,b) => b - a).map(d => {
    const evs = byDay[d].sort((a,b) => b.at - a.at);
    const people = [...new Set(evs.map(e => e.byId))].filter(Boolean);
    const dts = +d;
    return `<section class="feed-day">

/* =====================================================================
   Search
   ===================================================================== */
function vSearch(q){
  const query = (q.q || '').trim();
  const scope = { project: q.project ? +q.project : null, type: q.type || '', person: q.person ? +q.person : null };
  let results = [];
  if (query){
    const qq = query.toLowerCase();
    results = db.recs.filter(r => {
      if (r.status !== 'active') return false;
      if (scope.project && r.projectId !== scope.project) return false;
      if (scope.type && r.type !== scope.type) return false;
      if (scope.person && r.creatorId !== scope.person) return false;
      return (r.title || '').toLowerCase().includes(qq) || stripTags(r.content).toLowerCase().includes(qq);
    });
    const sort = q.sort || 'best';
    results.sort((a,b) => sort === 'recent' ? b.updatedAt - a.updatedAt :
      ((b.title || '').toLowerCase().includes(qq) - (a.title || '').toLowerCase().includes(qq)) || b.updatedAt - a.updatedAt);
  }
  const hl = s => {
    const i = s.toLowerCase().indexOf(query.toLowerCase());
    if (i < 0 || !query) return esc(s.slice(0, 160));
    const st = Math.max(0, i - 40);
    return esc(s.slice(st, i)) + '<mark>' + esc(s.substr(i, query.length)) + '</mark>' + esc(s.substr(i + query.length, 120));
  };
  const mk = o => '#/search?' + new URLSearchParams(Object.assign({}, q, o)).toString();
  const body = `
    <header class="page-head"><h1 class="display">Search</h1></header>
    <div class="toolbar">
      <input class="filter-input" style="flex:1;max-width:44rem" type="search" id="searchBox" value="${esc(query)}" placeholder="Search every project…" data-enter="search-go" autofocus>
      <button class="btn btn--primary" data-action="search-go">Search</button>
    </div>
    <div class="toolbar" style="margin-top:-1rem">
      <span class="seg">
        <button aria-pressed="${(q.sort || 'best') === 'best'}" data-action="nav" data-args='${JSON.stringify(mk({ sort:'best' }))}'>Best match</button>
        <button aria-pressed="${q.sort === 'recent'}" data-action="nav" data-args='${JSON.stringify(mk({ sort:'recent' }))}'>Most recent</button>
      </span>
      <select class="pill-select" data-change="search-facet" data-key="project"><option value="">Any project</option>${db.projects.map(p => `<option value="${p.id}" ${scope.project === p.id ? 'selected' : ''}>${esc(p.name)}</option>`).join('')}</select>
      <select class="pill-select" data-change="search-facet" data-key="type"><option value="">Any type</option>${Object.keys(TYPE_LABEL).map(t => `<option value="${t}" ${scope.type === t ? 'selected' : ''}>${TYPE_LABEL[t]}</option>`).join('')}</select>
      <select class="pill-select" data-change="search-facet" data-key="person"><option value="">Anyone</option>${db.people.map(p => `<option value="${p.id}" ${scope.person === p.id ? 'selected' : ''}>${esc(p.name)}</option>`).join('')}</select>
    </div>
    ${query ? `<p class="muted small">${results.length} result${results.length === 1 ? '' : 's'} for “${esc(query)}”</p>` : '<p class="center-note">Type a search and press Enter. Tip: from the jump menu, <kbd>ctrl ↵</kbd> searches everywhere.</p>'}
    ${results.slice(0, 50).map(r => `<a class="search-row" href="${urlRec(r)}">
      ${ic(TYPE_ICON[r.type] || 'doc', 20)}
      <span class="s-main"><h3>${r.title ? hl(r.title) : '<i>' + TYPE_LABEL[r.type] + '</i>'}</h3>
      <span class="s-meta">${esc(TYPE_LABEL[r.type] || r.type)} · ${esc(projById(r.projectId)?.name || '')} · ${esc(P(r.creatorId)?.name || '')} · ${esc(fmtDay(r.createdAt))}</span>
      <span class="s-ex">${hl(stripTags(r.content))}</span></span></a>`).join('')}`;
  return sheet({ crumbs: [{ label:'Search' }] }, body);
}
Object.assign(ACTIONS, {
  'search-go'(){ const v = $('#searchBox').value.trim(); const { q } = parseHash(); q.q = v; go('#/search?' + new URLSearchParams(q).toString()); },
  'search-facet'(el){ const { q } = parseHash(); if (el.value) q[el.dataset.key] = el.value; else delete q[el.dataset.key]; go('#/search?' + new URLSearchParams(q).toString()); }
});

    `<header class="page-head"><h1 class="display">My drafts</h1><p class="page-sub">Only you can see these.</p></header>
    ${drafts.length ? drafts.map(d => `<div class="people-row">${ic('drafts', 18)}
      <span class="p-main"><span class="nm">${esc(d.title)}</span><span class="em">${esc(TYPE_LABEL[d.type])} · ${esc(projById(d.projectId)?.name || '')} · saved ${esc(fmtWhen(d.updatedAt))}</span></span>
      <a class="btn btn--sm btn--ghost" href="#/${AID()}/buckets/${d.projectId}/messages/new?edit=${d.id}">Keep writing</a>
      <button class="btn btn--sm btn--primary" data-action="draft-publish" data-args='${d.id}'>Post it</button>
    </div>`).join('') : `<div class="empty-state">${DOODLE}<h3>No drafts</h3><p>“Save as a draft” from the message composer parks things here until you’re ready.</p></div>`}`);
}
Object.assign(ACTIONS, {
  'draft-publish'(el, id){
    const d = R(id); d.status = 'active'; d.createdAt = Date.now(); touch(d);
    logEvent(d, 'created');
    save(); go(urlRec(d)); toast('Posted.');
  }
});
function vBoostsPage(){
  const given = db.boosts.filter(b => b.personId === db.meId).sort((a,b) => b.at - a.at);
  const gotten = db.boosts.filter(b => { const r = R(b.recId); return r && r.creatorId === db.meId && b.personId !== db.meId; }).sort((a,b) => b.at - a.at);
  const rows = list => list.map(b => {
    const r = R(b.recId); if (!r) return '';
    const root = rootRecordable(r);
    return `<div class="people-row">${avatarHTML(P(b.personId), 'xs')}<span class="p-main"><span class="nm">${esc(b.content)}</span>
      <span class="em">on <a href="${urlRec(r)}">${esc(root.title || TYPE_LABEL[r.type])}</a> · ${esc(fmtWhen(b.at))}</span></span></div>`;
  }).join('');
  return sheet({ crumbs: [{ label:'My Boosts' }] },
    `<header class="page-head"><h1 class="display">Boosts</h1></header>
    <div class="rule-head"><h2>You’ve gotten</h2></div>
    ${rows(gotten) || '<p class="muted">No boosts on your stuff yet.</p>'}
    <div class="rule-head"><h2>You’ve given</h2></div>
    ${rows(given) || '<p class="muted">Tap the 🚀 under anything to send some love.</p>'}`);
}
function vPerson(pid){
  const p = P(pid);
  if (!p) return v404();
  const evs = db.events.filter(e => e.byId === pid).sort((a,b) => b.at - a.at).slice(0, 12);
  return sheet({ crumbs: [{ label: p.name }] }, `
    <div class="profile-head">
      ${avatarHTML(p, 'xl')}
      <div>
        <h1 class="display" style="font-size:3.2rem">${esc(p.name)}</h1>
        <p class="muted">${esc(p.title || '')}${p.title ? ' · ' : ''}${esc(p.email)} · local time ${esc(fmtTime(Date.now()))}</p>
        <p style="margin-top:.6rem">${p.owner ? '<span class="tag-pill">owner</span> ' : ''}${p.admin && !p.owner ? '<span class="tag-pill">admin</span> ' : ''}${p.sample ? '<span class="tag-pill">sample person — came with the sample project</span>' : ''}</p>
      </div>
      ${pid !== db.meId ? `<span style="margin-left:auto"><button class="btn btn--ghost" data-action="ping-start" data-args='${pid}'>${ic('chat')} Ping ${esc(p.name.split(' ')[0])}</button></span>` : ''}
    </div>
    <div class="rule-head"><h2>Recent activity</h2></div>
    ${evs.map(e => `<div class="feed-row"><span class="ft">${esc(fmtWhen(e.at))}</span><span class="fx">${evtSentence(e)}<span class="proj">${esc(projById(e.projectId)?.name || '')}</span></span></div>`).join('') || '<p class="muted">Quiet so far.</p>'}`);
}
function vPings(pingId){
  if (!pingId){
    return sheet({ crumbs: [{ label:'Pings' }] }, `
      <header class="page-head"><h1 class="display">Pings</h1><p class="page-sub">Direct messages, outside any project.</p></header>
      ${db.pings.map(pg => { const other = P(pg.withIds.find(x => x !== db.meId)); const last = pg.lines[pg.lines.length - 1];
        return `<a class="search-row" href="#/pings/${pg.id}">${avatarHTML(other)}<span class="s-main"><h3>${esc(other?.name || '')}</h3><span class="s-ex">${esc(last ? stripTags(last.content).slice(0, 100) : 'No messages yet')}</span></span></a>`; }).join('')
      || `<div class="empty-state">${DOODLE}<h3>No pings yet</h3><p>Start one from the sidebar, someone’s profile, or press <kbd>⇧P</kbd>.</p><button class="btn btn--primary" data-action="new-ping">New ping</button></div>`}`);
  }
  const pg = db.pings.find(x => x.id === pingId);
  if (!pg) return v404();
  const other = P(pg.withIds.find(x => x !== db.meId));
  let out = '', lastDay = null;
  pg.lines.forEach(l => {
    const d = startOfDay(l.at);
    if (d !== lastDay){ out += `<div class="chat-day">${sameDay(l.at, Date.now()) ? 'Today' : esc(fmtDayLong(l.at))}</div>`; lastDay = d; }
    out += `<div class="chat-line">${avatarHTML(P(l.personId))}<div class="cl-bubble">
      <div class="cl-head"><b>${esc(P(l.personId)?.name || '')}</b><span class="t">${esc(fmtTime(l.at))}</span></div>
      <div class="cl-body">${l.content}</div></div></div>`;
  });
  const body = `
    <div class="chat-sheet">
      <div class="chat-scroll">${out || `<p class="center-note">Say hi to ${esc(other?.name || '')} — though heads up: sample people never write back. 😌</p>`}</div>
      <div class="chat-compose"><div class="chat-input-wrap">
        <div class="chat-input" id="pingInput" contenteditable="true" role="textbox" data-ph="Ping ${esc(other?.name.split(' ')[0] || '')}…" data-ping="${pg.id}"></div>
        <div class="chat-tools"><button class="icon-btn" data-action="ping-send" data-args='${pg.id}' title="Send" aria-label="Send">${ic('reply')}</button></div>
      </div></div>
    </div>`;
  return sheet({ crumbs: [{ label:'Pings', href:'#/pings' }, { label: other?.name || 'Ping' }], flush:true }, body);
}
Object.assign(ACTIONS, {
  'ping-start'(el, pid){
    closeModal(); closePopover();
    let pg = db.pings.find(x => x.withIds.includes(pid));
    if (!pg){ pg = { id: nid(), withIds: [db.meId, pid], lines: [] }; db.pings.push(pg); save(); }
    go('#/pings/' + pg.id);
  },
  'ping-send'(el, pingId){
    const inp = $('#pingInput');
    const html = inp.innerHTML.trim();
    if (!html || !stripTags(html)) return;
    const pg = db.pings.find(x => x.id === (pingId || +inp.dataset.ping));
    pg.lines.push({ id: nid(), personId: db.meId, content: /^</.test(html) ? html : `<p>${html}</p>`, at: Date.now() });
    save(); render();
    const c = $('#pingInput'); if (c) c.focus();
  }
});
function vProjectsIndex(q){
  const showArchived = q.archived === '1';
  const projs = db.projects.filter(p => showArchived ? true : p.status === 'active');
  return sheet({ crumbs: [{ label:'All projects' }] }, `
    <header class="page-head"><h1 class="display">All projects</h1></header>
    <div class="toolbar">
      <button class="btn btn--primary" data-action="new-project">${ic('plus')} Make a new project</button>
      <input class="filter-input" type="text" placeholder="Filter…" data-filter=".search-row" aria-label="Filter projects">
      <span class="spacer"></span>
      <label class="switch"><input type="checkbox" data-change="projects-archived" ${showArchived ? 'checked' : ''}><span class="track"></span><span class="switch-label muted small">Show archived</span></label>
    </div>
    ${projs.map(p => `<a class="search-row" href="${urlProject(p)}" data-ft="${esc(p.name)}">
      <span class="jr-icon" style="background:color-mix(in hsl, ${recColor(p.color)}, transparent 55%)">${ic('folder', 14)}</span>
      <span class="s-main"><h3>${esc(p.name)} ${p.status === 'archived' ? '<span class="tag-pill">archived</span>' : ''} ${p.allAccess ? '<span class="tag-pill">All-access</span>' : ''}</h3>
      <span class="s-ex">${esc(p.description)}</span></span>${facepile(p.peopleIds, 'xs', 6)}</a>`).join('')}`);
}
Object.assign(ACTIONS, {
  'projects-archived'(el){ go('#/projects' + (el.checked ? '?archived=1' : '')); }
});

/* =====================================================================
   Event delegation & boot
   ===================================================================== */
function parseArgs(el){
  const raw = el.dataset.args;
  if (raw === undefined) return undefined;
  try { return JSON.parse(raw); } catch(e){ return raw; }
}
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const fn = ACTIONS[el.dataset.action];
  if (!fn) return;
  if (el.tagName === 'LABEL' || e.target.closest('input[type=checkbox], input[type=radio]')) return; // let change events handle
  const navLink = el.tagName === 'A' && (el.getAttribute('href') || '').startsWith('#');
  if (!navLink) e.preventDefault();
  e.stopPropagation();
  fn(el, parseArgs(el), e);
});
document.addEventListener('change', e => {
  const el = e.target.closest('[data-change]');
  if (!el) return;
  const name = el.dataset.change;
  if (name === 'jump-archived'){ ui.jumpArchived = el.checked; renderJumpList(); return; }
  if (name === 'sub-person'){ const a = parseArgs(el); const rec = R(a.rec); el.checked ? subscribe(rec, a.p) : unsubscribe(rec, a.p); save(); return; }
  if (name === 'project-person'){ const a = parseArgs(el); const p = projById(a.p);
    el.checked ? (p.peopleIds.includes(a.person) || p.peopleIds.push(a.person)) : (p.peopleIds = p.peopleIds.filter(x => x !== a.person)); save(); return; }
  if (name === 'pick-person'){ const a = parseArgs(el); const rec = R(a.rec);
    const list = rec[a.field] || (rec[a.field] = []);
    el.checked ? (list.includes(a.p) || list.push(a.p)) : (rec[a.field] = list.filter(x => x !== a.p));
    touch(rec); save(); return; }
  const fn = ACTIONS[name];
  if (fn){ fn(el, parseArgs(el), e); }
});
document.addEventListener('input', e => {
  const f = e.target.closest('[data-filter]');
  if (!f) return;
  const q = f.value.trim().toLowerCase();
  $$(f.dataset.filter).forEach(row => {
    const t = (row.dataset.ft || row.textContent || '').toLowerCase();
    row.style.display = (!q || t.includes(q)) ? '' : 'none';
  });
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const el = e.target.closest && e.target.closest('[data-enter]');
  if (el){
    e.preventDefault();
    const fn = ACTIONS[el.dataset.enter];
    if (fn) fn(el, el.dataset.list ? +el.dataset.list : (el.dataset.rec ? +el.dataset.rec : undefined), e);
    return;
  }
  if (e.target.id === 'chatInput' && !e.shiftKey){ e.preventDefault(); ACTIONS['chat-send'](e.target, +e.target.dataset.chat); }
  if (e.target.id === 'pingInput' && !e.shiftKey){ e.preventDefault(); ACTIONS['ping-send'](e.target, +e.target.dataset.ping); }
});
document.addEventListener('click', e => {
  // close popover on outside click
  if (popEl && !popEl.contains(e.target) && e.target !== popAnchor && !(popAnchor && popAnchor.contains(e.target))) closePopover();
}, true);

/* boot */
db = loadDb() || seed();
save();
window.addEventListener('hashchange', () => { closeTray(); closeSidebar(); closeJump(); closeModal(); render(); });
setInterval(() => { renderMyBar(); }, 60 * 1000); // resurface bubbled-up items
render();

</script>
</body>
</html>
