    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      font-family: var(--font-base);
      color: var(--color-text);
      background: var(--color-body);
      font-size: 1.5rem;
      line-height: var(--line-height-base);
      overflow-x: hidden;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .skip { position: fixed; top: 1rem; left: 1rem; transform: translateY(-200%); z-index: 500; background: var(--color-blue-50); color: white; padding: .8rem 1.2rem; border-radius: var(--radius-md); }
    .skip:focus { transform: none; }
    .app { min-height: 100vh; padding-bottom: calc(var(--footer-size) + 1rem); }
    .topbar {
      position: sticky; top: 0; z-index: 80;
      height: 5.6rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      padding: 0 var(--shell-gutter);
      background: linear-gradient(to bottom, var(--color-body) 70%, transparent);
    }
    .top-left, .top-right { display: flex; align-items: center; gap: .8rem; min-width: 0; }
    .top-right { justify-content: flex-end; }
    .account-switcher {
      border: 0; background: transparent; padding: .6rem 1rem; border-radius: 999px;
      display: inline-flex; align-items: center; gap: .5rem; font-weight: 700;
    }
    .account-switcher:hover, .ghost:hover { background: var(--tint-ink-10); }
    .top-link, .ghost, .icon-btn {
      border: 0; background: transparent; border-radius: var(--radius-md); min-height: 3.2rem;
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      color: var(--color-text-subtle);
    }
    .top-link { padding: .4rem .8rem; font-size: 1.3rem; font-weight: 650; }
    .ghost { padding: .6rem .9rem; }
    .icon-btn { width: 3.2rem; padding: 0; }
    .hint {
      display: none; min-width: 1.8rem; height: 1.8rem; place-items: center;
      border-radius: var(--radius-xs); background: var(--color-yellow-40); color: hsl(35, 45%, 12%);
      font-size: 1.1rem; font-weight: 800;
    }
    .show-hints .hint { display: inline-grid; }

    .page {
      width: min(132rem, calc(100vw - var(--shell-gutter) * 2));
      margin: 0 auto 3rem;
    }
    .sheet {
      background: var(--color-canvas-light);
      border: 1px solid color-mix(in hsl, var(--color-ink-30), transparent 25%);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-xl);
      min-height: calc(100vh - 12rem);
    }
    .narrow { width: min(98rem, calc(100vw - var(--shell-gutter) * 2)); }
    .toolbar, .crumbbar {
      display: flex; align-items: center; gap: .8rem; flex-wrap: wrap;
      padding: 1.2rem 1.8rem; border-bottom: var(--border);
    }
    .crumbbar { justify-content: space-between; color: var(--color-text-subtle); font-size: 1.3rem; }
    .crumbs { display: flex; align-items: center; gap: .7rem; min-width: 0; }
    .crumbs a { color: var(--color-text); font-weight: 700; }
    .main-pad { padding: clamp(2rem, 4vw, 5.6rem); }
    h1, h2, h3 { margin: 0; line-height: var(--line-height-headings); letter-spacing: 0; }
    h1 { font-size: clamp(3.2rem, 4.6vw, 5rem); font-weight: 850; }
    h2 { font-size: 2.5rem; font-weight: 800; }
    h3 { font-size: 1.7rem; font-weight: 800; }
    p { margin: 0; }
    .muted { color: var(--color-text-subtle); }
    .small { font-size: 1.3rem; }
    .tiny { font-size: 1.15rem; }
    .rule-title { display: grid; grid-template-columns: auto 1fr; gap: 1rem; align-items: center; margin: 2.4rem 0 1.2rem; }
    .rule-title:after { content: ""; border-top: var(--border); }

    .btn {
      border: 1px solid transparent; border-radius: var(--radius-lg); min-height: 3.4rem;
      display: inline-flex; align-items: center; justify-content: center; gap: .55rem;
      padding: .65rem 1.05rem; font-weight: 750; background: var(--tint-ink-5); color: var(--color-text);
      box-shadow: var(--shadow-base);
    }
    .btn.primary { background: var(--color-blue-50); color: white; border-color: color-mix(in hsl, var(--color-blue-50), black 12%); }
    .btn.success { background: var(--color-green-50); color: hsl(150, 40%, 10%); }
    .btn.outline { background: transparent; border-color: var(--color-ink-30); box-shadow: none; color: var(--color-text-subtle); }
    .btn.dashed { border-style: dashed; background: transparent; color: var(--color-text-subtle); }
    .pill, .chip, .boost {
      display: inline-flex; align-items: center; gap: .45rem; border-radius: 999px; padding: .35rem .7rem;
      border: 1px solid var(--color-ink-30); background: var(--tint-ink-5); color: var(--color-text);
      font-size: 1.22rem; font-weight: 700; white-space: nowrap;
    }
    .pill.blue { background: var(--color-blue-20); color: var(--color-blue-70); border-color: var(--color-blue-30); }
    .pill.green { background: var(--color-green-20); color: var(--color-green-70); border-color: var(--color-green-30); }
    .pill.yellow { background: var(--color-yellow-20); color: var(--color-yellow-70); border-color: var(--color-yellow-30); }
    .pill.peach { background: var(--color-orange-10); color: var(--color-orange-70); border-color: var(--color-orange-30); }
    .filter {
      min-width: 18rem; height: 3.4rem; border-radius: var(--radius-md); border: var(--border);
      background: var(--tint-ink-3); padding: 0 1rem; outline: none;
    }
    .filter:focus, textarea:focus, input:focus { border-color: var(--color-blue-50); box-shadow: 0 0 0 .3rem color-mix(in hsl, var(--color-blue-50), transparent 72%); }
    mark { background: var(--color-yellow-40); color: hsl(35, 45%, 12%); border-radius: .2rem; padding: 0 .15rem; }

    .avatar { --s: 3.2rem; width: var(--s); height: var(--s); border-radius: 50%; display: inline-grid; place-items: center; color: white; font-weight: 850; border: 2px solid var(--color-canvas-light); background: var(--avatar-bg, var(--color-blue-50)); flex: 0 0 auto; position: relative; overflow: hidden; }
    .avatar.sm { --s: 2.4rem; font-size: 1.1rem; }
    .avatar.xs { --s: 1.8rem; font-size: 1rem; border-width: 1px; }
    .avatar.big { --s: 4.8rem; font-size: 1.9rem; }
    .avatar-stack { display: flex; align-items: center; }
    .avatar-stack .avatar { margin-left: -.8rem; }
    .avatar-stack .avatar:first-child { margin-left: 0; }

    .home-grid { display: grid; grid-template-columns: minmax(26rem, 43rem) minmax(28rem, 1fr); gap: clamp(2rem, 5vw, 7rem); align-items: start; }
    .home-actions { display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center; margin: 1.2rem 0 2rem; }
    .project-card {
      display: grid; gap: 1rem; min-height: 12.5rem; padding: 1.5rem; border-radius: var(--radius-lg);
      background: var(--color-slate-20); border: var(--border); box-shadow: var(--shadow-card);
      position: relative; transition: transform .15s var(--ease-out-expo), border-color .15s;
    }
    .project-card:hover { transform: translateY(-2px); border-color: var(--color-blue-40); }
    .star { display: inline-grid; place-items: center; width: 2.4rem; height: 2.4rem; border-radius: 50%; background: linear-gradient(135deg, var(--color-yellow-70), var(--color-yellow-60) 50%, var(--color-orange-60) 54%, var(--color-orange-50)); color: hsl(30, 45%, 14%); font-weight: 900; border: 0; }
    .star.off { background: var(--tint-ink-10); color: var(--color-text-subtle); }
    .activity-rail { border-left: var(--border); padding-left: 2.4rem; min-height: 52rem; }
    .activity-row, .list-row {
      display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; align-items: start;
      padding: 1.2rem 0; border-bottom: var(--border);
    }
    .dot { width: .9rem; height: .9rem; border-radius: 50%; background: var(--color-orange-50); display: inline-block; box-shadow: 0 0 0 .3rem color-mix(in hsl, var(--color-orange-50), transparent 80%); }

    .project-hero { display: grid; gap: 1.2rem; margin-bottom: 3rem; position: relative; }
    .hero-people { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .client-tab {

        <div class="composer"><textarea placeholder="Add a comment..."></textarea><button class="btn primary" data-toast="Comment posted">Post</button></div>
      </section>`;
      return appShell(`<div class="sheet">${body}</div>`, { narrow: true });
    }

    function renderCards() {
      const triage = seed.columns[0];
      const userCols = seed.columns.slice(1,5);
      const body = `${crumb([{ label: "Home", href: "home" }, { label: seed.project.name, href: "project" }, { label: "Card Table" }])}
      <section class="main-pad"><h1>Card Table</h1><div class="toolbar" style="padding-left:0;border-bottom:0"><button class="btn primary" data-toast="New card composer opened">+ Add a card</button><input class="filter" data-filter placeholder="Filter..." value="${esc(state.query || "")}"></div>
        <div class="kanban"><section class="triage"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h3>${esc(triage.name)} (${triage.cards.length})</h3><div class="muted small">Watching: ${stack(triage.watchers, "xs")}</div></div><div class="cards-row">${triage.cards.map(cardTile).join("")}</div></section>
        <div class="kanban-grid"><div class="edge-strip">Not now (2)</div>${userCols.map((col) => `<section class="column" style="--col:${col.color}"><div class="col-head"><span>${esc(col.name)} (${col.cards.length})</span><button class="icon-btn">•••</button></div><div class="col-body">${col.cards.filter(c=>!c.onHold).map(cardTile).join("") || `<div class="empty-sketch" style="min-height:10rem">No cards</div>`}${col.cards.some(c=>c.onHold) ? `<div class="onhold"><div class="onhold-label">ON HOLD</div>${col.cards.filter(c=>c.onHold).map(cardTile).join("")}</div>` : ""}</div></section>`).join("")}<button class="btn primary" style="align-self:center;border-radius:50%;width:4rem;height:4rem;padding:0" data-toast="New column form opened">+</button><div class="edge-strip done">Done (5)</div></div></div>
      </section>`;
      return appShell(`<div class="sheet" style="overflow:hidden">${body}</div>`);
    }
    function cardTile(c) {
      return `<a class="card-tile" href="#/card/${c.id}"><strong>${esc(c.title)}</strong><div class="muted small">By ${person(c.author).name} on ${relDate(c.date)}</div><div style="display:flex;justify-content:space-between;align-items:center"><span class="pill">${c.steps ? `✓ ${c.doneSteps}/${c.steps}` : "No steps"}</span><span>${c.assignees.map(id=>avatar(id,"xs")).join("")}</span></div></a>`;
    }
    function renderCard(id) {
      const c = allCards().find(x => x.id === id) || allCards()[0];
      const body = `${crumb([{ label: "Home", href: "home" }, { label: seed.project.name, href: "project" }, { label: "Card Table", href: "cards" }, { label: c.title }])}
      <section class="main-pad"><h1>${esc(c.title)}</h1><p class="muted">By ${person(c.author).name} on ${relDate(c.date)} · ${c.column}</p>
        <dl class="field-grid"><dt>Move along to...</dt><dd><select class="filter">${["Page ideas","Writing","Writing: On hold","Design","Review","Ready","Done","Not now"].map(x=>`<option>${x}</option>`).join("")}</select></dd><dt>Assigned to</dt><dd>${c.assignees.map(chip).join(" ")}</dd><dt>Due on</dt><dd>${relDate(8)}</dd><dt>Notes</dt><dd>Keep the page useful enough for launch, then improve it after we see real traffic.</dd><dt>Subtasks</dt><dd>${Array.from({length:c.steps || 2},(_,i)=>`<div class="step"><span class="check ${i < c.doneSteps ? "done" : ""}">${i < c.doneSteps ? "✓" : ""}</span><span>${["Collect examples","Draft the section","Ask for review","Ship final polish"][i] || "Step"}</span></div>`).join("")}</dd></dl>
        <div class="rule-title"><h3>Discussion</h3></div><article class="comment">${avatar("grace")}<div><strong>Grace Okafor</strong><p>I am watching this one for launch-readiness.</p></div></article>
      </section>`;
      return appShell(`<div class="sheet">${body}</div>`, { narrow: true });
    }

    function renderDocs() {
      const q = state.query || "";
      const rows = seed.docs.filter((d) => !q || (d.title + d.meta).toLowerCase().includes(q.toLowerCase()));
      const toolbar = `<div class="toolbar" style="padding-left:0;border-bottom:0"><button class="btn primary" data-toast="New document menu opened">+ New...</button><button class="btn outline">All files</button><button class="btn outline">File type⌄</button><button class="btn outline">Sort manually⌄</button><input class="filter" data-filter placeholder="Filter..." value="${esc(q)}"><span class="pill">0/99 keep folders open</span></div>`;
      const body = `<section class="docs-list">${rows.map((d) => `<div class="doc-grid"><div class="${d.type === "upload" ? "file-thumb" : "file-icon"}">${esc(d.icon)}</div><div><h3>${highlight(d.title, q)}</h3><p class="muted">${highlight(d.meta, q)} · ${esc(d.author)} · ${relDate(d.date)}</p></div><button class="icon-btn" data-toast="File options opened">•••</button></div>`).join("")}</section>`;
      return toolPage("Docs & Files", "docs", body, toolbar);
    }
    function renderChat() {
      const body = `${crumb([{ label: "Home", href: "home" }, { label: seed.project.name, href: "project" }, { label: "Chat" }], `<button class="btn outline" data-toast="Chat notification menu opened">Notify me when people chat</button>`)}
      <section class="main-pad chat-wrap"><p class="muted">Just put a heads up in case anyone's trying to listen to it in the next 40 minutes or so!</p><div class="day-divider">Today</div>
        ${seed.chat.map((line, i) => {
          const [, author, text, boost] = line;
          const prev = seed.chat[i-1]?.[1] === author;
          return `<div class="chat-line ${prev ? "suppressed" : ""}">${prev ? "<div></div>" : `<div>${avatar(author)}</div>`}<div>${prev ? "" : `<strong>${person(author).name}</strong> <span class="muted small">12:${String(i+10).padStart(2,"0")}pm</span><br>`}<span class="bubble">${esc(text)} ${boost ? `<span class="boost">${boost}</span>` : ""}</span></div></div>`;
        }).join("")}
        <div class="chat-composer"><textarea class="notes-field" rows="1" placeholder="Write something..."></textarea><button class="icon-btn" data-toast="Emoji picker opened">☺</button><button class="icon-btn" data-toast="Attachment picker opened">↥</button><button class="btn primary" data-toast="Chat line posted">Post</button></div>
      </section>`;
      return appShell(`<div class="sheet">${body}</div>`);
    }

    function renderSchedule() {
      const body = `<div class="sheet">${crumb([{label:"Home",href:"home"},{label:seed.project.name,href:"project"},{label:"Calendar"}])}<section class="main-pad"><h1>Calendar</h1><div class="toolbar" style="padding-left:0;border-bottom:0"><button class="btn primary" data-toast="New event form opened">+ New event</button><button class="btn outline">Mine</button><button class="btn outline">Everyone</button></div><div class="calendar-mini" style="font-size:1.3rem;gap:.6rem">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<b>${d}</b>`).join("")}${Array.from({length:35},(_,i)=>`<span class="${i===15?"due":i===24||i===31?"event":""}" style="min-height:8rem;text-align:left;padding:.7rem">${i+1<=31?`<strong>${i+1}</strong>${i===15?'<br><span class="pill yellow">Email newsletter</span>':i===24?'<br><span class="pill blue">Content review call</span>':i===31?'<br><span class="pill green">Launch day 🚀</span>':""}`:""}</span>`).join("")}</div></section></div>`;
      return appShell(body);
    }
    function renderActivity() {
      const body = `<div class="sheet">${crumb([{label:"Home",href:"home"},{label:"Activity"}])}<section class="main-pad"><h1>Activity</h1><p class="muted">${stack(seed.project.people,"sm")} 8 people active today</p>${activityItems().map(([icon, actor, title, source, d])=>`<div class="activity-row"><div style="font-size:2rem">${icon}</div><div><strong>${actor}</strong> ${esc(title)}<div class="muted small">${source}</div></div><div class="small muted">${relDate(d)}</div></div>`).join("")}</section></div>`;
      return appShell(body);
    }
    function renderEverything() {
      const cards = [["Messages", seed.messages.length, "messages"], ["To-dos", allTodos().length, "todos"], ["Docs & Files", seed.docs.length, "docs"], ["Cards", allCards().length, "cards"], ["Chat lines", seed.chat.length, "chat"], ["Calendar entries", 3, "schedule"]];
      return appShell(`<div class="sheet">${crumb([{label:"Home",href:"home"},{label:"Everything"}])}<section class="main-pad"><h1>Everything</h1><p class="muted">Account-wide views over recordings in the sample project.</p><div class="dock-grid" style="margin-top:2rem">${cards.map(([name,count,href])=>`<a class="project-card" href="#/${href}"><h2>${name}</h2><p class="muted">${count} recordings</p></a>`).join("")}</div></section></div>`);
    }
    function renderReports() {
      return appShell(`<div class="sheet">${crumb([{label:"Home",href:"home"},{label:"Reports"}])}<section class="main-pad"><h1>Reports</h1><div class="dock-grid" style="margin-top:2rem">${["Assignments","Overdue","Lineup","Hilltop","Gauges","Timesheet"].map((x,i)=>`<article class="dock-card compact"><h2>${x}</h2><p class="muted">${["7 open assignments","0 overdue items","Launch marker in 7 weeks","To-do list progress","Project is on track","12.5 hours logged"][i]}</p></article>`).join("")}</div></section></div>`);
    }

    function renderJump() {
      const q = $("#jumpSearch")?.value || "";
      const recent = [["🏠", "Home", "home"], ["✅", "My Tasks", "todos"], ["📣", "Kickoff: the plan", "message/kickoff"], ["▤", "Homepage copy - draft", "docs"], ["📈", "Reports", "reports"]];
      const projects = [["★", seed.project.name, "project"], ["○", "My Project", "project"]];
      const filter = (rows) => rows.filter(([, label]) => !q || label.toLowerCase().includes(q.toLowerCase()));
      $("#jump").innerHTML = `<div class="jump-tiles">${[["↗","Activity","1","activity"],["◷","Calendar","2","schedule"],["◎","Reports","3","reports"],["▦","Everything","4","everything"]].map(([icon,label,key,href])=>`<button class="jump-tile" data-nav="${href}"><div style="font-size:2rem">${icon}</div>${label}<div class="muted tiny">${key}</div></button>`).join("")}</div><input id="jumpSearch" class="filter" placeholder="Search or jump to a project, person, or Basecamp page" value="${esc(q)}" autofocus><div class="small muted">Recently visited</div>${filter(recent).map(([icon,label,href])=>`<button class="jump-row" data-nav="${href}"><span>${icon}</span><span>${highlight(label,q)}</span><span class="muted tiny">↵</span></button>`).join("")}<div class="small muted" style="margin-top:1rem">Projects <button class="ghost" data-toast="Showing all projects">See all</button></div>${filter(projects).map(([icon,label,href])=>`<button class="jump-row" data-nav="${href}"><span>${icon}</span><span>${highlight(label,q)}</span>${stack(seed.project.people.slice(0,6),"xs")}</button>`).join("")}<label class="small muted" style="display:flex;gap:.6rem;margin-top:1rem"><input type="checkbox" id="includeArchived" ${state.includeArchived ? "checked" : ""}> Include archived projects</label><div class="small muted" style="border-top:var(--border);margin-top:1rem;padding-top:1rem">My Profile · My Activity · Account & Settings · Ctrl+Enter searches all projects</div>`;
      setTimeout(() => $("#jumpSearch")?.focus(), 20);
    }
    function openJump() { $("#jump").classList.add("open"); $("#jumpBackdrop").classList.add("open"); renderJump(); }
    function closeJump() { $("#jump").classList.remove("open"); $("#jumpBackdrop").classList.remove("open"); }

    function renderSidebar() {
      const notifications = [
        ["@","maya","Maya mentioned you in Kickoff: the plan","Help keep launch questions visible in Basecamp.","Message Board", "kickoff"],
        ["💬","lena","New customer quote in Chat","So just a thank you for making awesome tools...","Chat", "chat"],
        ["✅","priya","DNS to-do has a new comment","TTL is down to 300 seconds.","To-dos", "dns"],
        ["📣","sam","Pitch thread has replies","Homepage copy should do one job per section.","Message Board", "copy"]
      ];
      $("#sidebar").innerHTML = `<div class="sidebar-head"><div><h2>Pings</h2><p class="muted small">${state.bubbled.length || 2} items will bubble up later</p></div><button class="icon-btn" data-action="sidebar">×</button></div><div class="sidebar-body"><button class="btn dashed" data-toast="New ping composer opened" style="width:100%;margin:1rem 0">+ Ping</button><div class="rule-title"><h3>Bubbled up</h3></div>${state.bubbled.length ? state.bubbled.map((b)=>`<div class="notification"><span>⏰</span><div><strong>${esc(b.title)}</strong><p class="muted small">${esc(b.when)}</p></div></div>`).join("") : `<p class="muted small">No custom bubble-ups yet.</p>`}<div class="rule-title"><h3 style="color:var(--color-orange-70)">New for you</h3></div><button class="ghost" data-action="mark-read">Mark all read</button>${notifications.map(([icon,author,title,excerpt,source,id])=>`<div class="notification"><div>${avatar(author,"sm")}</div><div><strong>${esc(title)}</strong><p class="muted small">${esc(excerpt)}</p><p class="muted tiny">${source} · ${relDate(-1)}</p><div class="bubble-menu"><button data-bubble="${esc(title)}|Later today">Later today</button><button data-bubble="${esc(title)}|Tomorrow">Tomorrow</button><button data-bubble="${esc(title)}|Next week">Next week</button></div></div>${state.notificationsRead[id] ? "" : '<span class="dot"></span>'}</div>`).join("")}<div class="rule-title"><h3>Previous notifications</h3></div><div class="notification"><span>✓</span><div><strong>Grace completed a QA pass</strong><p class="muted small">All launch pages checked.</p></div></div></div><div class="sidebar-foot"><input class="filter" placeholder="Filter..."><button class="btn outline" data-toast="Shhh mode enabled">🔕 Shhh...</button></div>`;
    }
    function openSidebar() { renderSidebar(); $("#sidebar").classList.add("open"); $("#sidebarBackdrop").classList.add("open"); }
    function closeSidebar() { $("#sidebar").classList.remove("open"); $("#sidebarBackdrop").classList.remove("open"); }

    function openTray(id) {
      const tray = $("#tray");
      const tasks = allTodos().filter(t => !todoDone(t)).slice(0,5);
      const content = {
        tasks: `<h2>My Tasks</h2>${tasks.map(todoRow).join("")}<a class="btn outline" href="#/todos">Open My Assignments</a>`,
        events: `<h2>My Events</h2><div class="list-row"><span>◷</span><div><strong>Content review call</strong><p class="muted small">${relDate(14)}, 10:00-11:00am</p></div></div><div class="list-row"><span>🚀</span><div><strong>Launch day</strong><p class="muted small">${relDate(49)}, all day</p></div></div>`,
        today: `<h2>Do Today</h2><div class="list-row"><span>◆</span><div><strong>Email newsletter</strong><p class="muted small">Due soon</p></div></div><button class="btn dashed" data-toast="Added to Do Today">+ Add something</button>`,
        bookmarks: `<h2>My Bookmarks</h2><a class="list-row" href="#/project"><span>★</span><div><strong>${seed.project.name}</strong><p class="muted small">Project</p></div></a><a class="list-row" href="#/message/kickoff"><span>★</span><div><strong>Kickoff: the plan</strong><p class="muted small">Message</p></div></a>`,
        notes: `<h2>My Notes</h2><textarea class="notes-field" id="notesField" rows="7">${esc(state.notes)}</textarea><button class="btn primary" data-action="save-notes">Save note</button>`
      }[id];
      tray.innerHTML = content;
      tray.classList.add("open");
      state.currentTray = id;
    }
    function closeTray() { $("#tray").classList.remove("open"); state.currentTray = null; }

    function render() {
      const [route, id] = path().split("/");
      const fn = routes[route] || routes.home;
      $("#app").innerHTML = fn(id);
      bindStatic();
      $("#main")?.focus({ preventScroll: true });
    }
    function bindStatic() {
      $$("[data-nav]").forEach((el) => el.addEventListener("click", (e) => { if (el.dataset.stop !== undefined) return; nav(el.dataset.nav); closeJump(); closeTray(); }));
      $$("[data-toast]").forEach((el) => el.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); toast(el.dataset.toast); }));
      $$("[data-action]").forEach((el) => el.addEventListener("click", (e) => {
        const a = el.dataset.action;
        if (a === "jump") openJump();
        if (a === "sidebar") $("#sidebar").classList.contains("open") ? closeSidebar() : openSidebar();
        if (a === "theme") { state.theme = state.theme === "dark" ? "light" : "dark"; document.documentElement.dataset.colorScheme = state.theme; save(); render(); }
        if (a === "bookmark") { state.bookmarks.launch = !state.bookmarks.launch; save(); render(); toast(state.bookmarks.launch ? "Bookmarked" : "Bookmark removed"); }
        if (a === "options") $("#options")?.classList.toggle("open");
        if (a === "save-notes") { state.notes = $("#notesField")?.value || ""; save(); toast("Note saved"); }
        if (a === "mark-read") { state.notificationsRead = { kickoff:true, chat:true, dns:true, copy:true }; save(); renderSidebar(); toast("Notifications marked read"); }
      }));
      $$("[data-tray]").forEach((el) => el.addEventListener("click", () => state.currentTray === el.dataset.tray ? closeTray() : openTray(el.dataset.tray)));
      $$("[data-toggle-todo]").forEach((el) => el.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); const id = el.dataset.toggleTodo; const t = allTodos().find(x=>x.id===id); state.completed[id] = !todoDone(t); save(); render(); toast(state.completed[id] ? "Marked complete" : "Marked incomplete"); }));
      $$("[data-filter]").forEach((el) => el.addEventListener("input", () => { state.query = el.value; save(); render(); }));
    }

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".tray") && !e.target.closest("[data-tray]")) closeTray();
      if (!e.target.closest(".options") && !e.target.closest('[data-action="options"]')) $("#options")?.classList.remove("open");
    });
    $("#jumpBackdrop").addEventListener("click", closeJump);
    $("#sidebarBackdrop").addEventListener("click", closeSidebar);
    $("#jump").addEventListener("input", (e) => {
      if (e.target.id === "jumpSearch") renderJump();
      if (e.target.id === "includeArchived") { state.includeArchived = e.target.checked; save(); }
    });
    $("#jump").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { const first = $("#jump [data-nav]"); if (first) nav(first.dataset.nav); closeJump(); }
      if (e.key === "Escape") closeJump();
    });
    $("#sidebar").addEventListener("click", (e) => {
      const b = e.target.closest("[data-bubble]");
      if (b) { const [title, when] = b.dataset.bubble.split("|"); state.bubbled.push({ title, when }); save(); renderSidebar(); toast(`Bubbled up ${when.toLowerCase()}`); }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Shift") document.body.classList.add("show-hints");
      const modJump = (e.metaKey && ["j","k"].includes(e.key.toLowerCase())) || (e.shiftKey && e.key.toLowerCase() === "j");
      if (modJump) { e.preventDefault(); openJump(); }
      if (e.shiftKey && e.key.toLowerCase() === "s") { e.preventDefault(); openSidebar(); }
      if (e.shiftKey && e.key.toLowerCase() === "h") { e.preventDefault(); nav("home"); }
      if (e.shiftKey && e.key.toLowerCase() === "g") { e.preventDefault(); nav("project"); }
      if (e.shiftKey && e.key.toLowerCase() === "f") { e.preventDefault(); $(".filter")?.focus(); }
      if (e.key === "?") toast("Shortcuts: Shift+J jump, Shift+S sidebar, Shift+H home, Shift+G project, Shift+F filter.");
      if (["1","2","3","4"].includes(e.key) && $("#jump").classList.contains("open")) { nav(["activity","schedule","reports","everything"][Number(e.key)-1]); closeJump(); }
      if (e.key === "Escape") { closeJump(); closeSidebar(); closeTray(); }
    });
    document.addEventListener("keyup", (e) => { if (e.key === "Shift") document.body.classList.remove("show-hints"); });
    window.addEventListener("hashchange", () => { state.query = ""; save(); render(); });
    render();
    setTimeout(() => toast("Content review call starts in 15 minutes"), 900);
  </script>
</body>
</html>
