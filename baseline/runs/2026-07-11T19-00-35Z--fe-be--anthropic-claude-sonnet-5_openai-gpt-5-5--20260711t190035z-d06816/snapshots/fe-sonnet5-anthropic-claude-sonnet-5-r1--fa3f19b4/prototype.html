<!DOCTYPE html>
<html lang="en" data-color-scheme="none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basecamp</title>
<style>
/* =====================================================================
   TOKENS — verbatim from DESIGN.md (light default; dark via two identical
   override blocks; mobile overrides under 768px). 1rem = 10px.
   ===================================================================== */
:root{
  color-scheme: light;
  --hsl-black: 0, 0%, 0%;
  --hsl-white: 0, 0%, 100%;

  /* ---- ink ---- */
  --color-ink-10: hsl(240, 7.7%, 97.5%);
  --color-ink-20: hsl(200, 11.1%, 94.7%);
  --color-ink-30: hsl(180, 3.7%, 89.4%);
  --color-ink-40: hsl(195, 3.6%, 78%);
  --color-ink-50: hsl(202.5, 4.1%, 62%);
  --color-ink-60: hsl(201.4, 6%, 45.5%);
  --color-ink-70: hsl(202.1, 18.8%, 19.8%);

  /* ---- sand ---- */
  --color-sand-10: hsl(33.3, 60%, 97.1%);
  --color-sand-20: hsl(34.3, 46.7%, 94.1%);
  --color-sand-30: hsl(31.4, 36.8%, 88.8%);
  --color-sand-40: hsl(31.6, 31.7%, 76.5%);
  --color-sand-50: hsl(32.9, 29.5%, 58.8%);
  --color-sand-60: hsl(33.8, 29.1%, 43.1%);
  --color-sand-70: hsl(34.1, 29.8%, 33.5%);

  /* ---- slate (ink alias in light) ---- */
  --color-slate-10: var(--color-ink-10);
  --color-slate-20: var(--color-ink-20);
  --color-slate-30: var(--color-ink-30);
  --color-slate-40: var(--color-ink-40);
  --color-slate-50: var(--color-ink-50);
  --color-slate-60: var(--color-ink-60);
  --color-slate-70: var(--color-ink-70);

  /* ---- red ---- */
  --color-red-10: hsl(10.9, 100%, 97.8%);
  --color-red-20: hsl(10.9, 100%, 95.7%);
  --color-red-30: hsl(12, 100%, 91.2%);
  --color-red-40: hsl(12.7, 100%, 80.6%);
  --color-red-50: hsl(13, 97.9%, 62.9%);
  --color-red-60: hsl(7.8, 63.6%, 49.6%);
  --color-red-70: hsl(6.7, 69.1%, 38%);

  /* ---- orange ---- */
  --color-orange-10: hsl(40, 100%, 95.9%);
  --color-orange-20: hsl(38.3, 100%, 90.8%);
  --color-orange-30: hsl(36.5, 100%, 84.5%);
  --color-orange-40: hsl(32.9, 93.5%, 69.8%);
  --color-orange-50: hsl(34.6, 98.4%, 48.4%);
  --color-orange-60: hsl(29.4, 98.9%, 36.9%);
  --color-orange-70: hsl(26.4, 98.7%, 29.4%);

  /* ---- yellow ---- */
  --color-yellow-10: hsl(51.4, 77.8%, 94.7%);
  --color-yellow-20: hsl(48.4, 93.4%, 88%);
  --color-yellow-30: hsl(48.1, 100%, 77.3%);
  --color-yellow-40: hsl(45.7, 92.8%, 67.3%);
  --color-yellow-50: hsl(46, 87.9%, 48.6%);
  --color-yellow-60: hsl(42.2, 96.2%, 31%);
  --color-yellow-70: hsl(39.1, 82.4%, 26.7%);

  /* ---- lime ---- */
  --color-lime-10: hsl(65.5, 73.3%, 94.1%);
  --color-lime-20: hsl(62.7, 71.4%, 87.6%);
  --color-lime-30: hsl(62.3, 66.4%, 76.7%);
  --color-lime-40: hsl(61.7, 52.7%, 60.2%);
  --color-lime-50: hsl(60.4, 62.2%, 42.5%);
  --color-lime-60: hsl(60.5, 100%, 23.9%);
  --color-lime-70: hsl(60.7, 78.2%, 21.6%);

  /* ---- green ---- */
  --color-green-10: hsl(102, 55.6%, 96.5%);
  --color-green-20: hsl(105, 55.6%, 92.9%);
  --color-green-30: hsl(110.5, 54.3%, 86.3%);
  --color-green-40: hsl(123, 44.1%, 73.3%);
  --color-green-50: hsl(135.6, 39.7%, 52.5%);
  --color-green-60: hsl(148.4, 68.8%, 31.4%);
  --color-green-70: hsl(149.3, 68.2%, 25.9%);

  /* ---- aqua ---- */
  --color-aqua-10: hsl(174, 55.6%, 96.5%);
  --color-aqua-20: hsl(177.3, 57.9%, 92.5%);
  --color-aqua-30: hsl(178.8, 62%, 84.5%);
  --color-aqua-40: hsl(183.5, 55.1%, 69.4%);
  --color-aqua-50: hsl(184.7, 87.4%, 40.4%);
  --color-aqua-60: hsl(186.7, 98.6%, 28.4%);
  --color-aqua-70: hsl(188.5, 79.1%, 26.3%);

  /* ---- blue ---- */
  --color-blue-10: hsl(201.4, 100%, 97.3%);
  --color-blue-20: hsl(205, 92.3%, 94.9%);
  --color-blue-30: hsl(205.9, 100%, 90%);
  --color-blue-40: hsl(208.4, 88.6%, 79.4%);
  --color-blue-50: hsl(209.2, 100%, 62.9%);
  --color-blue-60: hsl(211.2, 71.4%, 48%);
  --color-blue-70: hsl(213.3, 67.2%, 39.4%);

  /* ---- violet ---- */
  --color-violet-10: hsl(210, 100%, 97.6%);
  --color-violet-20: hsl(220, 90%, 96.1%);
  --color-violet-30: hsl(222.6, 100%, 92.5%);
  --color-violet-40: hsl(226.5, 92.2%, 84.9%);
  --color-violet-50: hsl(238.4, 100%, 77.6%);
  --color-violet-60: hsl(242.9, 82.7%, 66.1%);
  --color-violet-70: hsl(246.8, 49.4%, 51.2%);

  /* ---- purple ---- */
  --color-purple-10: hsl(255, 100%, 98.4%);
  --color-purple-20: hsl(252, 88.2%, 96.7%);
  --color-purple-30: hsl(253.1, 100%, 93.7%);
  --color-purple-40: hsl(255.2, 88.7%, 86.1%);
  --color-purple-50: hsl(261.7, 100%, 75.1%);
  --color-purple-60: hsl(267.9, 84.2%, 60.4%);
  --color-purple-70: hsl(267.3, 43.7%, 45.3%);

  /* ---- pink ---- */
  --color-pink-10: hsl(308.6, 63.6%, 97.8%);
  --color-pink-20: hsl(315, 72.7%, 95.7%);
  --color-pink-30: hsl(319.4, 81%, 91.8%);
  --color-pink-40: hsl(322.9, 73.9%, 82%);
  --color-pink-50: hsl(323.6, 81.4%, 66.3%);
  --color-pink-60: hsl(326.9, 54.9%, 52.2%);
  --color-pink-70: hsl(328.1, 55.8%, 39%);

  /* ---- surfaces & page tints ---- */
  --color-page-tint-1: hsl(135, 29%, 97%);
  --color-page-tint-2: hsl(277, 100%, 98.5%);
  --color-page-tint-3: hsl(26, 94%, 98%);
  --color-page-tint-4: hsl(214, 100%, 98%);
  --color-page-tint-5: hsl(0, 82%, 97.5%);
  --color-page-tint-6: hsl(0, 0%, 96.5%);
  --color-page-tint: var(--color-page-tint-1);
  --color-body: var(--color-page-tint);
  --color-canvas: hsl(var(--hsl-white));
  --color-canvas-light: var(--color-canvas);
  --color-inverted: white;

  /* ---- semantic aliases ---- */
  --color-ink: var(--color-ink-70);
  --color-slate: var(--color-slate-60);
  --color-sand: var(--color-sand-60);
  --color-red: var(--color-red-60);
  --color-orange: var(--color-orange-60);
  --color-yellow: var(--color-yellow-60);
  --color-green: var(--color-green-60);
  --color-blue: var(--color-blue-60);
  --color-purple: var(--color-purple-60);
  --color-text: var(--color-ink);
  --color-text-subtle: var(--color-ink-60);
  --color-text-placeholder: var(--color-ink-50);
  --color-warning-10: var(--color-red-10);
  --color-warning-20: var(--color-red-20);
  --color-warning-30: var(--color-red-30);
  --color-warning-40: var(--color-red-40);
  --color-warning-50: var(--color-red-50);
  --color-warning-60: var(--color-red-60);
  --color-warning: var(--color-warning-60);
  --focus-ring-color: var(--color-blue);
  --client-visibility-color: var(--color-yellow-40);
  --client-hidden-color: var(--color-blue-30);

  /* ---- uncolor (sand in light) ---- */
  --color-uncolor-10: var(--color-sand-10);
  --color-uncolor-20: var(--color-sand-20);
  --color-uncolor-30: var(--color-sand-30);
  --color-uncolor-40: var(--color-sand-40);
  --color-uncolor-50: var(--color-sand-50);
  --color-uncolor-60: var(--color-sand-60);
  --color-uncolor: var(--color-uncolor-60);

  /* ---- alpha tints ---- */
  --tint-black-2: hsla(var(--hsl-black), 0.02);
  --tint-black-5: hsla(var(--hsl-black), 0.05);
  --tint-black-10: hsla(var(--hsl-black), 0.10);
  --tint-black-15: hsla(var(--hsl-black), 0.15);
  --tint-black-20: hsla(var(--hsl-black), 0.20);
  --tint-black-25: hsla(var(--hsl-black), 0.25);
  --tint-black-50: hsla(var(--hsl-black), 0.50);
  --tint-black-75: hsla(var(--hsl-black), 0.75);
  --tint-ink-2: color-mix(in hsl, transparent, var(--color-ink) 2%);
  --tint-ink-3: color-mix(in hsl, transparent, var(--color-ink) 3%);
  --tint-ink-5: color-mix(in hsl, transparent, var(--color-ink) 5%);
  --tint-ink-10: color-mix(in hsl, transparent, var(--color-ink) 10%);
  --tint-ink-15: color-mix(in hsl, transparent, var(--color-ink) 15%);
  --tint-ink-20: color-mix(in hsl, transparent, var(--color-ink) 20%);
  --tint-ink-25: color-mix(in hsl, transparent, var(--color-ink) 25%);
  --tint-ink-35: color-mix(in hsl, transparent, var(--color-ink) 35%);
  --tint-ink-50: color-mix(in hsl, transparent, var(--color-ink) 50%);
  --tint-ink-75: color-mix(in hsl, transparent, var(--color-ink) 75%);
  --tint-inverted-2: color-mix(in hsl, transparent, var(--color-inverted) 2%);
  --tint-inverted-5: color-mix(in hsl, transparent, var(--color-inverted) 5%);
  --tint-inverted-10: color-mix(in hsl, transparent, var(--color-inverted) 10%);
  --tint-inverted-15: color-mix(in hsl, transparent, var(--color-inverted) 15%);
  --tint-inverted-25: color-mix(in hsl, transparent, var(--color-inverted) 25%);
  --tint-inverted-50: color-mix(in hsl, transparent, var(--color-inverted) 50%);
  --tint-inverted-75: color-mix(in hsl, transparent, var(--color-inverted) 75%);

  /* ---- recording colors ---- */
  --recording-color-aqua: var(--color-aqua-50);
  --recording-color-purple: var(--color-purple-50);
  --recording-color-blue: var(--color-blue-50);
  --recording-color-red: var(--color-red-50);
  --recording-color-green: var(--color-green-50);
  --recording-color-sand: var(--color-sand-50);
  --recording-color-orange: var(--color-orange-50);
  --recording-color-yellow: var(--color-yellow-50);
  --recording-color-pink: var(--color-pink-50);
  --recording-color-gray: var(--color-ink-50);
  --recording-color-primary: var(--color-ink-50);
  --recording-color-canvas: var(--color-canvas);

  /* ---- highlight palette ---- */
  --highlight-1: var(--color-yellow-60); --highlight-bg-1: var(--color-yellow-30);
  --highlight-2: var(--color-orange-60); --highlight-bg-2: var(--color-orange-30);
  --highlight-3: var(--color-red-60);    --highlight-bg-3: var(--color-red-30);
  --highlight-4: var(--color-pink-60);   --highlight-bg-4: var(--color-pink-30);
  --highlight-5: var(--color-purple-60); --highlight-bg-5: var(--color-purple-30);
  --highlight-6: var(--color-blue-60);   --highlight-bg-6: var(--color-blue-30);
  --highlight-7: var(--color-green-60);  --highlight-bg-7: var(--color-green-30);
  --highlight-8: var(--color-sand-60);   --highlight-bg-8: var(--color-sand-30);
  --highlight-9: var(--color-ink-60);    --highlight-bg-9: var(--color-ink-30);

  /* ---- typography ---- */
  --font-base: -apple-system, system-ui, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  --text-root: 10px;
  --10px: 1rem;   --12px: 1.2rem;  --14px: 1.4rem;  --16px: 1.6rem;  --18px: 1.8rem;
  --20px: 2rem;   --24px: 2.4rem;  --28px: 2.8rem;  --32px: 3.2rem;  --36px: 3.6rem;
  --40px: 4rem;   --44px: 4.4rem;  --48px: 4.8rem;  --56px: 5.6rem;  --64px: 6.4rem;
  --72px: 7.2rem; --80px: 8rem;    --88px: 8.8rem;  --96px: 9.6rem;
  --1px: .1rem;   --2px: .2rem;    --4px: .4rem;    --6px: .6rem;    --8px: .8rem;
  --text-10: var(--10px); --text-12: var(--12px); --text-14: var(--14px); --text-16: var(--16px);
  --text-18: var(--18px); --text-20: var(--20px); --text-24: var(--24px); --text-28: var(--28px); --text-32: var(--32px);
  --text-xs: var(--12px); --text-sm: var(--14px); --text-base: var(--16px);
  --text-md: var(--18px); --text-body: var(--20px);
  --line-height-base: 1.5; --line-height-snug: 1.35; --line-height-headings: 1.15;

  /* ---- borders & radii ---- */
  --border: 1px solid var(--color-ink-30);
  --border-uncolor: 1px solid var(--color-uncolor-30);
  --radius-xs: var(--2px); --radius-sm: var(--4px); --radius-md: var(--6px);
  --radius-lg: var(--8px); --radius-xl: var(--12px);

  /* ---- shadows ---- */
  --shadow-base: 0 -1px 1px hsla(var(--hsl-black), 0.025), 0 1px 2px -0.5px hsla(var(--hsl-black), 0.05);
  --shadow-sm: var(--shadow-base), 0 2px 4px -1px hsla(var(--hsl-black), 0.1);
  --shadow-md: var(--shadow-sm), 0 4px 8px -2px hsla(var(--hsl-black), 0.1);
  --shadow-lg: var(--shadow-md), 0 16px 32px -8px hsla(var(--hsl-black), 0.1);
  --shadow-xl: 0 0 3rem hsla(var(--hsl-black), 0.08);
  --shadow-modal: 0 0 0 1px hsla(var(--hsl-black), 0.1), 0 16px 24px -8px hsla(var(--hsl-black), 0.25), 0 24px 32px -16px hsla(var(--hsl-black), 0.25);
  --shadow-card: 0 0 0 1px hsla(var(--hsl-black), 0.05), 0 0.2em 0.2em hsla(var(--hsl-black), 0.05), 0 0.4em 0.4em hsla(var(--hsl-black), 0.05), 0 0.8em 0.8em hsla(var(--hsl-black), 0.05);

  /* ---- motion ---- */
  --duration-fast: 75ms; --duration-medium: 150ms; --duration-slow: 300ms;
  --ease-out-overshoot: cubic-bezier(0.25, 1.25, 0.5, 1);
  --ease-out-overshoot-lg: cubic-bezier(0.25, 1.35, 0.5, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

  /* ---- layout metrics ---- */
  --avatar-size-2xs: var(--16px); --component-xs: var(--24px);
  --avatar-size-xs: var(--24px);  --component-sm: var(--32px);
  --avatar-size-sm: var(--32px);  --component-base: var(--40px);
  --avatar-size: var(--40px);     --component-lg: var(--48px);
                                  --component-xl: var(--64px);
  --toolbar-size: var(--component-base);
  --toolbar-btn-size: var(--component-sm);
  --toolbar-badge-size: var(--24px);
  --tray-button-size: var(--component-sm);
  --tray-block-size: calc(var(--tray-button-size) + 1.6rem);
  --nav-height: calc(var(--toolbar-size) + var(--16px) * 2);
  --sidebar-width: clamp(40rem, 25vw, 56rem);
  --sidebar-space: var(--sidebar-width);

  /* ---- z-index ---- */
  --z-lexxy-toolbar: 2; --z-popup: 50;
  --z-action-sheet: 20; --z-flash: 60;
  --z-banner: 30; --z-footer-trays: 70;
  --z-toolbar: 40; --z-sidebar: 100;
  --z-pings: 101; --z-nav: 200; --z-modal: 300;

  /* ---- feature: to-dos / star / kanban ---- */
  --checkbox-size: var(--20px); --checkbox-gap: var(--8px);
  --star-gradient: linear-gradient(135deg, var(--color-yellow-30), var(--color-yellow-40) 50%, var(--color-orange-40) 54%, var(--color-orange-50));
  --kanban-col-width: 25.5rem;
  --kanban-cards-min-width: 22rem;
  --kanban-slim-col-width: 5.4rem;
  --kanban-gap: 1rem;
}

/* =====================================================================
   DARK MODE — two identical override blocks (DESIGN.md §1):
   1) explicit user choice via [data-color-scheme="dark"]
   2) OS dark, unless the user explicitly forced light
   ===================================================================== */
:root[data-color-scheme="dark"]{
  color-scheme: dark;
  --color-ink-10: hsl(200, 18%, 19.6%);   --color-ink-20: hsl(200, 14.3%, 24.7%);
  --color-ink-30: hsl(198.8, 10.1%, 31%); --color-ink-40: hsl(200, 7.6%, 38.6%);
  --color-ink-50: hsl(198.5, 5.5%, 53.5%);--color-ink-60: hsl(201.8, 6.7%, 68%);
  --color-ink-70: hsl(205.7, 13.2%, 89.6%);

  --color-sand-10: hsl(34.3, 7.1%, 19.4%);  --color-sand-20: hsl(34.3, 5.6%, 24.5%);
  --color-sand-30: hsl(33, 13%, 30.2%);     --color-sand-40: hsl(33.7, 21.9%, 36.7%);
  --color-sand-50: hsl(33.1, 23%, 50.6%);   --color-sand-60: hsl(32.2, 30.7%, 65.5%);
  --color-sand-70: hsl(33.3, 25.7%, 79.4%);

  --color-slate-10: hsl(199.3, 28.6%, 19.2%); --color-slate-20: hsl(200, 24.2%, 24.3%);
  --color-slate-30: hsl(198.5, 16.7%, 30.6%); --color-slate-40: hsl(199, 21.2%, 37.8%);
  --color-slate-50: hsl(200.4, 23.1%, 52.5%); --color-slate-60: hsl(200.4, 31.7%, 67.3%);
  --color-slate-70: hsl(200, 41.2%, 80%);

  --color-red-10: hsl(6.7, 8.6%, 20.6%);   --color-red-20: hsl(9, 15.2%, 25.9%);
  --color-red-30: hsl(7, 25.4%, 33.1%);    --color-red-40: hsl(7.7, 40.6%, 41.6%);
  --color-red-50: hsl(8.9, 66.8%, 56.3%);  --color-red-60: hsl(14.4, 93.6%, 69.4%);
  --color-red-70: hsl(15.2, 91.2%, 82.2%);

  --color-orange-10: hsl(34.3, 14.3%, 19.2%); --color-orange-20: hsl(33.1, 24.4%, 23.3%);

  --color-orange-50: hsl(28.9, 78.4%, 47.3%); --color-orange-60: hsl(30, 82.7%, 59.2%);
  --color-orange-70: hsl(28.9, 93.3%, 76.5%);

  --color-yellow-10: hsl(49.1, 11.6%, 18.6%); --color-yellow-20: hsl(36, 21%, 23.3%);
  --color-yellow-30: hsl(38.8, 36.7%, 27.3%); --color-yellow-40: hsl(47.3, 85.3%, 65.3%);
  --color-yellow-50: hsl(40.7, 60.3%, 50.6%); --color-yellow-60: hsl(43.9, 76.2%, 58.8%);
  --color-yellow-70: hsl(45.4, 73.7%, 67.3%);

  --color-lime-10: hsl(126, 10.2%, 19.2%); --color-lime-20: hsl(110, 9.8%, 23.9%);
  --color-lime-30: hsl(83.1, 18.3%, 27.8%);--color-lime-40: hsl(72, 31.2%, 31.4%);
  --color-lime-50: hsl(60.6, 44.1%, 41.4%);--color-lime-60: hsl(61.8, 40.6%, 51.2%);
  --color-lime-70: hsl(62.4, 54.3%, 63.9%);

  --color-green-10: hsl(172.9, 18.3%, 18.2%); --color-green-20: hsl(166.4, 19%, 22.7%);
  --color-green-30: hsl(160.6, 23.9%, 27.8%); --color-green-40: hsl(152.3, 30.2%, 33.7%);
  --color-green-50: hsl(143.4, 42.6%, 43.7%); --color-green-60: hsl(133.5, 40%, 60.8%);
  --color-green-70: hsl(122.6, 39.7%, 77.3%);

  --color-aqua-10: hsl(193.8, 27.7%, 18.4%); --color-aqua-20: hsl(192.4, 24.4%, 23.3%);
  --color-aqua-30: hsl(190.8, 35.2%, 27.8%); --color-aqua-40: hsl(189.4, 46.1%, 32.7%);
  --color-aqua-50: hsl(187.7, 63.5%, 40.8%); --color-aqua-60: hsl(185.8, 52.3%, 57.3%);

/* mobile overrides */
@media (max-width: 767px){
  :root{
    --text-md: var(--16px);
    --text-body: var(--16px);
    --sidebar-space: 0px;
    --z-sidebar: 201;
    --z-pings: 202;
  }
}

/* =====================================================================
   BASE RESET & TYPOGRAPHY
   ===================================================================== */
*, *::before, *::after{ box-sizing: border-box; }
html{ font-size: var(--text-root); }
body{
  margin: 0;
  font-family: var(--font-base);
  font-size: var(--text-base);
  line-height: var(--line-height-base);
  color: var(--color-text);
  background: var(--color-body);
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4,h5,h6{ margin: 0; line-height: var(--line-height-headings); font-weight: 800; }
p{ margin: 0 0 1.2rem; }
p:last-child{ margin-bottom: 0; }
a{ color: var(--color-blue-70); text-decoration: none; }
a:hover{ text-decoration: underline; }
button, input, textarea, select{ font: inherit; color: inherit; }
button{ cursor: pointer; }
ul, ol{ margin: 0; padding: 0; list-style: none; }
img{ max-width: 100%; display: block; }
:focus-visible{ outline: 2px solid var(--focus-ring-color); outline-offset: 2px; border-radius: var(--radius-xs); }

.skip-link{
  position: absolute; left: -999px; top: 0; z-index: var(--z-modal);
  background: var(--color-blue); color: #fff; padding: 1rem 1.6rem; border-radius: 0 0 var(--radius-md) 0;
}
.skip-link:focus{ left: 0; }

.visually-hidden{
  position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* =====================================================================
   SHELL — account switcher, main sheet, breadcrumb bar, My Bar, sidebar
   ===================================================================== */
#app{ min-height: 100vh; display: flex; flex-direction: column; padding-bottom: var(--tray-block-size); }

.top-switcher-row{
  display: flex; justify-content: center; padding: 1.6rem 1.6rem .8rem;
  position: relative;
}
.home-link{
  position: absolute; left: 1.6rem; top: 1.6rem;
  display: inline-flex; align-items: center; gap: .6rem;
  color: var(--color-text-subtle); font-weight: 700; font-size: var(--text-sm);
  padding: .8rem 1rem; border-radius: var(--radius-md);
}
.home-link:hover{ background: var(--tint-ink-5); text-decoration: none; }
.account-switcher{
  display: inline-flex; align-items: center; gap: .6rem; background: none; border: none;
  font-weight: 800; font-size: var(--text-md); color: var(--color-text); padding: .6rem 1.2rem;
  border-radius: var(--radius-lg);
}
.account-switcher:hover{ background: var(--tint-ink-5); }
.account-switcher .logo{ font-size: 1.8em; line-height: 1; }
.account-switcher .caret{ opacity: .5; font-size: .8em; }

main#main{ flex: 1; width: 100%; max-width: 124rem; margin: 0 auto; padding: 0 1.6rem 6.4rem; }

.sheet{
  background: var(--color-canvas-light);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.sheet-pad{ padding: 3.2rem 4rem 4.8rem; }
@media (max-width: 767px){ .sheet-pad{ padding: 2rem 1.8rem 3.2rem; } }

.crumb-bar{
  display: flex; align-items: center; justify-content: space-between; gap: 1.2rem;
  padding: 1.4rem 2.4rem; border-bottom: var(--border);
  font-size: var(--text-sm); font-weight: 700;
}
.crumb-bar .crumbs{ display: flex; align-items: center; gap: .6rem; color: var(--color-text-subtle); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.crumb-bar .crumbs a{ color: var(--color-text-subtle); }
.crumb-bar .crumbs a:hover{ color: var(--color-text); }
.crumb-bar .crumbs .current{ color: var(--color-text); }
.crumb-bar .crumb-actions{ display: flex; align-items: center; gap: 1.6rem; flex: none; }
.crumb-bar .crumb-actions a, .crumb-bar .crumb-actions button{
  color: var(--color-text-subtle); background: none; border: none; font-weight: 700; font-size: var(--text-sm);
  display: inline-flex; align-items: center; gap: .5rem;
}
.crumb-bar .crumb-actions a:hover, .crumb-bar .crumb-actions button:hover{ color: var(--color-text); text-decoration: none; }

/* My Bar */
.my-bar{
  position: fixed; left: 0; right: 0; bottom: 0; z-index: var(--z-footer-trays);
  display: flex; align-items: center; gap: 1rem; padding: 1.2rem 2rem;
  background: var(--color-canvas-light); border-top: var(--border);
  box-shadow: 0 -4px 12px hsla(var(--hsl-black), .12);
}
.my-bar-avatar{ flex: none; }
.my-bar-tools{ display: flex; align-items: center; gap: .4rem; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
.my-bar-btn{
  display: inline-flex; align-items: center; gap: .6rem; background: none; border: none;
  padding: .8rem 1.2rem; border-radius: var(--radius-md); font-weight: 700; font-size: var(--text-sm);
  color: var(--color-text-subtle);
}
.my-bar-btn:hover{ background: var(--tint-ink-10); color: var(--color-text); }
.my-bar-btn .kbd{ opacity: .55; font-weight: 600; font-size: .85em; }
.new-for-you-pill{
  flex: none; display: inline-flex; align-items: center; gap: .8rem; border: none;
  background: var(--tint-ink-10); color: var(--color-text); font-weight: 700; font-size: var(--text-sm);
  padding: .9rem 1.6rem; border-radius: 999px;
}
.new-for-you-pill:hover{ background: var(--tint-ink-15); }
.unread-dot{ width: 1rem; height: 1rem; border-radius: 50%; background: var(--color-orange-50); display: inline-block; }

/* Avatars */
.avatar{
  width: var(--avatar-size); height: var(--avatar-size); border-radius: 50%; flex: none;
  display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #fff;
  background-size: cover; background-position: center; font-size: 1.5rem; position: relative;
  border: 2px solid var(--color-canvas-light);
}
.avatar-xs{ width: var(--avatar-size-xs); height: var(--avatar-size-xs); font-size: 1.1rem; }
.avatar-sm{ width: var(--avatar-size-sm); height: var(--avatar-size-sm); font-size: 1.3rem; }
.avatar-2xs{ width: var(--avatar-size-2xs); height: var(--avatar-size-2xs); font-size: .9rem; border-width: 1px; }
.avatar-stack{ display: flex; }
.avatar-stack .avatar{ margin-left: -1rem; }
.avatar-stack .avatar:first-child{ margin-left: 0; }

/* Buttons */
.btn{
  display: inline-flex; align-items: center; justify-content: center; gap: .7rem;
  font-weight: 700; font-size: var(--text-sm); border-radius: 999px; border: 1px solid transparent;
  padding: 1rem 1.8rem; white-space: nowrap;
}
.btn:hover{ text-decoration: none; }
.btn-primary{ background: var(--color-blue-50); color: hsl(210,60%,12%); }
.btn-primary:hover{ background: var(--color-blue-60); color: #fff; }
.btn-ghost{ background: transparent; border-color: var(--color-ink-30); color: var(--color-text); }
.btn-ghost:hover{ background: var(--tint-ink-5); }
.btn-danger{ background: transparent; border-color: var(--color-red-40); color: var(--color-red-60); }
.btn-danger:hover{ background: var(--color-red-10); }
.btn-sm{ padding: .6rem 1.2rem; font-size: var(--text-xs); }
.btn[disabled]{ opacity: .5; cursor: default; }

.field-input, .field-select, .filter-input{
  border: var(--border); border-radius: var(--radius-md); background: var(--color-canvas);
  padding: .9rem 1.3rem; font-size: var(--text-sm); color: var(--color-text);
}
.filter-input{ border-radius: 999px; min-width: 18rem; }
.filter-input::placeholder{ color: var(--color-text-placeholder); }

.toolbar-row{ display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; margin: 1.6rem 0 2.4rem; }

/* Toast / flash */
.toast-region{ position: fixed; left: 50%; bottom: calc(var(--tray-block-size) + 1.2rem); transform: translateX(-50%); z-index: var(--z-flash); display: flex; flex-direction: column; gap: .8rem; align-items: center; }
.toast{ background: var(--color-inverted); color: var(--color-text); border: var(--border); box-shadow: var(--shadow-lg); padding: 1.2rem 1.8rem; border-radius: var(--radius-lg); font-size: var(--text-sm); font-weight: 600; }

@media (max-width: 767px){
  .my-bar-tools .kbd{ display: none; }
}

/* =====================================================================
   MODAL / JUMP MENU / SIDEBAR / TRAYS
   ===================================================================== */
.scrim{
  position: fixed; inset: 0; background: var(--tint-black-50); z-index: var(--z-modal);
  display: flex; align-items: flex-start; justify-content: center; padding: 8vh 1.6rem 2rem;
  animation: fade-in var(--duration-medium) var(--ease-out-expo);
}
@keyframes fade-in{ from{ opacity: 0; } to{ opacity: 1; } }
@keyframes pop-in{ from{ opacity: 0; transform: translateY(-.8rem) scale(.98); } to{ opacity: 1; transform: none; } }

.jump-menu{
  width: 100%; max-width: 56rem; background: var(--color-canvas-light); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-modal); padding: 2rem; animation: pop-in var(--duration-medium) var(--ease-out-expo);
}
.jump-tiles{ display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.6rem; }
.jump-tile{
  display: flex; flex-direction: column; align-items: center; gap: .8rem; padding: 1.6rem .8rem;
  border-radius: var(--radius-lg); background: var(--tint-ink-5); border: none; font-weight: 700; font-size: var(--text-sm);
}
.jump-tile:hover{ background: var(--tint-ink-10); }
.jump-tile .tile-icon{ font-size: 2rem; }
.jump-tile .kbd{ position: absolute; }
.jump-search{
  width: 100%; border: 1px solid var(--color-blue-50); border-radius: var(--radius-md);
  background: var(--color-canvas); padding: 1.2rem 1.6rem; font-size: var(--text-md); margin-bottom: 1.6rem;
}
.jump-section-title{ font-size: var(--text-xs); font-weight: 800; color: var(--color-text-subtle); text-transform: uppercase; letter-spacing: .04em; margin: 1.6rem 0 .6rem; display:flex; justify-content: space-between; }
.jump-row{
  display: flex; align-items: center; gap: 1.2rem; padding: 1rem 1.2rem; border-radius: var(--radius-md);
  font-weight: 600;
}
.jump-row:hover{ background: var(--tint-ink-10); }
.jump-row .row-icon{ width: 2.8rem; height: 2.8rem; border-radius: 50%; background: var(--color-blue-50); color: #fff; display: inline-flex; align-items: center; justify-content: center; flex: none; }
.jump-footer{ display: flex; justify-content: space-between; align-items: center; padding-top: 1.2rem; margin-top: .8rem; border-top: var(--border); font-size: var(--text-xs); color: var(--color-text-subtle); }
.jump-footer a{ color: var(--color-text-subtle); }
.jump-toggle{ display: flex; align-items: center; gap: .6rem; font-size: var(--text-xs); color: var(--color-text-subtle); }

.sidebar-panel{
  position: fixed; top: 0; right: 0; bottom: 0; width: var(--sidebar-width); max-width: 100vw;
  background: var(--color-canvas-light); box-shadow: var(--shadow-modal); z-index: var(--z-sidebar);
  display: flex; flex-direction: column; animation: slide-in var(--duration-medium) var(--ease-out-expo);
}
@keyframes slide-in{ from{ transform: translateX(100%); } to{ transform: translateX(0); } }
.sidebar-head{ display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 2rem; border-bottom: var(--border); }
.sidebar-scroll{ flex: 1; overflow-y: auto; padding: 0 2rem; }
.sidebar-section{ padding: 1.6rem 0; border-bottom: var(--border); }
.sidebar-section h3{ font-size: var(--text-sm); font-weight: 800; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.sidebar-section h3 .mark-all{ font-weight: 700; font-size: var(--text-xs); color: var(--color-blue-70); }
.ping-add{
  display: flex; align-items: center; gap: 1rem; padding: .8rem; border: 2px dashed var(--color-ink-30);
  border-radius: var(--radius-lg); color: var(--color-text-subtle); font-weight: 700; margin-bottom: 1rem;
}
.notif-row{ display: flex; gap: 1.2rem; padding: 1.2rem 0; border-bottom: 1px solid var(--tint-ink-10); position: relative; }
.notif-row:last-child{ border-bottom: none; }
.notif-row .row-icon{ flex: none; }
.notif-row .row-body{ flex: 1; min-width: 0; }
.notif-row .row-title{ font-weight: 700; font-size: var(--text-sm); }
.notif-row .row-excerpt{ font-size: var(--text-sm); color: var(--color-text-subtle); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.notif-row .row-meta{ font-size: var(--text-xs); color: var(--color-text-placeholder); margin-top: .3rem; }

.tray-popover{

.account-menu{ position: fixed; left: 2rem; bottom: calc(var(--tray-block-size) + .8rem); width: 26rem; background: var(--color-canvas-light); border-radius: var(--radius-lg); box-shadow: var(--shadow-modal); z-index: var(--z-popup); padding: .8rem; animation: pop-in var(--duration-medium) var(--ease-out-expo); }
.account-menu a, .account-menu button{ display: flex; width: 100%; text-align: left; align-items: center; gap: 1rem; padding: 1rem 1.2rem; border-radius: var(--radius-md); background: none; border: none; font-weight: 600; font-size: var(--text-sm); color: var(--color-text); }

/* Options popover (…) */
.options-pop{
  position: absolute; right: 0; top: calc(100% + .6rem); width: 30rem; background: var(--color-blue-60);

}

.options-pop button:hover, .options-pop a:hover{ background: hsla(0,0%,100%,.15); text-decoration: none; }
.options-pop .op-sub{ background: hsla(0,0%,100%,.08); border-radius: var(--radius-md); padding: .4rem; margin: .2rem 0; }
.options-pop .op-sub button{ justify-content: space-between; }

/* keyboard hint badges */
.kbd{ display: inline-flex; align-items: center; justify-content: center; min-width: 1.8rem; padding: .1rem .5rem; border-radius: var(--radius-xs); background: var(--tint-ink-15); font-size: 1.1rem; font-weight: 700; font-family: var(--font-mono); }

}

.activity-item{ display: flex; gap: 1.2rem; margin-bottom: 1.6rem; }

/* =====================================================================

   ===================================================================== */

.project-header h1{ font-size: var(--text-32); display: flex; align-items: center; gap: 1rem; }

.sample-ribbon{

.category-chip{ font-weight: 700; }

.client-ribbon{
  position: absolute; top: 0; right: -2rem; writing-mode: vertical-rl;
  background: var(--client-hidden-color); color: hsl(213,60%,20%); font-weight: 700; font-size: var(--text-xs);
  padding: 1.2rem .7rem; border-radius: var(--radius-sm); max-height: 20rem;
}

.boost-bar{ margin: 2rem 0; }

   ===================================================================== */

<script>
"use strict";
/* =====================================================================
   UTILITIES
   ===================================================================== */
let __uidCounter = 1;
function uid(prefix){ return (prefix || "id") + "_" + (__uidCounter++); }

function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// Minimal allowlist sanitizer for rich text stored/rendered as HTML.
const RT_ALLOWED_TAGS = new Set(["B","STRONG","I","EM","S","STRIKE","U","BR","P","DIV","SPAN","UL","OL","LI","BLOCKQUOTE","CODE","PRE","H1","H2","H3","A","IMG","HR","TABLE","TBODY","TR","TD","TH"]);
const RT_ALLOWED_ATTR = { A: ["href"], IMG: ["src","alt"], SPAN: ["style"] };
function sanitizeRichText(html){
  const tpl = document.createElement("template");
  tpl.innerHTML = html || "";
  (function walk(node){
    [...node.childNodes].forEach(child => {
      if (child.nodeType === 1){
        if (!RT_ALLOWED_TAGS.has(child.tagName)){
          const text = document.createTextNode(child.textContent);
          child.replaceWith(text);
          return;
        }
        [...child.attributes].forEach(attr => {
          const allowed = RT_ALLOWED_ATTR[child.tagName] || [];
          if (!allowed.includes(attr.name)) child.removeAttribute(attr.name);
          if (attr.name === "href" && /^\s*javascript:/i.test(attr.value)) child.removeAttribute("href");
        });
        walk(child);
      }
    });
  })(tpl.content);
  return tpl.innerHTML;
}
function plainTextOf(html){
  const tpl = document.createElement("template");
  tpl.innerHTML = html || "";
  return (tpl.content.textContent || "").replace(/\s+/g, " ").trim();
}

// ---- deterministic clock: T = today at 09:00 local ----
function seedAnchor(){
  const d = new Date();
  d.setHours(9,0,0,0);
  return d;
}
function addDays(date, n){ const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function addHours(date, n){ const d = new Date(date); d.setHours(d.getHours()+n); return d; }
function addWeeks(date, n){ return addDays(date, n*7); }
function startOfWeek(date){ const d = new Date(date); const day = d.getDay(); return addDays(d, -day); }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isToday(d){ return isSameDay(d, new Date()); }

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DOW_LONG = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function fmtDate(d){ return `${MONTH_SHORT[d.getMonth()]} ${d.getDate()}`; }
function fmtDateLong(d){ return `${DOW_LONG[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`; }
function fmtDateWithYearIfNeeded(d){
  const now = new Date();
  return d.getFullYear() === now.getFullYear() ? fmtDate(d) : `${fmtDate(d)}, ${d.getFullYear()}`;
}
function fmtTime(d){
  let h = d.getHours(); const m = d.getMinutes(); const ap = h >= 12 ? "pm" : "am";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2,"0")}${ap}`;
}
function fmtDayMonth(d){ return `${d.getDate()} ${MONTH_SHORT[d.getMonth()]}`; }
function fmtRelativeShort(d){
  const now = new Date();
  const diffMs = d - now;
  const diffMin = Math.round(diffMs/60000);
  if (Math.abs(diffMin) < 1) return "just now";
  if (Math.abs(diffMin) < 60) return diffMin > 0 ? `in ${diffMin}m` : `${-diffMin}m ago`;
  if (isSameDay(d, now)) return fmtTime(d);
  return fmtDate(d);
}
function firstNameLastInitial(name){
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  return `${parts[0]} ${parts[parts.length-1][0]}.`;
}
function initialsOf(name){
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}

const AVATAR_COLORS = ["#c0554d","#4b7ea8","#7a5ba3","#3f8f6d","#c07e2e","#a34d7e","#3f7fa8","#8a8f3f"];
function avatarColorFor(id){
  let h = 0; for (const ch of String(id)) h = (h*31 + ch.charCodeAt(0)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

/* =====================================================================
   DATA MODEL + DETERMINISTIC SEED
   "Launch the new website" — INIT.md §3
   ===================================================================== */
const DB = { account: null, people: [], projects: [], recordings: new Map(), events: [], viewerId: null,
             readings: new Map(), bookmarks: [], subscriptions: new Map(), doTodayIds: new Set(),
             myNotes: "", pings: [], preferences: { shhh: false } };

function rec(type, fields){
  const r = Object.assign({
    id: uid("r"), type, status: "active", visible_to_clients: true,
    created_at: new Date(), updated_at: new Date(), comments: [], boosts: [], position: 0,
  }, fields);
  DB.recordings.set(r.id, r);
  return r;
}
function addEvent(action, creatorId, recordingId, detail){
  DB.events.push({ id: uid("ev"), action, creator_id: creatorId, recording_id: recordingId, detail: detail || "", at: new Date() });
}
function addComment(parentRec, authorId, bodyHtml, at){
  const c = rec("Comment", { parent_id: parentRec.id, bucket_id: parentRec.bucket_id, creator_id: authorId, content: bodyHtml, created_at: at || new Date() });
  parentRec.comments.push(c.id);
  addEvent("commented", authorId, parentRec.id, "");
  return c;
}
function addBoost(parentRec, boosterId, content, at){
  parentRec.boosts.push({ id: uid("bo"), booster_id: boosterId, content, created_at: at || new Date() });
}

function buildSeed(){
  __uidCounter = 1;
  DB.recordings = new Map(); DB.events = []; DB.projects = []; DB.people = [];

  const T = seedAnchor();
  DB.account = { name: "Flywheel Studio", logo: "🧭" };

  // ---- People ----
  function person(name, role, sample, extra){
    const p = Object.assign({
      id: uid("p"), name, title: role, email: name.toLowerCase().replace(/\s+/g,".")+"@flywheel.example",
      sample: !!sample, admin: false, owner: false, client: false, employee: true, avatarEmoji: null,
    }, extra || {});
    DB.people.push(p);
    return p;
  }
  const viewer = person("Jordan Avery", "Product & Ops", false, { owner: true, admin: true });
  DB.viewerId = viewer.id;
  const maya  = person("Maya Chen", "Project lead", true);
  const sam   = person("Sam Whitaker", "Writer", true);
  const omar  = person("Omar Haddad", "Designer", true);
  const priya = person("Priya Nair", "Developer", true);
  const lena  = person("Lena Kowalski", "Marketing", true);
  const diego = person("Diego Ramos", "Community", true);
  const grace = person("Grace Okafor", "QA", true);
  const felix = person("Felix Berg", "Ops", true);

const LS_KEY = "bc5_prototype_v1";
function serializeDB(){
  return JSON.stringify({
    uidCounter: __uidCounter,
    recordings: [...DB.recordings.entries()],
    events: DB.events,
    readings: [...DB.readings.entries()],
    bookmarks: DB.bookmarks,
    doTodayIds: [...DB.doTodayIds],
    myNotes: DB.myNotes,
    pings: DB.pings,
    preferences: DB.preferences,
    projects: DB.projects,
    theme: document.documentElement.getAttribute("data-color-scheme"),
  }, (k,v) => v instanceof Date ? { __date: v.toISOString() } : v);
}
function reviveDates(obj){
  if (obj && typeof obj === "object"){
    if (obj.__date) return new Date(obj.__date);
    if (Array.isArray(obj)) return obj.map(reviveDates);
    const out = {};
    for (const k in obj) out[k] = reviveDates(obj[k]);
    return out;
  }
  return obj;
}
function saveDB(){
  try{ localStorage.setItem(LS_KEY, serializeDB()); } catch(e){ /* storage unavailable — in-memory only */ }
}
function loadDB(){
  let raw;
  try{ raw = localStorage.getItem(LS_KEY); } catch(e){ return false; }
  if (!raw) return false;
  try{
    const parsed = reviveDates(JSON.parse(raw));
    __uidCounter = parsed.uidCounter || __uidCounter;
    DB.recordings = new Map(parsed.recordings || []);
    DB.events = parsed.events || [];
    DB.readings = new Map(parsed.readings || []);
    DB.bookmarks = parsed.bookmarks || [];
    DB.doTodayIds = new Set(parsed.doTodayIds || []);
    DB.myNotes = parsed.myNotes || "";
    DB.pings = parsed.pings || [];
    DB.preferences = parsed.preferences || { shhh: false };
    if (parsed.projects && parsed.projects.length) DB.projects = parsed.projects;
    if (parsed.theme) document.documentElement.setAttribute("data-color-scheme", parsed.theme);
    return true;
  } catch(e){ return false; }
}
function resetSeed(){
  try{ localStorage.removeItem(LS_KEY); } catch(e){}
  buildSeed();
  saveDB();
  location.hash = "#/home";
  boot(true);
}

function parseHash(){
  const h = (location.hash || "#/home").replace(/^#/, "");
  const parts = h.split("/").filter(Boolean);
  if (parts[0] === "home" || parts.length === 0) return { name: "home" };
  if (parts[0] === "projects" && parts[1]){
    const pid = parts[1];
    if (parts[2] === "tools" && parts[3]) return { name: "tool", pid, toolId: parts[3] };
    if (parts[2] === "messages" && parts[3]) return parts[3]==="new" ? { name: "message-new", pid } : { name: "message", pid, id: parts[3] };
    if (parts[2] === "todos" && parts[3]) return { name: "todo", pid, id: parts[3] };
    if (parts[2] === "cards" && parts[3]) return { name: "card", pid, id: parts[3] };
    if (parts[2] === "docs" && parts[3]) return parts[3]==="new" ? { name: "doc-new", pid } : { name: "doc", pid, id: parts[3] };
    if (parts[2] === "settings") return { name: "project-settings", pid };
    return { name: "dock", pid };
  }
  if (parts[0] === "activity") return { name: "activity" };
  if (parts[0] === "calendar") return { name: "global-calendar" };
  if (parts[0] === "reports") return { name: "reports" };
  if (parts[0] === "everything") return { name: "everything" };
  if (parts[0] === "search") return { name: "search" };
  if (parts[0] === "adminland") return { name: "adminland" };
  if (parts[0] === "pings") return { name: "pings", id: parts[1] || null };
  if (parts[0] === "assignments") return { name: "assignments" };
  if (parts[0] === "drafts") return { name: "drafts" };
  if (parts[0] === "boosts") return { name: "my-boosts" };
  return { name: "home" };
}

function avatarHtml(personId, opts){
  opts = opts || {};
  const size = opts.size ? ` avatar-${opts.size}` : "";
  const p = personById(personId);
  if (!p) return `<span class="avatar${size}" style="background:${AVATAR_COLORS[0]}">?</span>`;
  const bg = avatarColorFor(p.id);
  const title = escapeHtml(p.name + (p.title ? " · " + p.title : ""));
  return `<span class="avatar${size}" style="background:${bg}" title="${title}" aria-hidden="true">${escapeHtml(initialsOf(p.name))}</span>`;
}
function avatarStackHtml(personIds, opts){
  opts = opts || {};
  const max = opts.max || 6;
  const ids = personIds.slice(0, max);
  const rest = personIds.length - ids.length;
  return `<span class="avatar-stack">${ids.map(id => avatarHtml(id, opts)).join("")}${rest > 0 ? `<span class="avatar avatar-${opts.size||''}" style="background:var(--tint-ink-25);color:var(--color-text)">+${rest}</span>` : ""}</span>`;
}

function breadcrumbHtml(project, tool, itemLabel){
  const parts = [`<a href="#/home">Home</a>`];
  if (project) parts.push(`<span>&rsaquo;</span><a href="#/projects/${project.id}">${escapeHtml(project.name)}</a>`);
  if (tool) parts.push(`<span>&rsaquo;</span><a href="#/projects/${project.id}/tools/${tool.id}">${escapeHtml(toolDisplayTitle(tool))}</a>`);
  if (itemLabel) parts.push(`<span>&rsaquo;</span><span class="current">${escapeHtml(itemLabel)}</span>`);
  return parts.join(" ");
}
function toolDisplayTitle(tool){ return tool.title; }

function liveFilterAttach(root){
  root.querySelectorAll("[data-live-filter]").forEach(input => {
    if (input.__wired) return;
    input.__wired = true;
    const selector = input.getAttribute("data-live-filter");
    input.addEventListener("input", () => {
      const q = input.value.trim().toLowerCase();
      root.querySelectorAll(selector).forEach(row => {
        const text = (row.getAttribute("data-filter-text") || row.textContent).toLowerCase();
        row.style.display = !q || text.includes(q) ? "" : "none";
      });
    });
  });
}

function toast(msg){
  const region = document.getElementById("toastRegion");
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  region.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function trayHtml(){
  const kind = UI.tray;
  if (!kind) return "";
  const def = TRAY_DEFS[kind];
  let body = "";
  if (kind === "tasks"){
    const items = myAssignedTodosAndCards();
    body = items.length ? items.map(t => `<div class="tray-item">${todoOrCardIcon(t)}<div><div class="ti-title"><a href="${hrefForRecording(t)}" data-action="navigate" data-href="${hrefForRecording(t)}">${escapeHtml(t.title)}</a></div><div class="ti-meta">${t.due_on ? "Due " + fmtDate(new Date(t.due_on)) : "No due date"}</div></div></div>`).join("")

      : `<div class="sidebar-empty">No events in the next 7 days.</div>`;

    body = items.length ? items.map(t => `<div class="tray-item">${todoOrCardIcon(t)}<div class="ti-title">${escapeHtml(t.title)}</div><button data-action="remove-do-today" data-id="${t.id}" style="margin-left:auto;background:none;border:none;color:var(--color-text-subtle)">&times;</button></div>`).join("")

  } else if (kind === "bookmarks"){

    body = items.length ? items.map(t => `<div class="tray-item"><span style="font-size:1.6rem">★</span><div><div class="ti-title"><a href="${hrefForRecording(t)}" data-action="navigate" data-href="${hrefForRecording(t)}">${escapeHtml(t.title)}</a></div><div class="ti-meta">${escapeHtml(t.type)}</div></div></div>`).join("")

  } else if (kind === "notes"){
    body = `<div class="cc-box">${richTextEditorHtml("my-notes", "Jot something down for yourself…", DB.myNotes)}</div>
      <div class="rt-actions"><span></span><button class="btn btn-primary btn-sm" data-action="save-my-notes" data-editor="my-notes">Save</button></div>`;
  }
  return `<div class="tray-popover center" data-stop-close="1"><h2>${def.title}</h2>${body}</div>`;
}

function hrefForRecording(r){
  if (r.type === "Todo") return `#/projects/${r.bucket_id}/todos/${r.id}`;

function render(){
  const route = parseHash();
  const app = document.getElementById("app");
  app.innerHTML = shellTopHtml(route) + `<main id="main" tabindex="-1">${renderRoute(route)}</main>` + myBarHtml();
  document.getElementById("overlays").innerHTML = overlaysHtml();
  liveFilterAttach(app);
  const jumpInput = document.getElementById("jumpSearchInput");
  if (jumpInput){ jumpInput.focus(); jumpInput.setSelectionRange(jumpInput.value.length, jumpInput.value.length); }
  const sbFilter = document.getElementById("sidebarFilterInput");
  if (sbFilter && document.activeElement !== sbFilter){ /* keep as-is */ }
  window.scrollTo(0,0);
}

function renderRoute(route){
  try{
    switch(route.name){
      case "home": return renderHome();
      case "dock": return renderProjectDock(route);
      case "tool": return renderToolPage(route);
      case "message": return renderMessagePage(route);
      case "message-new": return renderMessageComposer(route);
      case "doc-new": return renderDocComposer(route);
      case "todo": return renderTodoPage(route);
      case "card": return renderCardPage(route);
      case "doc": return renderDocPage(route);
      case "project-settings": return renderProjectSettings(route);
      case "activity": return renderActivity();
      case "global-calendar": return renderGlobalCalendar();
      case "reports": return renderReports();
      case "everything": return renderEverything();
      case "search": return renderSearch();
      case "adminland": return renderAdminland();
      case "pings": return renderPings(route);
      case "assignments": return renderAssignments();
      case "drafts": return renderDrafts();
      case "my-boosts": return renderMyBoosts();
      default: return renderHome();
    }
  } catch(err){
    console.error(err);
    return `<div class="sheet sheet-pad"><h1>Something went sideways</h1><p style="color:var(--color-text-subtle)">This surface hit an error while rendering. <a href="#/home" data-action="navigate" data-href="#/home">Back to Home</a></p></div>`;
  }
}

function dockCardPreview(project, tool){
  if (tool.type === "Message::Board"){
    const msgs = [...DB.recordings.values()].filter(r => r.type==="Message" && r.parent_id===tool.id && r.status==="active")
      .sort((a,b) => (b.pinned-a.pinned) || (new Date(b.created_at)-new Date(a.created_at)));
    if (!msgs.length) return dockEmpty("📋", "No messages just yet", "Post the first update for your team.");
    return msgs.slice(0,4).map(m => `<div class="dock-preview-row">${avatarHtml(m.creator_id,{size:"xs"})}<span class="dp-title">${escapeHtml(m.title)}</span><span class="dp-meta">${fmtDate(new Date(m.created_at))}</span></div>`).join("");
  }
  if (tool.type === "Todoset"){
    const lists = [...DB.recordings.values()].filter(r => r.type==="Todolist" && r.parent_id===tool.id && r.status==="active");
    if (!lists.length) return dockEmpty("☑️", "No to-do lists yet", "Break the work into a checklist.");
    return lists.slice(0,2).map(l => {
      const todos = l.todos.map(id=>DB.recordings.get(id));
      const openOnes = todos.filter(t=>!t.completed).slice(0,3);
      return `<div class="dock-preview-row" style="border-bottom:none;font-weight:800">${dot(l.color)}<span class="dp-title">${escapeHtml(l.title)}</span></div>` +
        openOnes.map(t => `<div class="dock-preview-row" style="padding-left:2.4rem"><span class="dp-title" style="font-weight:400">☐ ${escapeHtml(t.title)}</span></div>`).join("");
    }).join("");
  }
  if (tool.type === "Kanban::Board"){
    const cols = (project.cardColumnIds||[]).map(id=>DB.recordings.get(id)).filter(c=>c.kind==="user"||c.kind==="triage");
    if (!cols.length) return dockEmpty("🗂", "No cards yet", "Add a card to start tracking work.");
    return `<div class="kanban-mini-strip">${cols.slice(0,5).map(c => `<div class="kanban-mini-col" style="background:${c.color||'var(--tint-ink-25)'}">${escapeHtml(c.title)} (${c.cards.length})</div>`).join("")}</div>`;
  }
  if (tool.type === "Vault"){
    const items = (project.docsItemIds||[]).map(id=>DB.recordings.get(id));
    if (!items.length) return dockEmpty("🗄", "No files just yet", "Upload a doc, image, or link.");
    return items.slice(0,4).map(it => `<div class="dock-preview-row">${fileIcon(it)}<span class="dp-title">${escapeHtml(it.title)}</span><span class="dp-meta">${fmtDate(new Date(it.created_at))}</span></div>`).join("");
  }
  if (tool.type === "Chat::Transcript"){
    const lines = [...DB.recordings.values()].filter(r => r.type==="Campfire::Line" && r.parent_id===tool.id).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    if (!lines.length) return dockEmpty("💬", "No chat yet", "Say hello to get things started.");
    return lines.slice(-4).map(l => `<div class="mini-chat-line"><b>${escapeHtml(personById(l.creator_id)?.name.split(" ")[0]||"")}:</b> ${escapeHtml(plainTextOf(l.content)).slice(0,50)}</div>`).join("");
  }
  if (tool.type === "Schedule"){
    const entries = (project.scheduleEntryIds||[]).map(id=>DB.recordings.get(id));
    if (!entries.length) return dockEmpty("📅", "Nothing scheduled", "Add your first event.");
    return entries.slice(0,4).map(e => `<div class="dock-preview-row"><span class="dp-title">${escapeHtml(e.title)}</span><span class="dp-meta">${fmtDate(new Date(e.starts_at))}</span></div>`).join("");
  }
  return dockEmpty("✨", "Nothing here yet", "");
}
function dot(color){ return `<span style="display:inline-block;width:1.2rem;height:1.2rem;border-radius:50%;background:${color||'var(--color-ink-40)'}"></span>`; }
function fileIcon(item){
  if (item.type === "Upload" && item.thumb) return `<span class="fr-icon"><img src="${item.thumb}" alt="" style="width:100%;height:100%;object-fit:cover"></span>`;
  const map = { Document: "📄", Upload: "🖼", CloudFile: "🔗" };
  return `<span class="fr-icon" style="background:var(--tint-ink-10)">${map[item.type]||"📄"}</span>`;
}

  return `<div class="dock-empty"><div class="de-emoji">${emoji}</div><div><b>${title}</b></div>${sub?`<div>${sub}</div>`:""}</div>`;

function renderCardTable(project, tool){
  const cols = (project.cardColumnIds||[]).map(id=>DB.recordings.get(id));
  const triage = cols.find(c=>c.kind==="triage");
  const userCols = cols.filter(c=>c.kind==="user");

  const done = cols.find(c=>c.kind==="done");
  function cardsOf(col, onHold){
    return col.cards.map(id=>DB.recordings.get(id)).filter(c=>!!c.onHold===!!onHold);

/* =====================================================================

   ===================================================================== */
UI.calMonthOffset = 0;
function monthGridHtml(monthOffset, dayContentFn){
  const base = new Date(); base.setDate(1); base.setHours(0,0,0,0);
  base.setMonth(base.getMonth() + monthOffset);
  const year = base.getFullYear(), month = base.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = firstDow-1; i >= 0; i--) cells.push({ d: daysInPrevMonth-i, other: true, date: new Date(year, month-1, daysInPrevMonth-i) });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ d: i, other: false, date: new Date(year, month, i) });
  while (cells.length % 7 !== 0 || cells.length < 42) cells.push({ d: cells.length - firstDow - daysInMonth + 1, other: true, date: new Date(year, month+1, cells.length - firstDow - daysInMonth + 1) });
  return `<div class="cal-nav">
      <button data-action="cal-nav" data-dir="-1">&#8249;</button>
      <span class="cal-title">${MONTH_NAMES[month]} ${year}</span>
      <button data-action="cal-nav" data-dir="1">&#8250;</button>
      ${monthOffset !== 0 ? `<button class="btn btn-ghost btn-sm" data-action="cal-nav" data-dir="reset">Today</button>` : ""}
    </div>
    <div class="cal-grid">
      ${DOW_SHORT.map(d=>`<div class="cal-dow">${d}</div>`).join("")}
      ${cells.map(c => `<div class="cal-cell ${c.other?'other-month':''} ${isToday(c.date)?'today':''}">
        <span class="cal-daynum">${c.d}</span>
        ${dayContentFn(c.date)}
      </div>`).join("")}
    </div>`;
}

function searchIndex(){
  const out = [];
  DB.recordings.forEach(r => {
    if (r.status !== "active" || r.type === "Comment") return;
    if (!("title" in r)) return;
    out.push(r);
  });
  return out;
}
function renderSearch(){
  const q = (UI.searchQuery||"").trim().toLowerCase();
  const results = q ? searchIndex().filter(r => r.title.toLowerCase().includes(q) || plainTextOf(r.content||"").toLowerCase().includes(q)) : [];
  return `${crumbBar(null,null,"Search")}<div class="sheet-pad">
    <div class="tool-page">
      <h1>Search</h1>
      <input class="search-input-lg" id="searchQueryInput" placeholder="Search messages, to-dos, docs, cards…" value="${escapeHtml(UI.searchQuery||"")}">
      <div class="search-facets">
        <button class="facet-pill active">Best match</button>
        <button class="facet-pill">Most recent</button>
      </div>
      ${q ? (results.length ? results.map(r => `<div class="msg-row"><span style="font-size:2rem">${{Message:"📋",Todo:"☑️","Kanban::Card":"🗂",Document:"📄"}[r.type]||"📄"}</span><div class="mr-body"><h3><a href="${hrefForRecording(r)}" data-action="navigate" data-href="${hrefForRecording(r)}">${escapeHtml(r.title)}</a></h3><div class="mr-meta">${escapeHtml(r.type)} in ${escapeHtml(projectById(r.bucket_id)?.name||"")}</div></div></div>`).join("")
        : `<p style="color:var(--color-text-subtle)">No results for "${escapeHtml(UI.searchQuery)}".</p>`)

}

/* =====================================================================
   ACTION DISPATCH
   ===================================================================== */
function editorHtml(editorId){
  const el = document.getElementById("editor-" + editorId);
  return el ? sanitizeRichText(el.innerHTML.trim()) : "";
}
function toggleStatus(id, target){
  const r = DB.recordings.get(id);
  if (!r) return;
  r.status = (r.status === target) ? "active" : target;
}
function bubbledCount(){
  return DB.events.filter(e=>e.resurface_at).length + [...DB.recordings.values()].filter(r=>r.resurface_at).length;
}
function doBubbleUp(id){
  const ev = DB.events.find(e => e.id === id);
  if (ev){ ev.resurface_at = addHours(new Date(), 5); DB.readings.set(ev.id, true); }
  else { const r = DB.recordings.get(id); if (r) r.resurface_at = addHours(new Date(), 5); }
  toast("Bubbled up — it'll resurface later today.");
}
function markRecordingEventsRead(recordingId){
  DB.events.forEach(e => { if (e.recording_id === recordingId) DB.readings.set(e.id, true); });
}
function closeAllMenus(){
  UI.optionsMenuFor = null; UI.boostPickerFor = null; UI.boostGridFor = null; UI.accountMenuOpen = false; UI.newFileMenuOpen = false;
}

function dispatch(action, el){
  const id = el.getAttribute("data-id");
  const pid = el.getAttribute("data-pid");
  let needsSave = true;

  switch(action){
    case "noop": toast("This is a stub in the prototype."); needsSave = false; break;
    case "navigate": closeAllMenus(); UI.jumpMenuOpen = false; UI.sidebarOpen = false; UI.tray = null; navigate(el.getAttribute("data-href")); needsSave = false; break;

    case "toggle-account-menu": UI.accountMenuOpen = !UI.accountMenuOpen; needsSave = false; break;
    case "close-account-menu": UI.accountMenuOpen = false; needsSave = false; break;
    case "toggle-theme": {
      const cur = document.documentElement.getAttribute("data-color-scheme");
      const next = cur === "dark" ? "light" : cur === "light" ? "none" : "dark";
      document.documentElement.setAttribute("data-color-scheme", next);
      UI.accountMenuOpen = false;
      toast("Theme: " + (next==="none"?"follow system":next));
      break;
    }
    case "reset-seed": if (confirm("Reset all sample data back to its original state? This clears your changes.")) resetSeed(); needsSave = false; break;
    case "logout": toast("Logging out is stubbed in this prototype."); needsSave = false; break;

    case "open-tray": UI.tray = (UI.tray === el.getAttribute("data-tray")) ? null : el.getAttribute("data-tray"); UI.jumpMenuOpen=false; UI.sidebarOpen=false; needsSave = false; break;
    case "open-sidebar": UI.sidebarOpen = true; UI.tray = null; needsSave = false; break;
    case "close-sidebar": UI.sidebarOpen = false; needsSave = false; break;
    case "close-jump-menu": UI.jumpMenuOpen = false; needsSave = false; break;
    case "mark-all-read": DB.events.forEach(e => DB.readings.set(e.id, true)); break;
    case "toggle-shhh": DB.preferences.shhh = !DB.preferences.shhh; break;

    case "toggle-bookmark": {
      const i = DB.bookmarks.indexOf(id);
      if (i >= 0) DB.bookmarks.splice(i,1); else DB.bookmarks.push(id);
      break;
    }
    case "open-options": UI.optionsMenuFor = (UI.optionsMenuFor === id) ? null : id; needsSave = false; break;
    case "bubble-up": doBubbleUp(id); UI.optionsMenuFor = null; break;
    case "toggle-pin": { const r = DB.recordings.get(id); if (r) r.pinned = !r.pinned; UI.optionsMenuFor = null; break; }
    case "toggle-client-visible": { const r = DB.recordings.get(id); if (r) r.visible_to_clients = !r.visible_to_clients; UI.optionsMenuFor = null; break; }
    case "toggle-archive": {
      const rawId = id.replace(/^col-/,"");
      toggleStatus(rawId, "archived"); UI.optionsMenuFor = null;
      break;
    }
    case "toggle-trash": toggleStatus(id, "trashed"); UI.optionsMenuFor = null; break;
    case "view-change-log": {
      const evs = DB.events.filter(e => e.recording_id === id);
      toast(evs.length + " event" + (evs.length===1?"":"s") + " recorded for this item.");
      UI.optionsMenuFor = null; needsSave = false;
      break;
    }
    case "toggle-archive-project": { const p = projectById(pid || id); if (p){ p.archived = !p.archived; toast(p.archived?"Project archived.":"Project unarchived."); } UI.optionsMenuFor = null; break; }

    case "toggle-boost-picker": UI.boostPickerFor = (UI.boostPickerFor === id) ? null : id; UI.boostGridFor = null; needsSave = false; break;
    case "toggle-boost-grid": UI.boostGridFor = (UI.boostGridFor === id) ? null : id; needsSave = false; break;
    case "add-boost": {
      const r = DB.recordings.get(id);
      if (r) addBoost(r, DB.viewerId, el.getAttribute("data-emoji"));
      UI.boostPickerFor = null; UI.boostGridFor = null;
      break;
    }
    case "submit-comment": {
      const r = DB.recordings.get(id);
      const html = editorHtml(el.getAttribute("data-editor"));
      if (r && plainTextOf(html)) addComment(r, DB.viewerId, html);
      else needsSave = false;
      break;
    }

    case "toggle-star": { const p = projectById(id); if (p) p.starred = !p.starred; break; }
    case "new-project": {
      const name = (prompt("Name this project:", "New project") || "").trim();
      if (!name){ needsSave = false; break; }
      const np = { id: uid("proj"), name, description: "", sample:false, allAccess:true, starred:false, memberIds:[DB.viewerId], createdAt:new Date(), dock: [] };
      DB.projects.push(np);
      addEvent("created", DB.viewerId, null, "created this project — " + name);
      saveDB(); navigate("#/projects/" + np.id); needsSave = false;
      break;
    }

    case "quick-add": {
      const project = projectById(pid); const tool = toolInProject(project, el.getAttribute("data-tool"));
      needsSave = false;
      if (!tool) break;
      if (tool.type === "Message::Board") navigate(`#/projects/${pid}/messages/new`);
      else if (tool.type === "Vault") navigate(`#/projects/${pid}/docs/new`);
      else if (tool.type === "Todoset") { UI.addingTodolist = true; navigate(`#/projects/${pid}/tools/${tool.id}`); }
      else if (tool.type === "Kanban::Board") navigate(`#/projects/${pid}/tools/${tool.id}`);
      else navigate(`#/projects/${pid}/tools/${tool.id}`);
      break;
    }
    case "remove-tool": {
      const project = projectById(pid); const toolId = el.getAttribute("data-tool");
      if (project) project.dock = project.dock.filter(t => t.id !== toolId);
      break;
    }
    case "open-add-tool": {
      const project = projectById(pid);
      if (!project) { needsSave = false; break; }
      const catalog = [["Message::Board","Message Board"],["Todoset","To-dos"],["Vault","Docs & Files"],["Schedule","Calendar"],["Chat::Transcript","Chat"],["Kanban::Board","Card Table"]];
      const existing = new Set(project.dock.map(t=>t.type));
      const options = catalog.filter(([type]) => !existing.has(type));
      if (!options.length){ toast("Every tool is already on this project's dock."); needsSave = false; break; }
      const choice = prompt("Add a tool:\n" + options.map(([,label],i)=>`${i+1}. ${label}`).join("\n"), "1");
      const idx = parseInt(choice,10) - 1;
      if (options[idx]){
        const [type, label] = options[idx];
        project.dock.push({ id: uid("tool"), type, title: label, enabled:true, position: project.dock.length, bucket_id: project.id });
        toast(label + " added to the dock.");
      } else needsSave = false;
      break;
    }

    case "pick-message-cat": UI.newMessageCat = el.getAttribute("data-cat"); needsSave = false; break;
    case "submit-new-message": {
      const project = projectById(pid); const tool = toolInProject(project, el.getAttribute("data-tool"));
      const title = (document.getElementById("newMessageTitle")?.value || "").trim() || "Untitled message";
      const body = editorHtml("new-message");
      const pinned = !!document.getElementById("newMessagePinned")?.checked;
      const m = rec("Message", { title, category: UI.newMessageCat, creator_id: DB.viewerId, bucket_id: project.id, parent_id: tool.id, content: body || "<p></p>", pinned, created_at: new Date(), subscribers: project.memberIds });
      addEvent("created", DB.viewerId, m.id, "posted a message — " + title);
      UI.newMessageCat = "announcement";
      saveDB(); navigate(`#/projects/${pid}/messages/${m.id}`); needsSave = false;
      break;
    }
    case "submit-new-doc": {
      const project = projectById(pid); const tool = toolInProject(project, el.getAttribute("data-tool"));
      const title = (document.getElementById("newDocTitle")?.value || "").trim() || "Untitled document";
      const body = editorHtml("new-doc");
      const d = rec("Document", { title, bucket_id: project.id, parent_id: tool.id, creator_id: DB.viewerId, created_at: new Date(), content: body || "<p></p>" });
      project.docsItemIds = (project.docsItemIds||[]).concat(d.id);
      addEvent("created", DB.viewerId, d.id, "added a document — " + title);
      saveDB(); navigate(`#/projects/${pid}/docs/${d.id}`); needsSave = false;
      break;
    }

    case "toggle-todo": {
      const t = DB.recordings.get(id);
      if (t){ t.completed = !t.completed; t.completed_at = t.completed ? new Date() : null; addEvent(t.completed?"completed":"reopened", DB.viewerId, t.id, (t.completed?"completed":"reopened")+" a to-do — "+t.title); }
      break;
    }
    case "start-add-todo": UI.addingTodoFor = el.getAttribute("data-list"); needsSave = false; break;
    case "start-add-todolist": UI.addingTodolist = true; needsSave = false; break;
    case "toggle-completed-visible": { const k = "completedOpen_"+el.getAttribute("data-list"); UI[k] = !UI[k]; needsSave = false; break; }
    case "toggle-step": {
      const t = DB.recordings.get(el.getAttribute("data-todo"));
      const step = t && (t.steps||[]).find(s=>s.id===el.getAttribute("data-step"));
      if (step) step.completed = !step.completed;
      break;
    }
    case "add-step": {
      const t = DB.recordings.get(el.getAttribute("data-todo"));
      const title = (prompt("New subtask:") || "").trim();
      if (t && title) t.steps = (t.steps||[]).concat({ id: uid("step"), title, completed:false });
      else needsSave = false;
      break;
    }

    case "assign-me-card": { const c = DB.recordings.get(id); if (c && !(c.assignee_ids||[]).includes(DB.viewerId)) c.assignee_ids = (c.assignee_ids||[]).concat(DB.viewerId); break; }
    case "move-card": {
      const c = DB.recordings.get(id);
      const targetColId = el.getAttribute("data-col");
      const onHold = el.getAttribute("data-onhold") === "1";
      if (c){
        const oldCol = DB.recordings.get(c.parent_id);
        if (oldCol) oldCol.cards = oldCol.cards.filter(cid => cid !== c.id);
        const newCol = DB.recordings.get(targetColId);
        newCol.cards.push(c.id);
        c.parent_id = targetColId; c.onHold = onHold; c.movedAt = new Date();
        addEvent("moved", DB.viewerId, c.id, "moved this card to " + newCol.title);
      }
      break;
    }
    case "start-add-card": UI.addingCardFor = el.getAttribute("data-col"); needsSave = false; break;
    case "new-column": {
      const project = projectById(pid);
      const name = (prompt("Name this column:", "New column") || "").trim();
      if (project && name){
        const col = rec("Kanban::Column", { title:name, bucket_id: project.id, parent_id: toolByType(project,"Kanban::Board").id, kind:"user", color:"var(--color-ink-50)", onHoldEnabled:false, watcherIds:[], cards:[] });
        const doneIdx = project.cardColumnIds.findIndex(cid => DB.recordings.get(cid).kind === "done");
        project.cardColumnIds.splice(doneIdx, 0, col.id);
      } else needsSave = false;
      break;
    }
    case "rename-column": {
      const col = DB.recordings.get(id);
      const name = (prompt("Rename column:", col.title) || "").trim();
      if (col && name) col.title = name; else needsSave = false;
      UI.optionsMenuFor = null;
      break;
    }
    case "toggle-onhold-enabled": { const col = DB.recordings.get(id); if (col) col.onHoldEnabled = !col.onHoldEnabled; UI.optionsMenuFor = null; break; }

    case "open-new-file-menu": UI.newFileMenuOpen = !UI.newFileMenuOpen; needsSave = false; break;
    case "clear-file-selection": UI.selectedFileIds = new Set(); needsSave = false; break;
    case "toggle-file-select": {
      if (UI.selectedFileIds.has(id)) UI.selectedFileIds.delete(id); else UI.selectedFileIds.add(id);
      needsSave = false;
      break;
    }

    case "submit-chat-line": {
      const project = projectById(pid); const tool = toolInProject(project, el.getAttribute("data-tool"));
      const html = editorHtml(el.getAttribute("data-editor"));
      if (plainTextOf(html)){
        const l = rec("Campfire::Line", { bucket_id: project.id, parent_id: tool.id, creator_id: DB.viewerId, content: html, created_at: new Date() });
        addEvent("posted", DB.viewerId, l.id, "posted in chat");
      } else needsSave = false;
      break;
    }

    case "cal-nav": {
      const dir = el.getAttribute("data-dir");
      UI.calMonthOffset = dir === "reset" ? 0 : (UI.calMonthOffset + parseInt(dir,10));
      needsSave = false;
      break;
    }

    case "toggle-clients-enabled": { const p = projectById(id); if (p) p.clientsEnabled = !p.clientsEnabled; break; }
    case "save-project-settings": {
      const p = projectById(id);
      const nameEl = el.closest(".tool-page").querySelector('[data-action-input="rename-project"]');
      const descEl = el.closest(".tool-page").querySelector('[data-action-input="describe-project"]');
      if (p && nameEl) p.name = nameEl.value.trim() || p.name;
      if (p && descEl) p.description = descEl.value;
      toast("Settings saved.");
      break;
    }

    case "admin-tab": UI.adminTab = el.getAttribute("data-tab"); needsSave = false; break;

    case "toggle-ping-picker": UI.pingPickerOpen = !UI.pingPickerOpen; needsSave = false; break;
    case "new-ping": {
      const withId = el.getAttribute("data-with");
      let pg = DB.pings.find(p => p.withId === withId);
      if (!pg){ pg = { id: uid("ping"), withId, lines: [] }; DB.pings.push(pg); }
      UI.pingPickerOpen = false;
      navigate("#/pings/" + pg.id); needsSave = false;
      break;
    }
    case "submit-ping": {
      const pg = DB.pings.find(p => p.id === id);
      const editorEl = document.getElementById("editor-" + el.getAttribute("data-editor"));
      const text = editorEl ? plainTextOf(editorEl.innerHTML) : "";
      if (pg && text) pg.lines.push({ id: uid("pl"), from: DB.viewerId, text, at: new Date() });
      else needsSave = false;
      break;
    }

    case "remove-do-today": DB.doTodayIds.delete(id); break;
    case "save-my-notes": { DB.myNotes = editorHtml(el.getAttribute("data-editor")); toast("Notes saved."); break; }

    default: needsSave = false;
  }
  if (needsSave) saveDB();
  render();
}

function findActionEl(e){
  const stopEl = e.target.closest("[data-stop-close]");
  const actionEl = e.target.closest("[data-action]");
  if (stopEl){
    if (actionEl && stopEl.contains(actionEl)) return actionEl;
    return null;
  }
  return actionEl;
}

document.addEventListener("click", (e) => {
  const rtBtn = e.target.closest("[data-rt]");
  if (rtBtn){
    e.preventDefault();
    const targetId = rtBtn.getAttribute("data-target");
    const editor = document.getElementById("editor-" + targetId);
    if (!editor) return;
    editor.focus();
    const cmd = rtBtn.getAttribute("data-rt");
    if (cmd === "link"){
      const url = prompt("Link URL:", "https://");
      if (url) document.execCommand("createLink", false, url);
    } else if (cmd === "formatBlock"){
      document.execCommand("formatBlock", false, rtBtn.getAttribute("data-rt-arg"));
    } else {
      document.execCommand(cmd, false, null);
    }
    editor.dataset.empty = editor.textContent.trim() ? "false" : "true";
    return;
  }
  const actionEl = findActionEl(e);
  if (!actionEl) return;
  e.preventDefault();
  dispatch(actionEl.getAttribute("data-action"), actionEl);
});

document.addEventListener("keydown", (e) => {
  if (e.target.matches("[data-quickadd]")){
    if (e.key === "Enter"){
      e.preventDefault();
      const kind = e.target.getAttribute("data-quickadd");
      const value = e.target.value.trim();
      if (!value) return;
      if (kind === "new-todo"){
        const list = DB.recordings.get(e.target.getAttribute("data-list"));
        const t = rec("Todo", { title:value, bucket_id:list.bucket_id, parent_id:list.id, completed:false, assignee_ids:[], due_on:null, notify_ids:[], notes:"", steps:[], created_at:new Date() });
        list.todos.push(t.id);
        addEvent("created", DB.viewerId, t.id, "added a to-do — " + value);
        UI.addingTodoFor = null;
      } else if (kind === "new-todolist"){
        const project = projectById(e.target.getAttribute("data-pid"));
        const tool = toolInProject(project, e.target.getAttribute("data-tool"));
        rec("Todolist", { title:value, color:"var(--recording-color-primary)", description:"", bucket_id:project.id, parent_id:tool.id, todos:[], groups:[] });
        UI.addingTodolist = false;
      } else if (kind === "new-card"){
        const col = DB.recordings.get(e.target.getAttribute("data-col"));
        const c = rec("Kanban::Card", { title:value, bucket_id:col.bucket_id, parent_id:col.id, creator_id:DB.viewerId, created_at:new Date(), assignee_ids:[], due_on:null, notes:"", onHold:false, steps:[], movedAt:new Date() });
        col.cards.push(c.id);
        UI.addingCardFor = null;
      }
      saveDB(); render();
    } else if (e.key === "Escape"){
      UI.addingTodoFor = null; UI.addingTodolist = false; UI.addingCardFor = null; render();
    }
    return;
  }
});

document.addEventListener("change", (e) => {
  if (e.target.matches("[data-action-input]")){
    const action = e.target.getAttribute("data-action-input");
    const id = e.target.getAttribute("data-id");
    if (action === "rename-project"){ const p = projectById(id); if (p) p.name = e.target.value.trim() || p.name; }
    if (action === "describe-project"){ const p = projectById(id); if (p) p.description = e.target.value; }
    saveDB();
  }
});

document.addEventListener("input", (e) => {
  if (e.target.id === "jumpSearchInput"){ UI.jumpQuery = e.target.value; render(); }
  else if (e.target.id === "sidebarFilterInput"){ UI.sidebarFilter = e.target.value; renderSidebarRowsOnly(); }
  else if (e.target.id === "searchQueryInput"){ UI.searchQuery = e.target.value; render(); const inp=document.getElementById("searchQueryInput"); if(inp){inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length);} }
  else if (e.target.classList && e.target.classList.contains("rt-editor")){
    e.target.dataset.empty = e.target.textContent.trim() ? "false" : "true";
  }
});
function renderSidebarRowsOnly(){
  // Filtering the sidebar re-renders just its notification list to preserve the filter input's focus.
  const scroll = document.querySelector(".sidebar-panel .sidebar-scroll");
  if (!scroll) return;
  const tmp = document.createElement("div");
  tmp.innerHTML = sidebarHtml();
  const freshScroll = tmp.querySelector(".sidebar-scroll");
  if (freshScroll) scroll.innerHTML = freshScroll.innerHTML;
}

/* Close floating menus / trays / jump menu on Escape */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape"){
    if (UI.jumpMenuOpen || UI.sidebarOpen || UI.tray || UI.optionsMenuFor || UI.accountMenuOpen || UI.boostPickerFor){
      UI.jumpMenuOpen = false; UI.sidebarOpen = false; UI.tray = null; UI.optionsMenuFor = null; UI.accountMenuOpen = false; UI.boostPickerFor = null; UI.boostGridFor = null;
      render();
    }
  }
});

/* =====================================================================
   KEYBOARD SHORTCUTS (§6) + shift-hint badges
   ===================================================================== */
function isTypingTarget(el){
  return el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable);
}
document.addEventListener("keydown", (e) => {
  if (e.key === "Shift") document.body.classList.add("shift-down");
  if (isTypingTarget(e.target)) return;
  const meta = e.metaKey || e.ctrlKey;
  if ((meta && e.key.toLowerCase() === "j") || (meta && e.key.toLowerCase() === "k")){
    e.preventDefault(); UI.jumpMenuOpen = true; render(); return;
  }
  if (!e.shiftKey && !meta){
    if (e.key === "1"){ navigate("#/activity"); return; }
    if (e.key === "2"){ navigate("#/calendar"); return; }
    if (e.key === "3"){ navigate("#/reports"); return; }
    if (e.key === "4"){ navigate("#/everything"); return; }
    if (e.key.toLowerCase() === "e"){ UI.tray = UI.tray==="events"?null:"events"; render(); return; }
    if (e.key.toLowerCase() === "v"){ UI.tray = UI.tray==="dotoday"?null:"dotoday"; render(); return; }
    if (e.key.toLowerCase() === "b"){ UI.tray = UI.tray==="bookmarks"?null:"bookmarks"; render(); return; }
    if (e.key.toLowerCase() === "n"){ UI.tray = UI.tray==="notes"?null:"notes"; render(); return; }
    if (e.key.toLowerCase() === "u"){ navigate("#/adminland"); return; }
    if (e.key === "?"){ toast("Keyboard shortcuts — see INIT §6."); return; }
  }
  if (e.shiftKey && !meta){
    const k = e.key.toLowerCase();
    if (k === "j"){ e.preventDefault(); UI.jumpMenuOpen = true; render(); return; }
    if (k === "s"){ e.preventDefault(); UI.sidebarOpen = !UI.sidebarOpen; render(); return; }
    if (k === "h"){ navigate("#/home"); return; }
    if (k === "p"){ navigate("#/pings"); UI.pingPickerOpen = true; return; }
    if (k === "z"){ DB.preferences.shhh = !DB.preferences.shhh; saveDB(); render(); toast(DB.preferences.shhh?"Shhh… is on":"Shhh… is off"); return; }
    if (k === "t"){ UI.tray = UI.tray==="tasks"?null:"tasks"; render(); return; }
    if (k === "a"){ navigate("#/assignments"); return; }
    if (k === "y"){ navigate("#/activity"); return; }
    if (k === "w"){ navigate("#/drafts"); return; }
    if (k === "o"){ navigate("#/boosts"); return; }
    if (k === "g"){ const route = parseHash(); if (route.pid) navigate("#/projects/"+route.pid); return; }
    if (k === "f"){ e.preventDefault(); const f = document.querySelector(".filter-input, .search-input-lg"); if (f) f.focus(); return; }
    if (k === "x"){ /* mark read/unread — contextual, no-op at global scope */ return; }
    if (k === ":"){ /* :wq easter egg handled via keypress buffer below */ }
  }
});
document.addEventListener("keyup", (e) => { if (e.key === "Shift") document.body.classList.remove("shift-down"); });

let __wqBuffer = "";
document.addEventListener("keypress", (e) => {
  if (isTypingTarget(e.target)) return;
  __wqBuffer = (__wqBuffer + e.key).slice(-3);
  if (__wqBuffer === ":wq"){ toast("Logging out… just kidding 👋"); __wqBuffer = ""; }
});

/* =====================================================================
   BOOT
   ===================================================================== */
function boot(force){
  buildSeed();
  const hadSaved = loadDB();
  if (!hadSaved) saveDB();
  if (!location.hash) location.hash = "#/home";
  render();
}
window.addEventListener("hashchange", () => { closeAllMenus(); UI.jumpMenuOpen=false; UI.sidebarOpen=false; UI.tray=null; render(); });
boot();
</script>
</body>
