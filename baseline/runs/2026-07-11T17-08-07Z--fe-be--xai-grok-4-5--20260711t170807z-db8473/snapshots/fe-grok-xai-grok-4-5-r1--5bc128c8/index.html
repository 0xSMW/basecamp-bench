    </div>`;
  }
  if (ui.modal.type === 'new-message') {
    return `<div class="modal-backdrop" data-action="close-modal">
      <div class="dialog" onclick="event.stopPropagation()">
        <h2>New message</h2>
        <div class="form-stack">
          <div><label>Category</label>
            <select id="nm-cat" class="field" style="width:100%">
              <option value="📣 Announcement">📣 Announcement</option>
              <option value="✨ FYI">✨ FYI</option>
              <option value="💡 Pitch">💡 Pitch</option>
              <option value="❤️ Heartbeat">❤️ Heartbeat</option>
              <option value="👋 Question">👋 Question</option>
            </select>
          </div>
          <div><label>Title</label><input id="nm-title" class="field" style="width:100%" placeholder="Message title"></div>
          <div><label>Body</label><textarea id="nm-body" class="field" style="width:100%;min-height:12rem" placeholder="Write your message…"></textarea></div>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" data-action="close-modal">Cancel</button>
          <button class="btn btn-primary" data-action="create-message">Post message</button>
        </div>
      </div>
    </div>`;
  }
  if (ui.modal.type === 'add-tool') {
    const catalog = [
      ['Message Board', 'Message::Board'], ['To-dos', 'Todoset'], ['Docs & Files', 'Vault'],
      ['Schedule', 'Schedule'], ['Chat', 'Chat::Transcript'], ['Card Table', 'Kanban::Board'],
      ['Automatic Check-ins', 'Questionnaire'], ['Email Forwards', 'Inbox'], ['External link', 'Door'],
    ];
    return `<div class="modal-backdrop" data-action="close-modal">
      <div class="dialog" onclick="event.stopPropagation()">
        <h2>Add a tool</h2>
        <div class="tool-list">
          ${catalog.map(([label, type]) => `<button class="jump-item" data-action="confirm-add-tool" data-type="${type}" data-label="${esc(label)}" style="background:var(--color-ink-20);margin-bottom:0.4rem;border-radius:var(--radius-lg)">${esc(label)}</button>`).join('')}
        </div>
        <div class="actions"><button class="btn btn-secondary" data-action="close-modal">Cancel</button></div>
      </div>
    </div>`;
  }
  if (ui.modal.type === 'help') {
    return `<div class="modal-backdrop" data-action="close-modal">
      <div class="dialog" onclick="event.stopPropagation()">
        <h2>Keyboard shortcuts</h2>
        <div class="kbd-help">
          <kbd>⇧J</kbd><span>Jump menu</span>
          <kbd>⇧S</kbd><span>Sidebar</span>
          <kbd>⇧H</kbd><span>Home</span>
          <kbd>⇧T</kbd><span>My Tasks</span>
          <kbd>⇧E</kbd><span>My Events</span>
          <kbd>⇧B</kbd><span>Bookmarks</span>
          <kbd>⇧N</kbd><span>Notes</span>
          <kbd>⇧Z</kbd><span>Shhh…</span>
          <kbd>?</kbd><span>This help</span>
          <kbd>1–4</kbd><span>Activity / Calendar / Reports / Everything</span>
        </div>
        <div class="actions"><button class="btn btn-primary" data-action="close-modal">Got it</button></div>
      </div>
    </div>`;
  }
  if (ui.modal.type === 'ping') {
    const ping = state.pings.find(p => p.id === ui.modal.id);
    if (!ping) return '';
    const other = person(ping.participant_ids.find(id => id !== state.currentUserId));
    return `<div class="modal-backdrop" data-action="close-modal">
      <div class="dialog" onclick="event.stopPropagation()">
        <h2>Ping with ${esc(other.name)}</h2>
        <div style="max-height:40vh;overflow:auto;margin-bottom:1rem">
          ${ping.lines.map(l => {
            const c = person(l.creator_id);
            return `<div style="display:flex;gap:0.8rem;margin-bottom:1rem">${avatarHtml(c,'xs')}<div><strong style="font-size:var(--text-sm)">${esc(c.name)}</strong><div>${esc(l.content)}</div></div></div>`;
          }).join('')}
        </div>
        <div class="actions"><button class="btn btn-secondary" data-action="close-modal">Close</button></div>
      </div>
    </div>`;
  }
  if (ui.modal.type === 'account-menu') {
    return `<div class="modal-backdrop" data-action="close-modal">
      <div class="dialog" style="width:min(28rem,100%)" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.6rem">
          ${avatarHtml(currentUser(), 'md')}
          <div><strong>${esc(currentUser().name)}</strong><div style="color:var(--color-text-subtle);font-size:var(--text-sm)">${esc(currentUser().email)}</div></div>
        </div>
        <div class="tool-list">
          <a href="#" data-action="stub" data-label="Profile">My Profile</a>
          <a href="#/activity" data-action="close-modal">My Activity</a>
          <a href="#/adminland" data-action="close-modal">Adminland</a>
          <a href="#" data-action="toggle-theme">Toggle theme</a>
          <a href="#" data-action="reset-seed">Reset sample data</a>
        </div>
        <div class="actions"><button class="btn btn-secondary" data-action="close-modal">Close</button></div>
      </div>
    </div>`;
  }
  return '';
}

// ---------- Main render ----------
function render() {
  document.documentElement.dataset.colorScheme = state.ui?.theme || 'dark';
  const route = parseRoute();
  let main = '';
  switch (route.name) {
    case 'home': main = renderHome(); break;
    case 'project': main = renderProject(route.projectId); break;
    case 'message_board': main = renderMessageBoard(route.projectId); break;
    case 'message': main = renderMessage(route.projectId, route.messageId); break;
    case 'todos': main = renderTodos(route.projectId); break;
    case 'todo': main = renderTodo(route.projectId, route.todoId); break;
    case 'card_table': main = renderCardTable(route.projectId); break;
    case 'card': main = renderCard(route.projectId, route.cardId); break;
    case 'docs': main = renderDocs(route.projectId); break;
    case 'doc': main = renderDoc(route.projectId, route.docId); break;
    case 'chat': main = renderChat(route.projectId); break;
    case 'schedule': main = renderSchedule(route.projectId); break;
    case 'activity':
      main = renderOptional('Activity', `<div class="tool-list">${state.activity.map(a => {
        const p = person(a.person_id); const proj = project(a.project_id);
        return `<div style="padding:1rem;border-bottom:1px solid var(--color-ink-20)">${avatarHtml(p,'xs')} <strong>${esc(p.name)}</strong> ${esc(a.summary)} ${proj ? `· <a href="#/projects/${proj.id}">${esc(proj.name)}</a>` : ''} <span style="color:var(--color-text-subtle)">· ${fmtDateTime(a.created_at)}</span></div>`;
      }).join('')}</div>`);
      break;
    case 'calendar':
      main = renderOptional('Calendar', `<p style="color:var(--color-text-subtle)">Account-wide calendar. Open a project Schedule for project-colored events and due to-dos.</p>
        <div class="tool-list">${state.projects.map(p => `<a href="#/projects/${p.id}/schedule">${esc(p.name)}</a>`).join('')}</div>`);
      break;
    case 'reports':
      main = renderOptional('Reports', `<div class="tool-list">
        <a href="#/assignments">My Assignments</a>
        <span style="padding:1.4rem 1.6rem;color:var(--color-text-subtle)">Lineup, Hilltop, gauges, overdue — stubbed for this prototype</span>
      </div>`);
      break;
    case 'everything':
      main = renderOptional('Everything', `<div class="tool-list">
        <a href="#/projects/proj_launch/message_board">All messages</a>
        <a href="#/projects/proj_launch/docs">All docs & files</a>
        <a href="#/projects/proj_launch/todos">All to-dos</a>
      </div>`);
      break;
    case 'adminland':
      main = renderOptional('Adminland', `<div class="tool-list">
        <div style="padding:1rem 0"><strong>People</strong></div>
        ${state.people.map(p => `<div style="display:flex;align-items:center;gap:1rem;padding:0.8rem 0;border-bottom:1px solid var(--color-ink-20)">${avatarHtml(p,'sm')}<div><strong>${esc(p.name)}</strong><div style="font-size:var(--text-sm);color:var(--color-text-subtle)">${esc(p.title || '')}${p.sample ? ' · sample' : ''}${p.owner ? ' · owner' : ''}</div></div></div>`).join('')}
      </div>`);
      break;
    case 'assignments': {
      const rows = [];
      Object.entries(state.todolists).forEach(([pid, lists]) => lists.forEach(l => l.todos.forEach(t => {
        if (!t.completed) rows.push({ t, pid, list: l });
      })));
      main = renderOptional('My Assignments', rows.map(({ t, pid, list }) =>
        `<a class="tray-item" href="#/projects/${pid}/todos/${t.id}" style="border-bottom:1px solid var(--color-ink-20)">
          <span class="checkbox" style="pointer-events:none"></span>
          <span style="flex:1">${esc(t.title)}</span>
          <span style="color:var(--color-text-subtle);font-size:var(--text-xs)">${esc(project(pid)?.name)} · ${esc(list.title)}</span>
        </a>`
      ).join('') || '<div class="tray-empty">No open assignments</div>');
      break;
    }
    case 'search': {
      const q = (route.q || '').toLowerCase();
      const hits = [];
      (state.messages.proj_launch || []).forEach(m => { if (m.title.toLowerCase().includes(q) || m.content.toLowerCase().includes(q)) hits.push({ type: 'Message', title: m.title, href: `#/projects/proj_launch/message_board/${m.id}` }); });
      (state.todolists.proj_launch || []).forEach(l => l.todos.forEach(t => { if (t.title.toLowerCase().includes(q)) hits.push({ type: 'To-do', title: t.title, href: `#/projects/proj_launch/todos/${t.id}` }); }));
      (state.docs.proj_launch || []).forEach(d => { if (d.title.toLowerCase().includes(q)) hits.push({ type: 'Doc', title: d.title, href: `#/projects/proj_launch/docs/${d.id}` }); });
      main = renderOptional(`Search: ${route.q}`, hits.map(h => `<a class="tray-item" href="${h.href}"><span class="badge">${esc(h.type)}</span><span>${esc(h.title)}</span></a>`).join('') || '<div class="tray-empty">No results</div>');
      break;
    }
    default: main = renderHome();
  }

  $('#app').innerHTML = renderShell(main, { showHome: route.name !== 'home' });
  $('#overlays').innerHTML = renderJumpMenu() + renderSidebar() + renderTray() + renderModal();

  // focus management
  if (ui.jumpOpen) {
    const input = $('#jump-search');
    if (input && document.activeElement !== input) {
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }
  }
  if (route.name === 'chat') {
    const input = $('#chat-input');
    // don't steal focus constantly
  }
}

// ---------- Actions ----------
function getContextIds() {
  const route = parseRoute();
  return route;
}

document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-action]');
  // close tray when clicking outside
  if (!t && ui.tray && !e.target.closest('.tray-popover') && !e.target.closest('.tray-btn')) {
    ui.tray = null; render(); return;
  }
  if (!t) return;
  const action = t.dataset.action;
  e.preventDefault();

  if (action === 'nav') {
    ui.jumpOpen = false; ui.sidebarOpen = false; ui.modal = null; ui.tray = null;
    navigate(t.dataset.href);
    return;
  }
  if (action === 'open-jump') { ui.jumpOpen = true; ui.jumpQuery = ''; render(); return; }
  if (action === 'close-jump') { ui.jumpOpen = false; render(); return; }
  if (action === 'toggle-sidebar') { ui.sidebarOpen = !ui.sidebarOpen; render(); return; }
  if (action === 'close-sidebar') { ui.sidebarOpen = false; render(); return; }
  if (action === 'tray') {
    ui.tray = ui.tray === t.dataset.tray ? null : t.dataset.tray;
    render(); return;
  }
  if (action === 'close-tray') { ui.tray = null; render(); return; }
  if (action === 'close-modal') { ui.modal = null; render(); return; }
  if (action === 'open-account-menu') { ui.modal = { type: 'account-menu' }; render(); return; }
  if (action === 'toggle-theme') {
    state.ui.theme = state.ui.theme === 'dark' ? 'light' : 'dark';
    saveState(); render(); return;
  }
  if (action === 'reset-seed') { resetSeed(); return; }
  if (action === 'toggle-star') {
    const id = t.dataset.id;
    state.starred[id] = !state.starred[id];
    const p = project(id); if (p) p.starred = state.starred[id];
    saveState(); render(); return;
  }
  if (action === 'new-project') { ui.modal = { type: 'new-project' }; render(); return; }
  if (action === 'create-project') {
    const name = $('#np-name')?.value?.trim() || 'Untitled project';
    const desc = $('#np-desc')?.value?.trim() || '';
    const id = uid('proj');
    state.projects.unshift({
      id, name, description: desc, status: 'active', all_access: true, sample: false,
      bookmarked: false, starred: false, clients_enabled: false, created_at: new Date().toISOString(),
      member_ids: [state.currentUserId],
    });
    state.projectTools[id] = {}; // empty dock — new projects start empty
    state.activity.unshift({ id: uid('act'), created_at: new Date().toISOString(), person_id: state.currentUserId, summary: 'created this project', project_id: id });
    state.starred[id] = false;
    ui.modal = null; saveState();
    toast('Project created — add tools from the dock');
    navigate(`#/projects/${id}`);
    return;
  }
  if (action === 'new-message') {
    ui.modal = { type: 'new-message', projectId: t.dataset.project };
    render(); return;
  }
  if (action === 'create-message') {
    const pid = ui.modal.projectId;
    const catRaw = $('#nm-cat')?.value || '📣 Announcement';
    const [icon, ...rest] = catRaw.split(' ');
    const title = $('#nm-title')?.value?.trim() || 'Untitled';
    const body = $('#nm-body')?.value?.trim() || '';
    const msg = {
      id: uid('msg'), type: 'Message', status: 'active', title,
      category: { name: rest.join(' '), icon },
      creator_id: state.currentUserId, created_at: new Date().toISOString(),
      pinned: false, visible_to_clients: false, position: 0,
      content: `<p>${esc(body).replace(/\n/g, '</p><p>')}</p>`,
      subscriber_ids: [state.currentUserId], boosts: [], comments: [],
    };
    state.messages[pid] = state.messages[pid] || [];
    state.messages[pid].unshift(msg);
    state.activity.unshift({ id: uid('act'), created_at: new Date().toISOString(), person_id: state.currentUserId, summary: `posted ${title}`, project_id: pid, recording_title: title });
    ui.modal = null; saveState();
    toast('Message posted');
    navigate(`#/projects/${pid}/message_board/${msg.id}`);
    return;
  }
  if (action === 'add-tool') {
    ui.modal = { type: 'add-tool', projectId: t.dataset.project };
    render(); return;
  }
  if (action === 'confirm-add-tool') {
    const pid = ui.modal.projectId;
    const type = t.dataset.type;
    const label = t.dataset.label;
    state.projectTools[pid] = state.projectTools[pid] || {};
    const keyMap = {
      'Message::Board': 'message_board',
      'Todoset': 'todoset',
      'Vault': 'vault',
      'Schedule': 'schedule',
      'Chat::Transcript': 'chat',
      'Kanban::Board': 'card_table',
      'Questionnaire': 'checkins',
      'Inbox': 'forwards',
      'Door': 'door',
    };
    const key = keyMap[type];
    if (!key) { toast('Unsupported tool'); ui.modal = null; render(); return; }
    if (['checkins', 'forwards', 'door'].includes(key)) {
      toast(`${label} — available in catalog; not fully wired in this prototype`);
      ui.modal = null; render(); return;
    }
    if (state.projectTools[pid][key]) {
      toast(`${label} is already on this project`);
      ui.modal = null; render(); return;
    }
    const pos = Object.keys(state.projectTools[pid]).length;
    state.projectTools[pid][key] = { id: uid('tool'), type, title: label, position: pos };
    // init empty stores
    if (key === 'message_board') state.messages[pid] = state.messages[pid] || [];
    if (key === 'todoset') state.todolists[pid] = state.todolists[pid] || [];
    if (key === 'card_table') {
      state.cardColumns[pid] = state.cardColumns[pid] || [
        { id: uid('col'), title: 'Triage', kind: 'triage', color: null, on_hold_enabled: false, watcher_ids: [], position: 0 },
        { id: uid('col'), title: 'Not now', kind: 'not_now', color: null, on_hold_enabled: false, watcher_ids: [], position: 90 },
        { id: uid('col'), title: 'Done', kind: 'done', color: null, on_hold_enabled: false, watcher_ids: [], position: 100 },
      ];
      state.cards[pid] = state.cards[pid] || [];
    }
    if (key === 'vault') state.docs[pid] = state.docs[pid] || [];
    if (key === 'schedule') state.events[pid] = state.events[pid] || [];
    if (key === 'chat') state.chatLines[pid] = state.chatLines[pid] || [];
    ui.modal = null; saveState(); render(); toast(`${label} added`);
    return;
  }
  if (action === 'toggle-todo') {
    const { project: pid, list: lid, todo: tid } = t.dataset;
    const list = (state.todolists[pid] || []).find(l => l.id === lid);
    const todo = list?.todos.find(x => x.id === tid);
    if (todo) {
      todo.completed = !todo.completed;
      todo.completed_at = todo.completed ? new Date().toISOString() : null;
      if (todo.completed) {
        state.activity.unshift({ id: uid('act'), created_at: new Date().toISOString(), person_id: state.currentUserId, summary: `completed ${todo.title}`, project_id: pid, recording_title: todo.title });
      }
      saveState(); render();
    }
    return;
  }
  if (action === 'toggle-completed') {
    const key = t.dataset.list;
    ui.expandedCompleted[key] = !ui.expandedCompleted[key];
    render(); return;
  }
  if (action === 'toggle-step') {
    const { project: pid, list: lid, todo: tid, step: sid } = t.dataset;
    const list = (state.todolists[pid] || []).find(l => l.id === lid);
    const todo = list?.todos.find(x => x.id === tid);
    const step = todo?.steps?.find(s => s.id === sid);
    if (step) { step.completed = !step.completed; saveState(); render(); }
    return;
  }
  if (action === 'add-step') {
    const title = prompt('Subtask title');
    if (!title) return;
    const { project: pid, list: lid, todo: tid } = t.dataset;
    const list = (state.todolists[pid] || []).find(l => l.id === lid);
    const todo = list?.todos.find(x => x.id === tid);
    if (todo) {
      todo.steps = todo.steps || [];
      todo.steps.push({ id: uid('st'), title, completed: false, assignee_ids: [] });
      saveState(); render();
    }
    return;
  }
  if (action === 'add-todo') {
    const title = prompt('To-do title');
    if (!title) return;
    const pid = t.dataset.project;
    const lid = t.dataset.list;
    const list = (state.todolists[pid] || []).find(l => l.id === lid) || (state.todolists[pid] || [])[0];
    if (!list) { toast('Create a list first'); return; }
    list.todos.unshift({
      id: uid('td'), title, completed: false, creator_id: state.currentUserId,
      created_at: new Date().toISOString(), assignee_ids: [], due_on: null,
      completion_subscriber_ids: [], notes: '', steps: [], comments: [],
    });
    saveState(); render(); toast('To-do added');
    return;
  }
  if (action === 'new-list') {
    const title = prompt('List name');
    if (!title) return;
    const pid = t.dataset.project;
    state.todolists[pid] = state.todolists[pid] || [];
    state.todolists[pid].push({ id: uid('tl'), title, description: '', color: 'green', position: 99, todos: [] });
    saveState(); render(); return;
  }
  if (action === 'assign-me') {
    const { project: pid, list: lid, todo: tid } = t.dataset;
    const list = (state.todolists[pid] || []).find(l => l.id === lid);
    const todo = list?.todos.find(x => x.id === tid);
    if (todo) {
      todo.assignee_ids = todo.assignee_ids || [];
      if (!todo.assignee_ids.includes(state.currentUserId)) todo.assignee_ids.push(state.currentUserId);
      saveState(); render(); toast('Assigned to you');
    }
    return;
  }
  if (action === 'add-card') {
    const title = prompt('Card title');
    if (!title) return;
    const pid = t.dataset.project;
    const triage = (state.cardColumns[pid] || []).find(c => c.kind === 'triage');
    state.cards[pid] = state.cards[pid] || [];
    state.cards[pid].unshift({
      id: uid('card'), title, column_id: triage?.id || 'col_triage', on_hold: false,
      creator_id: state.currentUserId, created_at: new Date().toISOString(),
      assignee_ids: [], due_on: null, notes: '', steps: [], comments: [],
    });
    saveState(); render(); toast('Card added to triage');
    return;
  }
  if (action === 'move-card') {
    const { project: pid, card: cid, column, hold } = t.dataset;
    const card = (state.cards[pid] || []).find(c => c.id === cid);
    if (card) {
      card.column_id = column;
      card.on_hold = hold === 'true';
      saveState(); render(); toast('Card moved');
    }
    return;
  }
  if (action === 'toggle-card-step') {
    const { project: pid, card: cid, step: sid } = t.dataset;
    const card = (state.cards[pid] || []).find(c => c.id === cid);
    const step = card?.steps?.find(s => s.id === sid);
    if (step) { step.completed = !step.completed; saveState(); render(); }
    return;
  }
  if (action === 'post-comment') {
    const route = parseRoute();
    const text = $('#comment-input')?.value?.trim();
    if (!text) return;
    const comment = {
      id: uid('c'), creator_id: state.currentUserId, created_at: new Date().toISOString(),
      content: text, boosts: [],
    };
    if (route.name === 'message') {
      const m = (state.messages[route.projectId] || []).find(x => x.id === route.messageId);
      if (m) { m.comments = m.comments || []; m.comments.push(comment); }
    } else if (route.name === 'todo') {
      const found = findTodo(route.projectId, route.todoId);
      if (found) { found.todo.comments = found.todo.comments || []; found.todo.comments.push(comment); }
    } else if (route.name === 'card') {
      const card = (state.cards[route.projectId] || []).find(c => c.id === route.cardId);
      if (card) { card.comments = card.comments || []; card.comments.push(comment); }
    } else if (route.name === 'doc') {
      const d = (state.docs[route.projectId] || []).find(x => x.id === route.docId);
      if (d) { d.comments = d.comments || []; d.comments.push(comment); }
    }
    ui.commentDraft = '';
    saveState(); render(); toast('Comment added');
    return;
  }
  if (action === 'add-boost') {
    const emoji = t.dataset.emoji || prompt('Boost emoji or short text', '👍');
    if (!emoji) return;
    const type = t.dataset.type;
    const id = t.dataset.id;
    const route = parseRoute();
    const boost = { content: emoji, person_id: state.currentUserId };
    if (type === 'message') {
      const m = (state.messages[route.projectId] || []).find(x => x.id === id);
      if (m) { m.boosts = m.boosts || []; m.boosts.push(boost); }
    }
    saveState(); render(); return;
  }
  if (action === 'new-doc') {
    const title = prompt('Document title');
    if (!title) return;
    const pid = t.dataset.project;
    const doc = {
      id: uid('doc'), type: 'Document', title, creator_id: state.currentUserId,
      created_at: new Date().toISOString(), color: null,
      content: '<p>Start writing…</p>', comments: [],
    };
    state.docs[pid] = state.docs[pid] || [];
    state.docs[pid].unshift(doc);
    saveState(); navigate(`#/projects/${pid}/docs/${doc.id}`);
    return;
  }
  if (action === 'toggle-bookmark') {
    const id = t.dataset.id;
    const existing = state.bookmarks.findIndex(b => b.id === id);
    if (existing >= 0) { state.bookmarks.splice(existing, 1); toast('Bookmark removed'); }
    else { state.bookmarks.push({ id, title: id, type: t.dataset.type }); toast('Bookmarked'); }
    saveState(); render(); return;
  }
  if (action === 'open-ping') {
    ui.modal = { type: 'ping', id: t.dataset.id };
    render(); return;
  }
  if (action === 'bubble-up') {
    toast('Bubbled up for later today');
    return;
  }
  if (action === 'stub') {
    toast(`${t.dataset.label || 'This action'} — stubbed in prototype`);
    return;
  }
  if (action === 'support') {
    ui.modal = { type: 'help' }; render(); return;
  }
});

document.addEventListener('submit', (e) => {
  const form = e.target.closest('[data-action="post-chat"]');
  if (!form) return;
  e.preventDefault();
  const pid = form.dataset.project;
  const input = $('#chat-input');
  const text = input?.value?.trim();
  if (!text) return;
  state.chatLines[pid] = state.chatLines[pid] || [];
  state.chatLines[pid].push({
    id: uid('ch'), creator_id: state.currentUserId, created_at: new Date().toISOString(),
    content: text, boosts: [],
  });
  ui.chatDraft = '';
  saveState(); render();
  // scroll to bottom
  requestAnimationFrame(() => {
    const stream = $('.chat-stream');
    if (stream) stream.scrollTop = stream.scrollHeight;
  });
});

document.addEventListener('input', (e) => {
  if (e.target.matches('[data-filter]')) {
    const key = e.target.dataset.filter;
    ui.filters[key] = e.target.value;
    if (key === 'sidebar') return;
    // preserve focus: re-render with value
    const start = e.target.selectionStart;
    render();
    const el = document.querySelector(`[data-filter="${key}"]`);
    if (el) { el.focus(); el.setSelectionRange(start, start); }
    return;
  }
  if (e.target.id === 'jump-search') {
    ui.jumpQuery = e.target.value;
    render();
    return;
  }
  if (e.target.id === 'chat-input') ui.chatDraft = e.target.value;
  if (e.target.id === 'comment-input') ui.commentDraft = e.target.value;
  if (e.target.matches('[data-action="save-notes"]')) {
    state.myNotes = e.target.value;
    saveState();
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Shift') {
    ui.shiftHeld = true;
    document.body.classList.add('shift-held');
  }
  const meta = e.metaKey || e.ctrlKey;
  const tag = (e.target.tagName || '').toLowerCase();
  const typing = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;

  if ((meta && (e.key === 'j' || e.key === 'k' || e.key === 'J' || e.key === 'K')) || (e.shiftKey && (e.key === 'J' || e.key === 'j') && !typing)) {
    e.preventDefault();
    ui.jumpOpen = !ui.jumpOpen;
    ui.jumpQuery = '';
    render();
    return;
  }
  if (e.key === 'Escape') {
    if (ui.jumpOpen) { ui.jumpOpen = false; render(); return; }
    if (ui.sidebarOpen) { ui.sidebarOpen = false; render(); return; }
    if (ui.modal) { ui.modal = null; render(); return; }
    if (ui.tray) { ui.tray = null; render(); return; }
  }
  if (typing && !ui.jumpOpen) return;

  if (e.shiftKey && (e.key === 'S' || e.key === 's')) {
    e.preventDefault(); ui.sidebarOpen = !ui.sidebarOpen; render(); return;
  }
  if (e.shiftKey && (e.key === 'H' || e.key === 'h')) {
    e.preventDefault(); navigate('#/'); return;
  }
  if (e.shiftKey && (e.key === 'T' || e.key === 't')) {
    e.preventDefault(); ui.tray = ui.tray === 'tasks' ? null : 'tasks'; render(); return;
  }
  if (e.shiftKey && (e.key === 'E' || e.key === 'e')) {
    e.preventDefault(); ui.tray = ui.tray === 'events' ? null : 'events'; render(); return;
  }
  if (e.shiftKey && (e.key === 'B' || e.key === 'b')) {
    e.preventDefault(); ui.tray = ui.tray === 'bookmarks' ? null : 'bookmarks'; render(); return;
  }
  if (e.shiftKey && (e.key === 'N' || e.key === 'n')) {
    e.preventDefault(); ui.tray = ui.tray === 'notes' ? null : 'notes'; render(); return;
  }
  if (e.shiftKey && (e.key === 'V' || e.key === 'v')) {
    e.preventDefault(); ui.tray = ui.tray === 'today' ? null : 'today'; render(); return;
  }
  if (e.shiftKey && (e.key === 'Z' || e.key === 'z')) {
    e.preventDefault();
    state.ui.shhh = !state.ui.shhh;
    saveState();
    toast(state.ui.shhh ? 'Shhh… notifications paused' : 'Notifications resumed');
    return;
  }
  if (e.key === '?' && !typing) {
    e.preventDefault(); ui.modal = { type: 'help' }; render(); return;
  }
  if (!typing && !ui.jumpOpen && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (e.key === '1') { navigate('#/activity'); return; }
    if (e.key === '2') { navigate('#/calendar'); return; }
    if (e.key === '3') { navigate('#/reports'); return; }
    if (e.key === '4') { navigate('#/everything'); return; }
  }
  if (ui.jumpOpen && e.key === 'Enter') {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      navigate(`#/search/${encodeURIComponent(ui.jumpQuery)}`);
      ui.jumpOpen = false; render();
    } else {
      const first = $('.jump-item');
      if (first) first.click();
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'Shift') {
    ui.shiftHeld = false;
    document.body.classList.remove('shift-held');
  }
});

window.addEventListener('hashchange', () => {
  ui.commentDraft = '';
  ui.chatDraft = '';
  render();
});

// Boot
render();
</script>
</body>
</html>
