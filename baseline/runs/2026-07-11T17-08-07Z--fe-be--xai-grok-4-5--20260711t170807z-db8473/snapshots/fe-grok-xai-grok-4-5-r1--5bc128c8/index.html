/* ========== BASE ========== */
*, *::before, *::after { box-sizing: border-box; }
html { font-size: var(--text-root); height: 100%; }
body {
  margin: 0; min-height: 100%;
  font-family: var(--font-base);
  font-size: var(--text-body);
  line-height: var(--line-height-base);
  color: var(--color-text);
  background: var(--color-body);
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; padding: 0; }
a { color: var(--color-blue); text-decoration: none; }
a:hover { text-decoration: underline; }
:focus-visible { outline: 2px solid var(--focus-ring-color); outline-offset: 2px; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
.skip-link {
  position: absolute; left: -9999px; top: 0; z-index: 999;
  background: var(--color-blue); color: white; padding: var(--8px) var(--16px); border-radius: var(--radius-md);
}
.skip-link:focus { left: var(--16px); top: var(--16px); }

/* ========== SHELL ========== */
#app { min-height: 100vh; display: flex; flex-direction: column; padding-bottom: var(--tray-block-size); }
.app-header {
  position: sticky; top: 0; z-index: var(--z-nav);
  display: flex; align-items: center; justify-content: space-between;
  height: var(--nav-height); padding: 0 var(--24px);
  background: var(--color-body);
}
.nav-home {
  display: inline-flex; align-items: center; gap: var(--6px);
  color: var(--color-text); font-size: var(--text-base); font-weight: 500;
  padding: var(--8px) var(--12px); border-radius: 999px;
}
.nav-home:hover { background: var(--tint-ink-5); text-decoration: none; }
.nav-logo {
  display: inline-flex; align-items: center; gap: var(--8px);
  font-weight: 600; font-size: var(--text-md); color: var(--color-text);
  padding: var(--8px) var(--12px); border-radius: 999px;
}
.nav-logo:hover { background: var(--tint-ink-5); text-decoration: none; }
.nav-logo svg { width: 2.4rem; height: 2.4rem; }
.nav-right { display: flex; align-items: center; gap: var(--8px); min-width: 8rem; justify-content: flex-end; }
.main-content { flex: 1; width: 100%; }

/* ========== MY BAR ========== */
.my-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: var(--z-footer-trays);
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; height: var(--tray-block-size);
  padding: 0 var(--16px);
  background: color-mix(in hsl, var(--color-body) 92%, transparent);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--tint-ink-10);
}
.my-bar-left { display: flex; align-items: center; gap: var(--8px); }
.my-bar-center { display: flex; align-items: center; gap: var(--4px); }
.my-bar-right { display: flex; align-items: center; justify-content: flex-end; gap: var(--8px); }
.tray-btn {
  display: inline-flex; align-items: center; gap: var(--6px);
  padding: var(--8px) var(--12px); border-radius: 999px;
  font-size: var(--text-sm); color: var(--color-text-subtle); font-weight: 500;
}
.tray-btn:hover, .tray-btn.active { background: var(--tint-ink-10); color: var(--color-text); }
.avatar {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; font-weight: 600; color: white; flex-shrink: 0;
  background: var(--color-blue-50); overflow: hidden;
  font-size: 0.55em; letter-spacing: -0.02em;
}
.avatar-2xs { width: var(--avatar-size-2xs); height: var(--avatar-size-2xs); }
.avatar-xs { width: var(--avatar-size-xs); height: var(--avatar-size-xs); }
.avatar-sm { width: var(--avatar-size-sm); height: var(--avatar-size-sm); }
.avatar-md { width: var(--avatar-size); height: var(--avatar-size); }
.avatar-stack { display: flex; }
.avatar-stack .avatar { margin-left: -0.6rem; border: 2px solid var(--color-canvas); }
.avatar-stack .avatar:first-child { margin-left: 0; }
.support-link { font-size: var(--text-sm); color: var(--color-text-subtle); padding: var(--8px); }
.support-link:hover { color: var(--color-text); text-decoration: none; }
.pings-pill {
  display: inline-flex; align-items: center; gap: var(--8px);
  padding: var(--8px) var(--14px); border-radius: 999px;
  background: var(--color-ink-20); font-size: var(--text-sm); font-weight: 500;
  color: var(--color-text);
}
.pings-pill:hover { background: var(--color-ink-30); }
.pings-pill .dot { width: 0.8rem; height: 0.8rem; border-radius: 50%; background: var(--color-red-50); }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--6px);
  padding: var(--8px) var(--14px); border-radius: var(--radius-lg);
  font-size: var(--text-sm); font-weight: 500; line-height: 1.2;
  border: 1px solid transparent; white-space: nowrap;
  transition: background var(--duration-fast), border-color var(--duration-fast);
}
.btn-primary { background: var(--color-blue-50); color: white; }
.btn-primary:hover { background: var(--color-blue-60); }
.btn-secondary {
  background: var(--color-ink-20); color: var(--color-text);
  border-color: transparent;
}
.btn-secondary:hover { background: var(--color-ink-30); }
.btn-ghost { color: var(--color-text-subtle); }
.btn-ghost:hover { background: var(--tint-ink-10); color: var(--color-text); }
.btn-outline {
  border: 1px solid var(--color-ink-30); background: transparent; color: var(--color-text);
}
.btn-outline:hover { background: var(--tint-ink-5); }
.btn-sm { padding: var(--6px) var(--10px); font-size: var(--text-xs); }
.btn-icon {
  width: var(--component-sm); height: var(--component-sm); padding: 0;
  border-radius: 50%; color: var(--color-text-subtle);
}
.btn-icon:hover { background: var(--tint-ink-10); color: var(--color-text); }
.btn-group { display: flex; flex-wrap: wrap; gap: var(--8px); align-items: center; }

/* ========== FORMS ========== */
.field {
  background: var(--color-canvas); border: 1px solid var(--color-ink-30);
  border-radius: var(--radius-lg); padding: var(--8px) var(--12px);
  font-size: var(--text-sm); color: var(--color-text); min-width: 0;
}
.field:focus { outline: none; border-color: var(--color-blue-50); box-shadow: 0 0 0 3px color-mix(in hsl, var(--color-blue-50) 25%, transparent); }
.field::placeholder { color: var(--color-text-placeholder); }
.filter-field { width: 14rem; max-width: 100%; }
.checkbox {
  appearance: none; width: var(--checkbox-size); height: var(--checkbox-size);
  border: 2px solid var(--color-ink-40); border-radius: var(--radius-sm);
  flex-shrink: 0; cursor: pointer; position: relative; background: transparent;
}
.checkbox:checked { background: var(--color-green-50); border-color: var(--color-green-50); }
.checkbox:checked::after {
  content: ""; position: absolute; left: 0.35rem; top: 0.1rem;
  width: 0.45rem; height: 0.8rem; border: solid white; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.checkbox:focus-visible { outline: 2px solid var(--focus-ring-color); outline-offset: 2px; }

/* ========== CARDS / PANELS ========== */
.panel {
  background: var(--color-canvas);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
}
.panel-inset { background: var(--color-canvas); border: 1px solid var(--color-ink-20); border-radius: var(--radius-xl); }
.page-shell {
  max-width: 92rem; margin: 0 auto; padding: var(--16px) var(--24px) var(--48px);
}
.page-panel {
  background: var(--color-canvas);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
  padding: var(--32px) var(--40px) var(--48px);
  min-height: 40rem;
}
.page-title {
  font-size: var(--32px); font-weight: 700; line-height: var(--line-height-headings);
  margin: 0 0 var(--16px); letter-spacing: -0.02em;
}
.toolbar-row {
  display: flex; flex-wrap: wrap; gap: var(--8px); align-items: center;
  margin-bottom: var(--24px);
}
.breadcrumb-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--16px); padding: var(--12px) var(--20px);
  border-bottom: 1px solid var(--color-ink-20);
  font-size: var(--text-sm); color: var(--color-text-subtle);
}
.breadcrumbs { display: flex; flex-wrap: wrap; align-items: center; gap: var(--6px); min-width: 0; }
.breadcrumbs a { color: var(--color-text-subtle); font-weight: 500; }
.breadcrumbs a:hover { color: var(--color-text); text-decoration: none; }
.breadcrumbs .sep { opacity: 0.5; }
.breadcrumb-actions { display: flex; align-items: center; gap: var(--4px); flex-shrink: 0; }

/* ========== HOME ========== */
.home-layout {
  display: grid;
  grid-template-columns: minmax(16rem, 22rem) minmax(28rem, 48rem) minmax(16rem, 26rem);
  gap: var(--32px); align-items: start;
  max-width: 120rem; margin: 0 auto; padding: var(--48px) var(--32px) var(--64px);
}
@media (max-width: 1100px) {
  .home-layout { grid-template-columns: 1fr; max-width: 56rem; }
  .home-activity { order: 3; }
}
.home-greeting h1 {
  font-size: var(--24px); font-weight: 700; margin: 0 0 var(--16px);
  letter-spacing: -0.01em;
}
.home-actions { display: flex; flex-direction: column; align-items: flex-start; gap: var(--8px); }
.home-actions .btn { border-radius: 999px; }
.home-center { display: flex; flex-direction: column; gap: var(--16px); }
.account-card {
  background: var(--color-canvas); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card); padding: var(--20px);
}
.account-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--16px); padding: 0 var(--4px);
}
.account-card-header h2 { margin: 0; font-size: var(--text-md); font-weight: 600; text-align: center; flex: 1; }
.jump-hint {
  text-align: center; font-size: var(--text-xs); color: var(--color-text-subtle);
  margin: 0 0 var(--16px);
}
.jump-hint kbd {
  display: inline-block; padding: 0.1rem 0.45rem; border-radius: var(--radius-sm);
  background: var(--color-ink-20); font-family: var(--font-base); font-size: var(--text-xs);
  border: 1px solid var(--color-ink-30);
}
.project-card {
  display: block; background: var(--color-canvas-light);
  border: 1px solid var(--color-ink-20); border-radius: var(--radius-xl);
  padding: var(--20px); margin-bottom: var(--12px);
  color: inherit; transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
  cursor: pointer;
}
.project-card:hover { border-color: var(--color-ink-40); box-shadow: var(--shadow-sm); text-decoration: none; }
.project-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--8px); }
.project-card h3 { margin: 0; font-size: var(--text-md); font-weight: 700; }
.project-card .desc {
  margin: var(--8px) 0 var(--16px); font-size: var(--text-sm); color: var(--color-text-subtle);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.star-btn {
  width: 2.4rem; height: 2.4rem; border-radius: 50%;
  color: var(--color-text-placeholder); flex-shrink: 0;
}
.star-btn:hover, .star-btn.starred { color: transparent; background: var(--star-gradient); -webkit-background-clip: text; background-clip: text; }
.star-btn.starred { filter: none; }
.star-btn.starred svg { fill: url(#starGrad); stroke: none; }
.badge {
  display: inline-flex; align-items: center; gap: var(--4px);
  padding: 0.15rem 0.55rem; border-radius: 999px;
  font-size: var(--text-xs); font-weight: 600;
}
.badge-all-access { background: var(--color-blue-20); color: var(--color-blue-70); }
.badge-sample { background: var(--color-orange-20); color: var(--color-orange-70); font-size: var(--text-xs); }
.home-activity h2 { font-size: var(--text-md); font-weight: 600; margin: 0 0 var(--16px); }
.activity-item {
  display: grid; grid-template-columns: auto 1fr; gap: var(--8px) var(--10px);
  font-size: var(--text-sm); margin-bottom: var(--16px); color: var(--color-text-subtle);
}
.activity-item .time { grid-column: 2; font-size: var(--text-xs); }
.activity-item .body { grid-column: 2; color: var(--color-text); }
.activity-item .body strong { font-weight: 600; }
.people-active {
  margin-top: var(--32px); font-size: var(--text-sm); color: var(--color-text-subtle);
}
.people-active .avatar-stack { margin-top: var(--8px); }

/* ========== PROJECT DOCK ========== */
.project-header {
  position: relative; padding: var(--24px) var(--32px) var(--8px);
}
.project-people {
  display: flex; align-items: center; gap: var(--8px); margin-bottom: var(--20px);
}
.project-title-row {
  display: flex; align-items: center; gap: var(--12px); flex-wrap: wrap;
}
.project-title-row h1 {
  margin: 0; font-size: var(--32px); font-weight: 700; letter-spacing: -0.02em;
}
.project-desc {
  margin: var(--12px) 0 var(--8px); color: var(--color-text-subtle);
  font-size: var(--text-body); max-width: 72rem;
}
.sample-ribbon {
  position: absolute; right: 0; top: 4rem;
  writing-mode: vertical-rl; transform: rotate(180deg);
  background: var(--color-orange-30); color: var(--color-orange-70);
  font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.04em;
  padding: var(--12px) var(--6px); border-radius: var(--radius-md) 0 0 var(--radius-md);
  text-transform: uppercase;
}
.dock-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: var(--24px); padding: var(--16px) var(--32px) var(--40px);
}
@media (max-width: 1000px) { .dock-grid { grid-template-columns: 1fr; } }
@media (min-width: 1001px) and (max-width: 1200px) { .dock-grid { grid-template-columns: repeat(2, 1fr); } }
.dock-card { display: flex; flex-direction: column; min-height: 0; }
.dock-card-title {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--8px); padding: 0 var(--4px);
}
.dock-card-title a {
  font-size: var(--text-md); font-weight: 600; color: var(--color-sand-60);
}
.dock-card-title a:hover { color: var(--color-sand-70); text-decoration: none; }
.dock-card-body {
  background: var(--color-canvas); border: 1px solid var(--color-ink-20);
  border-radius: var(--radius-xl); padding: var(--12px); flex: 1; min-height: 16rem;
}
.dock-msg {
  display: grid; grid-template-columns: auto 1fr; gap: var(--4px) var(--10px);
  padding: var(--8px); border-radius: var(--radius-md); margin-bottom: var(--4px);
  cursor: pointer;
}
.dock-msg:hover { background: var(--tint-ink-5); }
.dock-msg .meta { font-size: var(--text-xs); color: var(--color-text-subtle); }
.dock-msg .title { font-weight: 600; font-size: var(--text-sm); }
.dock-msg .excerpt {
  font-size: var(--text-sm); color: var(--color-text-subtle);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dock-todo-list { margin-bottom: var(--12px); }
.dock-todo-list h4 {
  margin: 0 0 var(--6px); font-size: var(--text-sm); font-weight: 600;
  display: flex; align-items: center; gap: var(--6px);
}
.pie {
  width: 1.4rem; height: 1.4rem; border-radius: 50%;
  background: conic-gradient(var(--color-green-50) calc(var(--pct) * 1%), var(--color-ink-30) 0);
  flex-shrink: 0;
}
.dock-todo-item {
  display: flex; align-items: flex-start; gap: var(--8px);
  font-size: var(--text-sm); padding: var(--3px) 0; color: var(--color-text);
}
.dock-kanban {
  display: flex; gap: 0.3rem; height: 14rem; align-items: stretch;
}
.dock-kanban-col {
  flex: 1; border-radius: var(--radius-sm); min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: var(--6px) 0; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.04em;
  color: white; writing-mode: vertical-rl; transform: rotate(180deg);
  text-transform: uppercase; opacity: 0.9;
}
.dock-file {
  display: flex; gap: var(--10px); align-items: flex-start;
  padding: var(--8px); border-radius: var(--radius-md); cursor: pointer;
}
.dock-file:hover { background: var(--tint-ink-5); }
.file-icon {
  width: 3.6rem; height: 3.6rem; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-sm); font-weight: 700; flex-shrink: 0;
  background: var(--color-ink-20); color: var(--color-text);
}
.file-icon.doc { background: white; border: 1px solid var(--color-ink-30); color: var(--color-ink-50); }
.file-icon.sheet { background: #0F9D58; color: white; }
.file-icon.img { background: var(--color-purple-40); color: white; }
.dock-file .title { font-weight: 600; font-size: var(--text-sm); }
.dock-file .meta { font-size: var(--text-xs); color: var(--color-text-subtle); }
.dock-cal-mini { text-align: center; }
.dock-cal-mini h4 { margin: 0 0 var(--8px); font-size: var(--text-sm); }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.2rem;
  font-size: var(--text-xs); color: var(--color-text-subtle);
}
.cal-grid .day { padding: 0.35rem 0; border-radius: var(--radius-sm); }
.cal-grid .day.has { color: var(--color-blue-60); font-weight: 700; background: var(--color-blue-20); }
.cal-grid .day.today { outline: 1px solid var(--color-blue-50); }
.dock-chat-line {
  display: grid; grid-template-columns: auto 1fr; gap: var(--4px) var(--8px);
  padding: var(--6px) var(--4px); font-size: var(--text-sm);
}
.dock-chat-line .name { font-weight: 600; font-size: var(--text-xs); }
.dock-chat-line .time { color: var(--color-text-subtle); font-size: var(--text-xs); margin-left: var(--6px); font-weight: 400; }
.dock-chat-line .text { color: var(--color-text-subtle); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dock-add {
  border: 2px dashed var(--color-ink-30); border-radius: var(--radius-xl);
  min-height: 16rem; display: flex; align-items: center; justify-content: center;
  color: var(--color-text-subtle); font-size: var(--text-md); cursor: pointer;
}
.dock-add:hover { border-color: var(--color-ink-40); color: var(--color-text); background: var(--tint-ink-2); }

/* ========== MESSAGE BOARD ========== */
.msg-list { display: flex; flex-direction: column; }
.msg-pinned-label {
  display: flex; align-items: center; gap: var(--6px);
  font-size: var(--text-xs); color: var(--color-text-subtle); font-weight: 600;
  margin: var(--8px) 0; text-transform: none;
}
.msg-row {
  display: grid; grid-template-columns: auto 1fr auto; gap: var(--12px);
  padding: var(--16px) 0; border-top: 1px solid var(--color-ink-20);
  cursor: pointer; align-items: start;
}
.msg-row:hover .msg-title { color: var(--color-blue); }
.msg-title { font-weight: 700; font-size: var(--text-md); margin: 0 0 var(--4px); }
.msg-meta { font-size: var(--text-sm); color: var(--color-text-subtle); line-height: 1.45; }
.msg-meta .cat { font-weight: 500; }
.comment-count {
  background: var(--color-blue-50); color: white;
  min-width: 2rem; height: 2rem; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 700;
}
.msg-divider { height: 1px; background: var(--color-ink-30); margin: var(--12px) 20%; opacity: 0.5; }
.msg-detail-header { margin-bottom: var(--24px); }
.msg-detail-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: var(--8px);
  font-size: var(--text-sm); color: var(--color-text-subtle); margin-bottom: var(--20px);
}
.rich-body { font-size: var(--text-body); line-height: 1.55; }
.rich-body p { margin: 0 0 var(--16px); }
.rich-body h2, .rich-body h3 { margin: var(--24px) 0 var(--12px); font-size: var(--text-md); }
.rich-body ul, .rich-body ol { margin: 0 0 var(--16px); padding-left: var(--24px); }
.rich-body blockquote {
  margin: var(--16px) 0; padding: var(--8px) var(--16px);
  border-left: 3px solid var(--color-ink-40); color: var(--color-text-subtle);
}
.rich-body .mention {
  display: inline-flex; align-items: center; gap: var(--4px);
  background: var(--color-blue-20); color: var(--color-blue-70);
  padding: 0.05rem 0.5rem; border-radius: 999px; font-weight: 600; font-size: 0.9em;
}
.boosts { display: flex; flex-wrap: wrap; gap: var(--6px); margin: var(--16px) 0; }
.boost-chip {
  display: inline-flex; align-items: center; gap: var(--4px);
  padding: var(--4px) var(--10px); border-radius: 999px;
  background: var(--color-ink-20); font-size: var(--text-sm); cursor: pointer;
}
.boost-chip:hover { background: var(--color-ink-30); }
.boost-chip.active { background: var(--color-yellow-20); outline: 1px solid var(--color-yellow-40); }
.comments-section { margin-top: var(--32px); border-top: 1px solid var(--color-ink-20); padding-top: var(--24px); }
.comment {
  display: grid; grid-template-columns: auto 1fr; gap: var(--12px);
  padding: var(--16px) 0; border-bottom: 1px solid var(--color-ink-20);
}
.comment-head { display: flex; align-items: baseline; gap: var(--8px); margin-bottom: var(--4px); }
.comment-head .name { font-weight: 600; }
.comment-head .time { font-size: var(--text-sm); color: var(--color-text-subtle); }
.comment-body { font-size: var(--text-body); }
.comment-composer {
  display: grid; grid-template-columns: auto 1fr; gap: var(--12px);
  margin-top: var(--16px); align-items: start;
}
.comment-composer textarea {
  width: 100%; min-height: 8rem; resize: vertical;
  background: var(--color-canvas); border: 1px solid var(--color-ink-30);
  border-radius: var(--radius-lg); padding: var(--12px);
}
.subscription-footer {
  margin-top: var(--24px); padding-top: var(--16px);
  border-top: 1px solid var(--color-ink-20);
  font-size: var(--text-sm); color: var(--color-text-subtle);
}

/* ========== TODOS ========== */
.todo-list-block { margin-bottom: var(--32px); }
.todo-list-head {
  display: flex; align-items: center; gap: var(--8px);
  margin-bottom: var(--8px);
}
.todo-list-head h3 { margin: 0; font-size: var(--text-md); font-weight: 700; }
.todo-list-desc {
  margin: 0 0 var(--12px) var(--28px); font-size: var(--text-sm); color: var(--color-text-subtle);
}
.todo-row {
  display: flex; align-items: flex-start; gap: var(--10px);
  padding: var(--6px) 0; font-size: var(--text-base);
}
.todo-row .todo-title { flex: 1; cursor: pointer; min-width: 0; }
.todo-row .todo-title:hover { color: var(--color-blue); }
.todo-row.completed .todo-title { text-decoration: line-through; color: var(--color-text-subtle); }
.todo-meta { display: flex; flex-wrap: wrap; align-items: center; gap: var(--6px); flex-shrink: 0; }
.assignee-chip {
  display: inline-flex; align-items: center; gap: var(--4px);
  background: var(--color-ink-20); padding: 0.15rem 0.55rem 0.15rem 0.2rem;
  border-radius: 999px; font-size: var(--text-xs); font-weight: 500;
}
.due-chip {
  display: inline-flex; align-items: center; gap: var(--4px);
  font-size: var(--text-xs); color: var(--color-text-subtle);
  background: var(--color-ink-20); padding: 0.15rem 0.55rem; border-radius: var(--radius-md);
}
.due-chip.soon { color: var(--color-orange-70); background: var(--color-orange-20); }
.step-badge {
  display: inline-flex; align-items: center; gap: var(--3px);
  font-size: var(--text-xs); color: var(--color-text-subtle);
}
.comment-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 1.8rem; height: 1.8rem; border-radius: 50%;
  background: var(--color-blue-50); color: white; font-size: 1rem; font-weight: 700;
}
.completed-toggle {
  display: flex; align-items: center; gap: var(--8px);
  color: var(--color-text-subtle); font-size: var(--text-sm);
  margin: var(--8px) 0; cursor: pointer; padding: var(--4px) 0;
}
.completed-toggle:hover { color: var(--color-text); }
.add-todo-link {
  display: inline-block; margin: var(--4px) 0 var(--4px) var(--28px);
  font-size: var(--text-sm); color: var(--color-blue);
}
.todo-detail-fields {
  display: grid; gap: var(--14px); margin: var(--20px) 0;
  max-width: 56rem;
}
.field-row {
  display: grid; grid-template-columns: 10rem 1fr; gap: var(--12px); align-items: start;
  font-size: var(--text-base);
}
.field-row label { color: var(--color-text); font-weight: 600; padding-top: var(--2px); text-align: right; }
.field-row .value { color: var(--color-text-subtle); min-height: 2.4rem; display: flex; flex-wrap: wrap; align-items: center; gap: var(--6px); }
.field-row .value.editable { color: var(--color-text); }
.mark-complete-btn {
  display: inline-flex; align-items: center; gap: var(--8px);
  border: 1px solid var(--color-ink-30); border-radius: 999px;
  padding: var(--8px) var(--14px); font-size: var(--text-sm); font-weight: 500;
}
.mark-complete-btn:hover { background: var(--tint-ink-5); }
.mark-complete-btn.done { background: var(--color-green-20); border-color: var(--color-green-40); color: var(--color-green-70); }
.subtasks-list { display: flex; flex-direction: column; gap: var(--6px); width: 100%; }
.subtask-row { display: flex; align-items: center; gap: var(--8px); font-size: var(--text-base); }
.subtask-row.done span { text-decoration: line-through; color: var(--color-text-subtle); }
.add-subtask { color: var(--color-text-subtle); font-size: var(--text-sm); margin-left: var(--28px); cursor: pointer; }
.add-subtask:hover { color: var(--color-blue); }

/* ========== CARD TABLE ========== */
.kanban-page { overflow-x: auto; }
.kanban-toolbar { padding: 0 var(--8px); }
.kanban-board {
  display: flex; gap: var(--kanbanGridGap); align-items: flex-start;
  padding: var(--8px) 0 var(--32px); min-height: 40rem;
}
.kanban-triage { flex: 0 0 auto; min-width: 28rem; max-width: 40rem; }
.kanban-triage-title {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text-subtle);
  margin-bottom: var(--10px);
}
.triage-cards { display: flex; flex-wrap: wrap; gap: var(--8px); }
.kanban-columns { display: flex; gap: var(--kanbanGridGap); flex: 1; min-width: 0; }
.kanban-col {
  flex: 0 0 var(--kanbanColumnWidth); min-width: 20rem;
  background: var(--color-canvas); border-radius: var(--radius-xl);
  border: 1px solid var(--color-ink-20); border-top: 3px solid var(--col-color, var(--color-ink-40));
  padding: var(--10px); max-height: calc(100vh - 22rem); overflow-y: auto;
}
.kanban-col-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--10px); padding: 0 var(--4px);
}
.kanban-col-head h3 { margin: 0; font-size: var(--text-sm); font-weight: 700; }
.kanban-card {
  background: var(--color-canvas-light); border: 1px solid var(--color-ink-20);
  border-radius: var(--radius-lg); padding: var(--12px); margin-bottom: var(--8px);
  cursor: pointer; transition: box-shadow var(--duration-fast);
}
.kanban-card:hover { box-shadow: var(--shadow-sm); }
.kanban-card h4 { margin: 0 0 var(--6px); font-size: var(--text-sm); font-weight: 600; }
.kanban-card .meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: var(--6px);
  font-size: var(--text-xs); color: var(--color-text-subtle);
}
.on-hold-label {
  font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.06em;
  color: var(--color-text-subtle); text-align: center;
  margin: var(--12px) 0 var(--8px); opacity: 0.7;
}
.kanban-edge {
  flex: 0 0 var(--kanbanSlimColumnWidth);
  writing-mode: vertical-rl; transform: rotate(180deg);
  display: flex; align-items: center; justify-content: center; gap: var(--8px);
  border-radius: var(--radius-lg); font-size: var(--text-xs); font-weight: 700;
  letter-spacing: 0.08em; color: white; min-height: 20rem; cursor: pointer;
  align-self: stretch;
}
.kanban-edge.not-now { background: var(--color-slate-40); }
.kanban-edge.done { background: var(--color-green-40); }
.watchers-row {
  display: flex; align-items: center; gap: var(--8px);
  font-size: var(--text-xs); color: var(--color-text-subtle);
  margin-bottom: var(--12px); justify-content: flex-end;
}
.move-along {
  display: flex; flex-wrap: wrap; gap: var(--6px); margin: var(--16px) 0;
}
.move-along button {
  padding: var(--6px) var(--12px); border-radius: 999px;
  background: var(--color-ink-20); font-size: var(--text-xs); font-weight: 500;
}
.move-along button:hover { background: var(--color-ink-30); }
.move-along button.current { background: var(--color-blue-20); color: var(--color-blue-70); outline: 1px solid var(--color-blue-40); }

/* ========== DOCS ========== */
.docs-list { display: flex; flex-direction: column; }
.doc-row {
  display: grid; grid-template-columns: auto 1fr auto; gap: var(--14px);
  padding: var(--16px) 0; border-top: 1px solid var(--color-ink-20);
  align-items: start; cursor: pointer;
}
.doc-row:hover .doc-title { color: var(--color-blue); }
.doc-title { font-weight: 700; font-size: var(--text-md); margin: 0 0 var(--4px); }
.doc-meta { font-size: var(--text-sm); color: var(--color-text-subtle); }
.doc-thumb {
  width: 4.8rem; height: 4.8rem; border-radius: var(--radius-md);
  object-fit: cover; background: var(--color-ink-20);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 700; overflow: hidden;
}
.doc-detail-body { max-width: 64rem; }
.color-label { width: 0.6rem; height: 100%; min-height: 4rem; border-radius: 999px; background: var(--recording-color-aqua); }

/* ========== CHAT ========== */
.chat-page { display: flex; flex-direction: column; min-height: calc(100vh - 16rem); }
.chat-stream { flex: 1; padding: var(--16px) 0 var(--24px); max-width: 72rem; }
.chat-day {
  text-align: center; font-size: var(--text-sm); color: var(--color-text-subtle);
  margin: var(--24px) 0 var(--16px); font-weight: 500;
}
.chat-line {
  display: grid; grid-template-columns: auto 1fr; gap: var(--10px);
  margin-bottom: var(--8px); max-width: 56rem;
}
.chat-line.continuation { margin-top: -0.4rem; }
.chat-line.continuation .avatar { visibility: hidden; }
.chat-bubble {
  background: var(--color-ink-20); border-radius: var(--radius-xl);
  padding: var(--10px) var(--14px); display: inline-block; max-width: 100%;
}
.chat-bubble .head { font-size: var(--text-sm); margin-bottom: var(--2px); }
.chat-bubble .head .name { font-weight: 600; }
.chat-bubble .head .time { color: var(--color-text-subtle); margin-left: var(--6px); font-size: var(--text-xs); }
.chat-bubble .text { font-size: var(--text-base); white-space: pre-wrap; word-break: break-word; }
.chat-bubble .text a { word-break: break-all; }
.chat-boosts { display: flex; gap: var(--4px); margin-top: var(--6px); flex-wrap: wrap; }
.chat-composer-wrap {
  position: sticky; bottom: calc(var(--tray-block-size) + var(--8px));
  padding: var(--8px) 0; background: linear-gradient(transparent, var(--color-canvas) 30%);
}
.chat-composer {
  display: flex; align-items: center; gap: var(--8px);
  border: 2px solid var(--color-blue-50); border-radius: var(--radius-xl);
  padding: var(--8px) var(--12px); background: var(--color-canvas);
}
.chat-composer input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: var(--text-base); min-width: 0;
}
.chat-composer .tools { display: flex; gap: var(--4px); color: var(--color-text-subtle); }

/* ========== JUMP MENU ========== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: var(--z-modal);
  background: hsla(var(--hsl-black), 0.45);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 12vh var(--16px) var(--16px);
  animation: fadeIn var(--duration-medium) var(--ease-out-expo);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(1.2rem) scale(0.98); }
  to { opacity: 1; transform: none; }
}
.jump-menu {
  width: min(48rem, 100%); background: var(--color-canvas);
  border-radius: var(--radius-xl); box-shadow: var(--shadow-modal);
  padding: var(--16px); animation: slideUp var(--duration-slow) var(--ease-out-overshoot);
  max-height: 70vh; overflow: auto;
}
.jump-tiles {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--8px);
  margin-bottom: var(--12px);
}
.jump-tile {
  display: flex; flex-direction: column; align-items: center; gap: var(--6px);
  padding: var(--16px) var(--8px); border-radius: var(--radius-lg);
  background: var(--color-ink-20); font-size: var(--text-sm); font-weight: 500;
  color: var(--color-text);
}
.jump-tile:hover { background: var(--color-ink-30); }
.jump-tile .icon { font-size: 2rem; opacity: 0.85; }
.jump-search {
  width: 100%; margin-bottom: var(--16px); font-size: var(--text-base);
  padding: var(--12px) var(--14px);
}
.jump-section { margin-bottom: var(--12px); }
.jump-section h3 {
  margin: 0 0 var(--8px); font-size: var(--text-xs); font-weight: 600;
  color: var(--color-text-subtle); text-transform: none; letter-spacing: 0;
}
.jump-item {
  display: flex; align-items: center; gap: var(--10px);
  padding: var(--10px) var(--12px); border-radius: var(--radius-lg);
  font-size: var(--text-sm); color: var(--color-text); width: 100%; text-align: left;
}
.jump-item:hover, .jump-item.active { background: var(--color-ink-20); }
.jump-item .icon { width: 2rem; text-align: center; opacity: 0.7; }
.jump-footer {
  display: flex; gap: var(--16px); padding-top: var(--12px);
  border-top: 1px solid var(--color-ink-20); font-size: var(--text-sm);
}
.jump-footer a { color: var(--color-text-subtle); }
.jump-footer a:hover { color: var(--color-text); }

/* ========== SIDEBAR ========== */
.sidebar-backdrop {
  position: fixed; inset: 0; z-index: calc(var(--z-sidebar) - 1);
  background: hsla(var(--hsl-black), 0.25);
}
.sidebar {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: var(--z-sidebar);
  width: min(var(--sidebar-width), 100vw);
  background: var(--color-canvas); box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  animation: slideInRight var(--duration-slow) var(--ease-out-expo);
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: none; }
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--16px) var(--20px); border-bottom: 1px solid var(--color-ink-20);
}
.sidebar-header h2 { margin: 0; font-size: var(--text-md); }
.sidebar-body { flex: 1; overflow: auto; padding: var(--16px) var(--20px); }
.sidebar-section { margin-bottom: var(--24px); }
.sidebar-section h3 {
  margin: 0 0 var(--10px); font-size: var(--text-sm); font-weight: 700;
  display: flex; align-items: center; gap: var(--8px);
}
.notif-row {
  display: grid; grid-template-columns: auto 1fr auto; gap: var(--10px);
  padding: var(--10px) 0; border-bottom: 1px solid var(--color-ink-20);
  font-size: var(--text-sm); align-items: start;
}
.notif-row.unread .notif-body { font-weight: 600; }
.notif-dot { width: 0.8rem; height: 0.8rem; border-radius: 50%; background: var(--color-red-50); margin-top: 0.6rem; }
.notif-dot.read { background: transparent; }
.ping-row {
  display: flex; align-items: center; gap: var(--10px);
  padding: var(--10px); border-radius: var(--radius-lg); cursor: pointer;
}
.ping-row:hover { background: var(--tint-ink-5); }
.ping-row .preview { flex: 1; min-width: 0; }
.ping-row .preview .name { font-weight: 600; font-size: var(--text-sm); }
.ping-row .preview .text {
  font-size: var(--text-xs); color: var(--color-text-subtle);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ========== TRAYS / POPOVERS ========== */
.tray-popover {
  position: fixed; bottom: calc(var(--tray-block-size) + var(--8px));
  left: 50%; transform: translateX(-50%);
  width: min(40rem, calc(100vw - 2rem));
  background: var(--color-canvas); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-modal); z-index: var(--z-popup);
  padding: var(--16px); max-height: 50vh; overflow: auto;
  animation: slideUp var(--duration-medium) var(--ease-out-overshoot);
}
.tray-popover h3 { margin: 0 0 var(--12px); font-size: var(--text-md); }
.tray-empty { color: var(--color-text-subtle); font-size: var(--text-sm); padding: var(--16px) 0; text-align: center; }
.tray-item {
  display: flex; align-items: center; gap: var(--10px);
  padding: var(--10px); border-radius: var(--radius-md);
  font-size: var(--text-sm); cursor: pointer;
}
.tray-item:hover { background: var(--tint-ink-5); }

/* ========== MODALS / FORMS ========== */
.dialog {
  width: min(48rem, 100%); background: var(--color-canvas);
  border-radius: var(--radius-xl); box-shadow: var(--shadow-modal);
  padding: var(--24px); animation: slideUp var(--duration-slow) var(--ease-out-overshoot);
}
.dialog h2 { margin: 0 0 var(--16px); font-size: var(--text-md); }
.dialog .form-stack { display: flex; flex-direction: column; gap: var(--12px); }
.dialog label { font-size: var(--text-sm); font-weight: 600; display: block; margin-bottom: var(--4px); }
.dialog .actions { display: flex; justify-content: flex-end; gap: var(--8px); margin-top: var(--20px); }
.menu {
  position: absolute; z-index: var(--z-popup);
  background: var(--color-canvas); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-modal); min-width: 20rem; padding: var(--6px);
}
.menu button, .menu a {

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.version === 1) return parsed;
    }
  } catch (_) {}
  return buildSeed();
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
}
function resetSeed() {
  localStorage.removeItem(STORAGE_KEY);
  state = buildSeed();
  saveState();
  toast('Sample data reset');
  render();
}
function person(id) { return state.people.find(p => p.id === id) || { id, name: 'Unknown', color: '#888' }; }
function currentUser() { return person(state.currentUserId); }
function project(id) { return state.projects.find(p => p.id === id); }
function projectPeople(proj) {
  return (proj.member_ids || []).map(person).filter(Boolean);
}

// ---------- Router ----------
function parseRoute() {
  const hash = location.hash.replace(/^#\/?/, '') || '';
  const parts = hash.split('/').filter(Boolean);
  if (!parts.length) return { name: 'home' };
  if (parts[0] === 'jump') return { name: 'home' };
  if (parts[0] === 'activity') return { name: 'activity' };
  if (parts[0] === 'calendar') return { name: 'calendar' };
  if (parts[0] === 'reports') return { name: 'reports' };
  if (parts[0] === 'everything') return { name: 'everything' };
  if (parts[0] === 'adminland') return { name: 'adminland' };
  if (parts[0] === 'assignments') return { name: 'assignments' };
  if (parts[0] === 'search') return { name: 'search', q: decodeURIComponent(parts[1] || '') };
  if (parts[0] === 'projects' && parts[1]) {
    const pid = parts[1];
    if (!parts[2]) return { name: 'project', projectId: pid };
    const tool = parts[2];
    if (tool === 'message_board') {
      if (parts[3]) return { name: 'message', projectId: pid, messageId: parts[3] };
      return { name: 'message_board', projectId: pid };
    }
    if (tool === 'todos') {
      if (parts[3]) return { name: 'todo', projectId: pid, todoId: parts[3] };
      return { name: 'todos', projectId: pid };
    }
    if (tool === 'card_table') {
      if (parts[3]) return { name: 'card', projectId: pid, cardId: parts[3] };
      return { name: 'card_table', projectId: pid };
    }
    if (tool === 'docs') {
      if (parts[3]) return { name: 'doc', projectId: pid, docId: parts[3] };
      return { name: 'docs', projectId: pid };
    }
    if (tool === 'chat') return { name: 'chat', projectId: pid };
    if (tool === 'schedule') return { name: 'schedule', projectId: pid };
    if (tool === 'settings') return { name: 'project_settings', projectId: pid };
  }
  return { name: 'home' };
}
function navigate(path) {
  if (!path.startsWith('#')) path = '#/' + path.replace(/^\//, '');
  if (location.hash === path) { render(); return; }
  location.hash = path;
}
function visit(entry) {
  state.recentlyVisited = [entry, ...state.recentlyVisited.filter(e => !(e.type === entry.type && e.id === entry.id))].slice(0, 12);
  saveState();
}

function toast(msg) {
  const host = $('#toasts');

  setTimeout(() => el.remove(), 2800);
}
function avatarHtml(p, size = 'sm') {
  if (!p) return '';
  const sz = size === 'md' ? 'avatar-md' : size === 'xs' ? 'avatar-xs' : size === '2xs' ? 'avatar-2xs' : 'avatar-sm';
  return `<span class="avatar ${sz}" style="background:${p.color || avatarColor(p.id)}" title="${esc(p.name)}" aria-label="${esc(p.name)}">${esc(initials(p.name))}</span>`;
}
function avatarStackHtml(people, max = 8) {
  const show = people.slice(0, max);
  return `<div class="avatar-stack">${show.map(p => avatarHtml(p, 'xs')).join('')}</div>`;
}
function boostsHtml(boosts = [], targetType, targetId) {
  if (!boosts.length) {
    return `<div class="boosts"><button class="boost-chip" data-action="add-boost" data-type="${targetType}" data-id="${targetId}" title="Add a boost">+</button></div>`;
  }
  const grouped = {};
  boosts.forEach(b => { grouped[b.content] = (grouped[b.content] || 0) + 1; });
  return `<div class="boosts">${Object.entries(grouped).map(([c, n]) =>
    `<button class="boost-chip" data-action="add-boost" data-type="${targetType}" data-id="${targetId}" data-emoji="${esc(c)}">${esc(c)}${n > 1 ? ` ${n}` : ''}</button>`
  ).join('')}<button class="boost-chip" data-action="add-boost" data-type="${targetType}" data-id="${targetId}">+</button></div>`;
}
function commentsHtml(comments = [], projectId) {

function colColor(name) {
  const map = {
    purple: 'var(--recording-color-purple)', orange: 'var(--recording-color-orange)',
    yellow: 'var(--recording-color-yellow)', green: 'var(--recording-color-green)',

  const hasTools = Object.keys(tools).length > 0;
  const messages = (state.messages[pid] || []).slice().sort((a,b) => (b.pinned - a.pinned) || (new Date(b.created_at) - new Date(a.created_at)));
  const lists = state.todolists[pid] || [];
  const cols = state.cardColumns[pid] || [];
  const cards = state.cards[pid] || [];
  const docs = state.docs[pid] || [];
  const lines = (state.chatLines[pid] || []).slice(-3);
  const events = state.events[pid] || [];

  const dockMsg = messages.slice(0, 5).map(m => {
    const c = person(m.creator_id);
    return `<div class="dock-msg" data-action="nav" data-href="#/projects/${pid}/message_board/${m.id}">
      ${avatarHtml(c, 'xs')}
      <div>
        <div class="meta">${esc(c.name)} · ${fmtDate(m.created_at)}</div>
        <div class="title">${esc(m.title)}</div>
        <div class="excerpt">${esc(m.content.replace(/<[^>]+>/g, ' ').trim())}</div>
      </div>
    </div>`;
  }).join('');

  const dockTodos = lists.map(list => {
    const open = list.todos.filter(t => !t.completed);
    const done = list.todos.filter(t => t.completed).length;
    const total = list.todos.length || 1;
    const pct = Math.round((done / total) * 100);
    return `<div class="dock-todo-list">
      <h4><span class="pie" style="--pct:${pct}"></span> ${esc(list.title)}</h4>
      ${open.slice(0, 5).map(t => `<div class="dock-todo-item"><span class="checkbox" style="pointer-events:none"></span><span>${esc(t.title)}</span></div>`).join('')}
    </div>`;
  }).join('');

  const userCols = cols.filter(c => c.kind === 'column' || c.kind === 'triage');
  const dockKanban = `<div class="dock-kanban">${userCols.map(c => {
    const count = cards.filter(card => card.column_id === c.id).length;
    const color = c.color ? colColor(c.color) : 'var(--color-slate-40)';
    return `<div class="dock-kanban-col" style="background:${color}">${esc(c.title)} (${count})</div>`;
  }).join('')}</div>`;

  const dockDocs = docs.map(d => {
    const c = person(d.creator_id);
    const icon = d.type === 'CloudFile' ? 'sheet' : d.type === 'Upload' ? 'img' : 'doc';
    return `<div class="dock-file" data-action="nav" data-href="#/projects/${pid}/docs/${d.id}">
      <div class="file-icon ${icon}">${d.type === 'CloudFile' ? '▦' : d.type === 'Upload' ? '▣' : '📄'}</div>
      <div>
        <div class="title">${esc(d.title)}</div>
        <div class="meta">${esc(c.name)} · ${fmtDate(d.created_at)}${d.content && d.type !== 'Upload' ? ' · ' + esc(String(d.content).replace(/<[^>]+>/g,'').slice(0,60)) : ''}</div>
      </div>
    </div>`;
  }).join('');

  const now = new Date();
  const calMonth = now.toLocaleString(undefined, { month: 'long', year: 'numeric' });
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const startPad = first.getDay();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const eventDays = new Set(events.map(e => new Date(e.starts_at).getDate()).filter(d => !isNaN(d)));
  lists.forEach(l => l.todos.forEach(t => { if (t.due_on) eventDays.add(new Date(t.due_on + 'T12:00:00').getDate()); }));
  let calCells = '';
  for (let i = 0; i < startPad; i++) calCells += `<div class="day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const cls = ['day'];
    if (d === now.getDate()) cls.push('today');
    if (eventDays.has(d)) cls.push('has');
    calCells += `<div class="${cls.join(' ')}">${d}</div>`;
  }

  const dockChat = lines.map(l => {
    const c = person(l.creator_id);
    return `<div class="dock-chat-line">
      ${avatarHtml(c, 'xs')}
      <div>
        <div class="name">${esc(c.name)}<span class="time">${fmtTime(l.created_at)}</span></div>
        <div class="text">${esc(l.content.split('\n')[0])}</div>
      </div>
    </div>`;
  }).join('');

  const dockCards = [];
  if (tools.message_board) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/message_board">${esc(tools.message_board.title)}</a>
        <button class="btn-icon" data-action="new-message" data-project="${pid}" title="New message">+</button></div>
      <div class="dock-card-body">${dockMsg || `<div class="empty-state" style="padding:2rem"><p>Post announcements, pitches, and heartbeats.</p><button class="btn btn-primary btn-sm" data-action="new-message" data-project="${pid}">+ New message</button></div>`}</div>
    </article>`);
  }
  if (tools.todoset) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/todos">${esc(tools.todoset.title)}</a></div>
      <div class="dock-card-body">${dockTodos || '<div class="empty-state" style="padding:2rem">No to-dos yet</div>'}</div>
    </article>`);
  }
  if (tools.card_table) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/card_table">${esc(tools.card_table.title)}</a></div>
      <div class="dock-card-body">${dockKanban}</div>
    </article>`);
  }
  if (tools.vault) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/docs">${esc(tools.vault.title)}</a></div>
      <div class="dock-card-body">${dockDocs || '<div class="empty-state" style="padding:2rem">No files yet</div>'}</div>
    </article>`);
  }
  if (tools.schedule) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/schedule">${esc(tools.schedule.title)}</a></div>
      <div class="dock-card-body">
        <div class="dock-cal-mini">
          <h4>${esc(calMonth)}</h4>
          <div class="cal-grid">
            ${['S','M','T','W','T','F','S'].map(d => `<div class="day" style="font-weight:600">${d}</div>`).join('')}
            ${calCells}
          </div>
          <div style="margin-top:1rem;text-align:left;font-size:var(--text-sm)">
            ${events.slice(0, 3).map(e => `<div style="padding:0.3rem 0">📅 ${esc(e.title)} · ${e.all_day ? fmtDate(e.starts_at) : fmtDateTime(e.starts_at)}</div>`).join('') || '<span style="color:var(--color-text-subtle)">No upcoming events</span>'}
          </div>
        </div>
      </div>
    </article>`);
  }
  if (tools.chat) {
    dockCards.push(`<article class="dock-card">
      <div class="dock-card-title"><a href="#/projects/${pid}/chat">${esc(tools.chat.title)}</a></div>
      <div class="dock-card-body">${dockChat || '<div class="empty-state" style="padding:2rem">No chat yet</div>'}</div>
    </article>`);
  }
  // Always show add-tool affordance
  dockCards.push(`<article class="dock-card">
    <div class="dock-card-title"><span style="color:var(--color-text-subtle);font-weight:600">Add a tool</span></div>
    <div class="dock-add" data-action="add-tool" data-project="${pid}" title="Add a tool">+</div>
  </article>`);

  return `
  <div class="page-shell">
    <div class="page-panel" style="padding:0;position:relative">
      ${p.sample ? `<div class="sample-ribbon">Sample Project</div>` : ''}
      <div class="project-header">
        <div class="project-people">
          <button class="btn-icon" title="People" aria-label="People">👥</button>
          ${avatarStackHtml(members, 10)}
        </div>
        <div class="project-title-row">
          <h1>${esc(p.name)}</h1>
          <button class="star-btn ${state.starred[p.id] ? 'starred' : ''}" data-action="toggle-star" data-id="${p.id}" style="font-size:2rem" aria-label="Star project">${state.starred[p.id] ? '★' : '☆'}</button>
        </div>
        <p class="project-desc">${esc(p.description)}</p>
        ${!hasTools ? `<p style="color:var(--color-text-subtle);font-size:var(--text-sm);margin:1.6rem 0 0">This project is empty. Add tools to start collaborating.</p>` : ''}
      </div>
      <div class="dock-grid">${dockCards.join('')}</div>
    </div>
  </div>`;
}

function renderMessageBoard(pid) {
  const p = project(pid);
  if (!p) return notFound();
  const filter = (ui.filters.message_board || '').toLowerCase();
  let messages = (state.messages[pid] || []).slice();
  messages.sort((a,b) => (b.pinned - a.pinned) || (new Date(b.created_at) - new Date(a.created_at)));
  if (filter) messages = messages.filter(m => (m.title + m.content).toLowerCase().includes(filter));
  const pinned = messages.filter(m => m.pinned);
  const rest = messages.filter(m => !m.pinned);

  const row = (m) => {
    const c = person(m.creator_id);
    const count = (m.comments || []).length;
    const excerpt = m.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 140);
    return `<a class="msg-row" href="#/projects/${pid}/message_board/${m.id}">
      ${avatarHtml(c, 'md')}
      <div>
        <h3 class="msg-title">${esc(m.title)}</h3>
        <div class="msg-meta"><span class="cat">${m.category.icon} ${esc(m.category.name)}</span> by ${esc(c.name)} · ${fmtDate(m.created_at)} · ${esc(excerpt)}${excerpt.length >= 140 ? '…' : ''}</div>
      </div>
      ${count ? `<span class="comment-count">${count}</span>` : '<span></span>'}
    </a>`;
  };

  const inner = `
    <h1 class="page-title">Message Board</h1>
    <div class="toolbar-row">
      <button class="btn btn-primary" data-action="new-message" data-project="${pid}">+ New message</button>
      <button class="btn btn-secondary">All messages</button>
      <button class="btn btn-secondary">Categories ▾</button>
      <button class="btn btn-secondary">Newest post ▾</button>
      <input class="field filter-field" data-filter="message_board" placeholder="Filter…" value="${esc(ui.filters.message_board || '')}">
    </div>
    <div class="msg-list">
      ${pinned.length ? `<div class="msg-pinned-label">📌 Pinned</div>${pinned.map(row).join('')}<div class="msg-divider"></div>` : ''}
      ${rest.map(row).join('') || '<div class="empty-state">No messages match</div>'}
    </div>`;
  return pageChrome(inner, [
    { label: p.name, href: `#/projects/${pid}` },
  ], `<button class="btn btn-ghost btn-sm" data-action="toggle-bookmark" data-type="tool" data-id="message_board-${pid}">Bookmark</button>
      <button class="btn btn-ghost btn-sm">⋯</button>`);
}

}

function renderTodos(pid) {
  const p = project(pid);
  if (!p) return notFound();
  const filter = (ui.filters.todos || '').toLowerCase();
  const lists = state.todolists[pid] || [];

  const listHtml = lists.map(list => {
    let todos = list.todos;
    if (filter) todos = todos.filter(t => t.title.toLowerCase().includes(filter));
    const open = todos.filter(t => !t.completed);
    const completed = todos.filter(t => t.completed);
    const done = list.todos.filter(t => t.completed).length;
    const total = list.todos.length || 1;
    const pct = Math.round((done / total) * 100);
    const key = list.id;
    const showCompleted = ui.expandedCompleted[key];

    const todoRow = (t) => {
      const assignees = (t.assignee_ids || []).map(person);
      const steps = t.steps || [];
      const stepsDone = steps.filter(s => s.completed).length;
      return `<div class="todo-row ${t.completed ? 'completed' : ''}">
        <input type="checkbox" class="checkbox" ${t.completed ? 'checked' : ''} data-action="toggle-todo" data-project="${pid}" data-list="${list.id}" data-todo="${t.id}" aria-label="Complete ${esc(t.title)}">
        <a class="todo-title" href="#/projects/${pid}/todos/${t.id}">${esc(t.title)}</a>
        <div class="todo-meta">
          ${(t.comments || []).length ? `<span class="comment-dot">${t.comments.length}</span>` : ''}
          ${steps.length ? `<span class="step-badge">☑ ${stepsDone}/${steps.length}</span>` : ''}
          ${assignees.map(a => `<span class="assignee-chip">${avatarHtml(a, '2xs')} ${esc(shortName(a.name))}</span>`).join('')}
          ${t.due_on ? `<span class="due-chip soon">📅 ${fmtDate(t.due_on + 'T12:00:00')}</span>` : ''}
        </div>
      </div>`;
    };

    return `<section class="todo-list-block">
      <div class="todo-list-head">
        <span class="pie" style="--pct:${pct}"></span>
        <h3>${esc(list.title)}</h3>
      </div>
      ${list.description ? `<p class="todo-list-desc">${esc(list.description)}</p>` : ''}
      ${open.map(todoRow).join('')}
      ${completed.length ? `
        <button class="completed-toggle" data-action="toggle-completed" data-list="${key}">
          <span class="checkbox" style="pointer-events:none;background:var(--color-green-50);border-color:var(--color-green-50)"></span>
          ${completed.length} completed ${showCompleted ? '▾' : '▸'}
        </button>
        ${showCompleted ? completed.map(todoRow).join('') : ''}
      ` : ''}
      <a class="add-todo-link" href="#" data-action="add-todo" data-project="${pid}" data-list="${list.id}">Add a to-do</a>
    </section>`;
  }).join('');

  const inner = `
    <h1 class="page-title">To-dos</h1>
    <div class="toolbar-row">
      <button class="btn btn-primary" data-action="new-list" data-project="${pid}">+ New list</button>
      <button class="btn btn-secondary">View as ▾</button>
      <input class="field filter-field" data-filter="todos" placeholder="Filter…" value="${esc(ui.filters.todos || '')}">
    </div>
    <a class="add-todo-link" href="#" data-action="add-todo" data-project="${pid}" data-list="${lists[0]?.id}" style="margin-left:0;margin-bottom:1.6rem">☐ Add a to-do</a>
    ${listHtml}`;
  return pageChrome(inner, [
    { label: p.name, href: `#/projects/${pid}` },
  ], `<button class="btn btn-ghost btn-sm">Bookmark</button><button class="btn btn-ghost btn-sm">⋯</button>`);
}

function findTodo(pid, tid) {
  for (const list of (state.todolists[pid] || [])) {
    const t = list.todos.find(x => x.id === tid);
    if (t) return { list, todo: t };
  }
  return null;
}

function renderTodo(pid, tid) {
  const p = project(pid);
  const found = findTodo(pid, tid);
  if (!p || !found) return notFound();
  const { list, todo: t } = found;
  visit({ type: 'todo', id: t.id, title: t.title, project_id: pid });
  const creator = person(t.creator_id);
  const assignees = (t.assignee_ids || []).map(person);
  const notify = (t.completion_subscriber_ids || []).map(person);

  const inner = `
    <h1 class="page-title">${esc(t.title)}</h1>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:1rem;margin-bottom:2rem">
      <button class="mark-complete-btn ${t.completed ? 'done' : ''}" data-action="toggle-todo" data-project="${pid}" data-list="${list.id}" data-todo="${t.id}">
        <span class="checkbox" style="pointer-events:none" ${t.completed ? 'data-checked' : ''}></span>
        ${t.completed ? 'Completed' : 'Mark as complete'}
      </button>
      <span style="font-size:var(--text-sm);color:var(--color-text-subtle)">Added by ${avatarHtml(creator, '2xs')} ${esc(creator.name)} on ${fmtDate(t.created_at)}</span>
    </div>
    <div class="todo-detail-fields">
      <div class="field-row">
        <label>Assigned to</label>
        <div class="value editable">
          ${assignees.length ? assignees.map(a => `<span class="assignee-chip">${avatarHtml(a, '2xs')} ${esc(a.name)}</span>`).join('') : '<span style="color:var(--color-text-placeholder)">Type names to assign…</span>'}
          <button class="btn btn-ghost btn-sm" data-action="assign-me" data-project="${pid}" data-list="${list.id}" data-todo="${t.id}">Assign me</button>
        </div>
      </div>
      <div class="field-row">
        <label>When done</label>
        <div class="value">${notify.length ? notify.map(a => `<span class="assignee-chip">${avatarHtml(a, '2xs')} ${esc(a.name)}</span>`).join('') : '<span style="color:var(--color-text-placeholder)">Notify these people…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Due on</label>
        <div class="value">${t.due_on ? fmtDate(t.due_on + 'T12:00:00') : '<span style="color:var(--color-text-placeholder)">Select a due date…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Notes</label>
        <div class="value editable">${t.notes ? esc(t.notes) : '<span style="color:var(--color-text-placeholder)">Add notes…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Subtasks</label>
        <div class="value">
          <div class="subtasks-list">
            ${(t.steps || []).map(s => `
              <label class="subtask-row ${s.completed ? 'done' : ''}">
                <input type="checkbox" class="checkbox" ${s.completed ? 'checked' : ''} data-action="toggle-step" data-project="${pid}" data-list="${list.id}" data-todo="${t.id}" data-step="${s.id}">
                <span>${esc(s.title)}</span>
              </label>`).join('')}
            <button class="add-subtask" data-action="add-step" data-project="${pid}" data-list="${list.id}" data-todo="${t.id}">Add a new subtask</button>
          </div>
        </div>
      </div>
    </div>
    ${commentsHtml(t.comments)}
    ${commentComposerHtml()}
    <div class="subscription-footer">People assigned and notified will hear about comments.</div>`;
  return pageChrome(inner, [
    { label: p.name, href: `#/projects/${pid}` },
    { label: 'To-dos', href: `#/projects/${pid}/todos` },
    { label: list.title, href: `#/projects/${pid}/todos` },
  ], `<button class="btn btn-ghost btn-sm">Bookmark</button><button class="btn btn-ghost btn-sm">Edit</button><button class="btn btn-ghost btn-sm">⋯</button>`);
}

function renderCardTable(pid) {
  const p = project(pid);
  if (!p) return notFound();
  const filter = (ui.filters.cards || '').toLowerCase();
  const cols = state.cardColumns[pid] || [];
  let cards = state.cards[pid] || [];
  if (filter) cards = cards.filter(c => c.title.toLowerCase().includes(filter));
  const triage = cols.find(c => c.kind === 'triage');
  const userCols = cols.filter(c => c.kind === 'column');
  const notNow = cols.find(c => c.kind === 'not_now');
  const done = cols.find(c => c.kind === 'done');

  const cardTile = (card) => {
    const creator = person(card.creator_id);
    const assignees = (card.assignee_ids || []).map(person);
    const steps = card.steps || [];
    const stepsDone = steps.filter(s => s.completed).length;
    return `<a class="kanban-card" href="#/projects/${pid}/card_table/${card.id}">
      <h4>${esc(card.title)}</h4>
      <div class="meta">
        <span>By ${esc(shortName(creator.name))} · ${fmtDate(card.created_at)}</span>
        ${steps.length ? `<span class="step-badge">☑ ${stepsDone}/${steps.length}</span>` : ''}
        ${(card.comments || []).length ? `<span class="comment-dot" style="width:1.6rem;height:1.6rem;font-size:0.9rem">${card.comments.length}</span>` : ''}
        ${assignees.map(a => avatarHtml(a, '2xs')).join('')}
      </div>
    </a>`;
  };

  const colCards = (colId, onHold = null) => cards.filter(c => c.column_id === colId && (onHold === null ? true : !!c.on_hold === onHold));

  const inner = `
    <h1 class="page-title">Card Table</h1>
    <div class="toolbar-row kanban-toolbar">
      <button class="btn btn-primary" data-action="add-card" data-project="${pid}">+ Add a card</button>
      <input class="field filter-field" data-filter="cards" placeholder="Filter…" value="${esc(ui.filters.cards || '')}">
    </div>
    ${triage ? `
      <div class="watchers-row">
        <span>Watching:</span>
        ${avatarStackHtml((triage.watcher_ids || []).map(person))}
      </div>
      <div class="kanban-triage-title">${esc(triage.title)} (${colCards(triage.id).length})</div>
      <div class="triage-cards" style="margin-bottom:1.6rem">${colCards(triage.id).map(cardTile).join('') || '<span style="color:var(--color-text-subtle);font-size:var(--text-sm)">No cards in triage</span>'}</div>
    ` : ''}
    <div class="kanban-board">
      <div class="kanban-columns">
        ${userCols.map(col => {
          const active = colCards(col.id, false);
          const held = col.on_hold_enabled ? colCards(col.id, true) : [];
          return `<section class="kanban-col" style="--col-color:${col.color ? colColor(col.color) : 'var(--color-ink-40)'}">
            <div class="kanban-col-head">
              <h3>${esc(col.title)} (${active.length + held.length})</h3>
              <button class="btn-icon" aria-label="Column options">⋯</button>
            </div>
            ${active.map(cardTile).join('') || (held.length ? '' : '<div style="min-height:4rem;border:1px dashed var(--color-ink-30);border-radius:var(--radius-md)"></div>')}
            ${col.on_hold_enabled ? `<div class="on-hold-label">ON HOLD</div>${held.map(cardTile).join('')}` : ''}
          </section>`;
        }).join('')}
      </div>

function renderCard(pid, cid) {
  const p = project(pid);

  if (!p || !card) return notFound();
  const cols = state.cardColumns[pid] || [];
  const creator = person(card.creator_id);
  const assignees = (card.assignee_ids || []).map(person);
  const destinations = [];
  cols.forEach(col => {
    if (col.kind === 'triage' || col.kind === 'column' || col.kind === 'done' || col.kind === 'not_now') {
      destinations.push({ id: col.id, label: col.title, on_hold: false });
      if (col.on_hold_enabled) destinations.push({ id: col.id, label: col.title + ': On hold', on_hold: true });
    }
  });

  const inner = `
    <h1 class="page-title">${esc(card.title)}</h1>

    <div style="margin-bottom:0.6rem;font-weight:600;font-size:var(--text-sm)">Move along to…</div>
    <div class="move-along">
      ${destinations.map(d => {
        const current = card.column_id === d.id && !!card.on_hold === d.on_hold;
        return `<button class="${current ? 'current' : ''}" data-action="move-card" data-project="${pid}" data-card="${card.id}" data-column="${d.id}" data-hold="${d.on_hold}">${esc(d.label)}</button>`;
      }).join('')}
    </div>
    <div class="todo-detail-fields">
      <div class="field-row">
        <label>Assigned to</label>
        <div class="value">${assignees.length ? assignees.map(a => `<span class="assignee-chip">${avatarHtml(a, '2xs')} ${esc(a.name)}</span>`).join('') : '<span style="color:var(--color-text-placeholder)">Type names to assign…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Due on</label>
        <div class="value">${card.due_on || '<span style="color:var(--color-text-placeholder)">Select a due date…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Notes</label>
        <div class="value editable">${card.notes ? esc(card.notes) : '<span style="color:var(--color-text-placeholder)">Add notes…</span>'}</div>
      </div>
      <div class="field-row">
        <label>Subtasks</label>
        <div class="value">
          <div class="subtasks-list">
            ${(card.steps || []).map(s => `
              <label class="subtask-row ${s.completed ? 'done' : ''}">
                <input type="checkbox" class="checkbox" ${s.completed ? 'checked' : ''} data-action="toggle-card-step" data-project="${pid}" data-card="${card.id}" data-step="${s.id}">
                <span>${esc(s.title)}</span>

          </div>
        </div>

  return pageChrome(inner, [
    { label: p.name, href: `#/projects/${pid}` },
    { label: 'Card Table', href: `#/projects/${pid}/card_table` },
    { label: card.title },

function renderChat(pid) {
  const p = project(pid);
  if (!p) return notFound();
  const lines = state.chatLines[pid] || [];
  // group by day
  const byDay = {};
  lines.forEach(l => {
    const day = new Date(l.created_at).toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    (byDay[day] = byDay[day] || []).push(l);
  });

  let stream = '';
  Object.entries(byDay).forEach(([day, dayLines]) => {
    stream += `<div class="chat-day">${esc(day)}</div>`;
    dayLines.forEach((l, i) => {
      const prev = dayLines[i - 1];
      const cont = prev && prev.creator_id === l.creator_id;
      const c = person(l.creator_id);
      stream += `<div class="chat-line ${cont ? 'continuation' : ''}">
        ${avatarHtml(c, 'sm')}
        <div class="chat-bubble">
          ${cont ? '' : `<div class="head"><span class="name">${esc(c.name)}</span><span class="time">${fmtTime(l.created_at)}</span></div>`}
          <div class="text">${linkify(esc(l.content))}</div>
          ${(l.boosts || []).length ? `<div class="chat-boosts">${(l.boosts || []).map(b => {
            const bp = person(b.person_id);
            return `<span class="boost-chip" title="${esc(bp.name)}">${avatarHtml(bp, '2xs')} ${esc(b.content)}</span>`;
          }).join('')}</div>` : ''}
        </div>
      </div>`;
    });
  });

  const inner = `
    <div class="chat-page">
      <div class="chat-stream">${stream}</div>
      <div class="chat-composer-wrap">
        <form class="chat-composer" data-action="post-chat" data-project="${pid}">
          <input id="chat-input" placeholder="Write a message…" value="${esc(ui.chatDraft)}" autocomplete="off" aria-label="Chat message">
          <div class="tools">
            <button type="button" class="btn-icon" title="Emoji" data-action="stub" data-label="Emoji picker">😊</button>
            <button type="button" class="btn-icon" title="Attach" data-action="stub" data-label="Attach file">📎</button>
            <button type="submit" class="btn btn-primary btn-sm">Post</button>
          </div>
        </form>
      </div>
    </div>`;
  return pageChrome(inner, [
    { label: p.name, href: `#/projects/${pid}` },
    { label: 'Chat' },
  ], `<button class="btn btn-ghost btn-sm">Bookmark</button>
      <button class="btn btn-ghost btn-sm">Notify me when people chat</button>
      <button class="btn btn-ghost btn-sm">⋯</button>`);
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>').replace(/\n/g, '<br>');
}

  const recent = state.recentlyVisited.filter(e => !q || e.title.toLowerCase().includes(q));
  const items = [];
  if (!q) {
    items.push(
      { kind: 'tile', id: 'activity', label: 'Activity', href: '#/activity', icon: '📈' },
      { kind: 'tile', id: 'calendar', label: 'Calendar', href: '#/calendar', icon: '📅' },
      { kind: 'tile', id: 'reports', label: 'Reports', href: '#/reports', icon: '◔' },
      { kind: 'tile', id: 'everything', label: 'Everything', href: '#/everything', icon: '◎' },
    );
  }
  recent.forEach(e => {
    let href = '#/';
    if (e.type === 'project') href = `#/projects/${e.id}`;
    else if (e.type === 'message') href = `#/projects/${e.project_id}/message_board/${e.id}`;
    else if (e.type === 'todo') href = `#/projects/${e.project_id}/todos/${e.id}`;

  return `<div class="modal-backdrop" data-action="close-jump" role="dialog" aria-modal="true" aria-label="Jump menu">
    <div class="jump-menu" onclick="event.stopPropagation()">

        <button class="jump-tile" data-action="nav" data-href="#/reports"><span class="icon">◔</span>Reports</button>
        <button class="jump-tile" data-action="nav" data-href="#/everything"><span class="icon">◎</span>Everything</button>
      </div>`}
      <input class="field jump-search" id="jump-search" placeholder="Search or jump to a project, person, or recent page" value="${esc(ui.jumpQuery)}" autocomplete="off">
      ${!q && recent.length ? `<div class="jump-section"><h3>Recently visited</h3>
        ${recent.map((e, i) => {
          let href = '#/';
          if (e.type === 'project') href = `#/projects/${e.id}`;
          else if (e.type === 'message') href = `#/projects/${e.project_id}/message_board/${e.id}`;
          else if (e.type === 'todo') href = `#/projects/${e.project_id}/todos/${e.id}`;
          return `<button class="jump-item ${ui.jumpIndex === i ? 'active' : ''}" data-action="nav" data-href="${href}"><span class="icon">${e.type === 'project' ? '🏔' : '↗'}</span>${esc(e.title)}</button>`;
        }).join('')}
      </div>` : ''}
      <div class="jump-section">
        <h3>Projects ${projects.length > 3 ? '— See all' : ''}</h3>
        ${projects.map(p => `<button class="jump-item" data-action="nav" data-href="#/projects/${p.id}"><span class="icon">${state.starred[p.id] ? '★' : '○'}</span>${esc(p.name)}</button>`).join('') || '<div class="tray-empty">No matching projects</div>'}
      </div>
      ${q ? `<div class="jump-section"><button class="jump-item" data-action="nav" data-href="#/search/${encodeURIComponent(ui.jumpQuery)}"><span class="icon">🔍</span>Search all projects for “${esc(ui.jumpQuery)}”</button></div>` : ''}

function renderTray() {
  if (!ui.tray) return '';
  const titles = { tasks: 'My Tasks', events: 'My Events', today: 'Do Today', bookmarks: 'My Bookmarks', notes: 'My Notes' };
  let body = '';
  if (ui.tray === 'tasks') {
    const mine = [];
    Object.entries(state.todolists).forEach(([pid, lists]) => {
      lists.forEach(l => l.todos.forEach(t => {
        if (!t.completed && (t.assignee_ids || []).includes(state.currentUserId)) {
          mine.push({ ...t, projectId: pid, listId: l.id });
        }
      }));
    });
    // also sample assignments for demo
    if (!mine.length) {
      Object.entries(state.todolists).forEach(([pid, lists]) => {
        lists.forEach(l => l.todos.forEach(t => {
          if (!t.completed && (t.assignee_ids || []).length) mine.push({ ...t, projectId: pid, listId: l.id });
        }));
      });
    }
    body = mine.slice(0, 12).map(t => {
      const proj = project(t.projectId);
      return `<a class="tray-item" href="#/projects/${t.projectId}/todos/${t.id}" data-action="close-tray">
        <span class="checkbox" style="pointer-events:none"></span>
        <span style="flex:1">${esc(t.title)}</span>
        <span style="color:var(--color-text-subtle);font-size:var(--text-xs)">${esc(proj?.name || '')}</span>
      </a>`;
    }).join('') || '<div class="tray-empty">No tasks assigned. <a href="#/assignments">My Assignments</a></div>';
  } else if (ui.tray === 'events') {
    const evs = [];
    Object.entries(state.events).forEach(([pid, list]) => list.forEach(e => evs.push({ ...e, projectId: pid })));
    body = evs.map(e => `<div class="tray-item"><span>📅</span><span style="flex:1">${esc(e.title)}</span><span style="color:var(--color-text-subtle);font-size:var(--text-xs)">${fmtDate(e.starts_at)}</span></div>`).join('') || '<div class="tray-empty">No events in the next 7 days</div>';
  } else if (ui.tray === 'today') {
    body = state.doToday.length
      ? state.doToday.map(id => `<div class="tray-item">${esc(id)}</div>`).join('')
      : '<div class="tray-empty">Flag to-dos or cards with Do Today to see them here.</div>';
  } else if (ui.tray === 'bookmarks') {
    body = state.bookmarks.length
      ? state.bookmarks.map(b => `<div class="tray-item">${esc(b.title || b.id)}</div>`).join('')
      : '<div class="tray-empty">No bookmarks yet. Use Bookmark on any page.</div>';
  } else if (ui.tray === 'notes') {
    body = `<textarea class="field" style="width:100%;min-height:16rem" data-action="save-notes" placeholder="Personal scratchpad…">${esc(state.myNotes)}</textarea>
      <p style="font-size:var(--text-xs);color:var(--color-text-subtle);margin:0.6rem 0 0">Autosaves as you type. My Notes are private — not recordings.</p>`;
  }
  return `<div class="tray-popover" role="dialog" aria-label="${titles[ui.tray]}">
    <h3>${titles[ui.tray]}</h3>
    ${body}
  </div>`;
}
